<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meus chamados — back4you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#F1E7DC; --surface:#FFFFFF; --surface-warm:#FBF6EF;
  --ink:#113D39; --ink-2:#3F5854; --muted:#8A7D70; --line:#E4D9C9; --line-2:#D6C3AC;
  --brand-dark:#073034; --brand-teal:#0F8C85; --brand-eucalipto2:#3FA680;
  --radius:16px; --sans:'Montserrat',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--canvas);color:var(--ink);font-family:var(--sans);min-height:100vh;
  display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
:focus-visible{outline:2px solid var(--brand-teal);outline-offset:2px;border-radius:4px}
.wrap{width:100%;max-width:760px;margin:0 auto;padding:26px 22px 60px;flex:1}
.cab{margin:8px 0 22px}
.cab h1{font-size:22px;font-weight:800;letter-spacing:-.01em}
.cab p{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5}
.tk{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 20px;margin-bottom:14px}
.tk .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.tk .area{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  color:var(--brand-teal);background:var(--surface-warm);border:1px solid var(--line);
  padding:3px 9px;border-radius:999px}
.tk .badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px}
.tk .badge.aberto{background:#FFF1DC;color:#9A6B10;border:1px solid #F0D9AE}
.tk .badge.respondido{background:#E5F0FF;color:#25518F;border:1px solid #C9DEF7}
.tk .badge.concluido{background:#E7F4EC;color:#2E7D4F;border:1px solid #CBE7D4}
.tk .data{font-size:11.5px;color:var(--muted);margin-left:auto}
.tk h2{font-size:15px;font-weight:700;margin:2px 0 6px}
.tk .msg{font-size:13px;color:var(--ink-2);line-height:1.55;white-space:pre-wrap}
.tk .resp{margin-top:12px;padding:12px 14px;background:var(--surface-warm);
  border:1px solid var(--line);border-radius:10px}
.tk .resp .lbl{font-size:11px;font-weight:700;color:var(--brand-teal);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.tk .resp .txt{font-size:13px;color:var(--ink);line-height:1.55;white-space:pre-wrap}
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  min-height:50vh;text-align:center;padding:0 24px;margin:0 auto}
.state h1{font-size:18px;font-weight:700}
.state p{color:var(--muted);font-size:14px;max-width:46ch;line-height:1.5}
.state code{background:var(--surface-warm);padding:2px 6px;border-radius:4px;border:1px solid var(--line);font-size:13px}
.state .cta{margin-top:8px;display:inline-flex;align-items:center;gap:7px;background:var(--brand-teal);
  color:#fff;text-decoration:none;font-weight:600;font-size:13px;padding:11px 16px;border-radius:10px}
.spin{width:26px;height:26px;border:2.5px solid var(--line-2);border-top-color:var(--brand-teal);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
footer{padding:18px 24px;text-align:center;font-size:11.5px;color:var(--muted)}
</style>
</head>
<body>
<!--B4U:START-->
<script>window.B4U = { area:'outros' };</script>
<!-- ═══════════ back4you · cabeçalho + chamados (compartilhado) ═══════════
     Bloco único, autocontido e com prefixo .b4u- (não conflita com o CSS da
     página). Cole logo depois de <body>, e ANTES dele defina:
        <script>window.B4U = { area:'fiscal' };</script>
     area = área padrão do chamado desta página
        (fiscal | dpto_pessoal | contabil | societario | equiparacao | outros)
     home:true  -> esconde o botão "Início" (usar só no index).
     Para reaproveitar em todas as páginas, mantenha este bloco IDÊNTICO. ─── -->
<style>
.b4u-bar{position:sticky;top:0;z-index:900;display:flex;align-items:center;gap:10px;
  padding:10px 18px;background:#073034;color:#fff;box-shadow:0 2px 12px rgba(7,48,52,.20);
  font-family:'Montserrat',system-ui,-apple-system,sans-serif}
.b4u-bar .b4u-logo{font-weight:900;font-size:17px;letter-spacing:-.02em;margin-right:auto;
  color:#fff;text-decoration:none;display:inline-flex;align-items:center;line-height:1}
.b4u-bar .b4u-logo .y{color:#3FA680}
.b4u-btn{display:inline-flex;align-items:center;gap:7px;border:0;cursor:pointer;
  font-family:inherit;font-weight:600;font-size:13px;padding:8px 13px;border-radius:10px;
  text-decoration:none;transition:background .15s,transform .08s;line-height:1;white-space:nowrap}
.b4u-btn svg{width:16px;height:16px;flex-shrink:0}
.b4u-btn .b4u-lbl{color:inherit;text-transform:none;letter-spacing:normal;font-size:13px}
.b4u-btn:active{transform:translateY(1px)}
.b4u-btn.ghost{background:rgba(255,255,255,.10);color:#fff}
.b4u-btn.ghost:hover{background:rgba(255,255,255,.18)}
.b4u-btn.wa{background:#25D366;color:#fff}
.b4u-btn.wa:hover{background:#20bd5a}
.b4u-btn.call{background:#0F8C85;color:#fff}
.b4u-btn.call:hover{background:#0c756f}
.b4u-icobtn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;
  padding:0;border:0;cursor:pointer;border-radius:9px;background:rgba(255,255,255,.10);color:#fff;
  transition:background .15s}
.b4u-icobtn:hover{background:rgba(255,255,255,.18)}
.b4u-icobtn svg{width:17px;height:17px}
@media(max-width:640px){
  .b4u-bar{gap:7px;padding:9px 12px}
  .b4u-btn .b4u-lbl{display:none}
  .b4u-btn{padding:9px 11px}
}
.b4u-ov{position:fixed;inset:0;z-index:1000;background:rgba(7,48,52,.45);
  display:none;align-items:flex-end;justify-content:center;
  font-family:'Montserrat',system-ui,-apple-system,sans-serif}
.b4u-ov.on{display:flex}
@media(min-width:640px){.b4u-ov{align-items:center;padding:24px}}
.b4u-modal{background:#fff;color:#113D39;width:100%;max-width:520px;border-radius:16px 16px 0 0;
  max-height:94vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
@media(min-width:640px){.b4u-modal{border-radius:16px}}
.b4u-modal h3{font-size:17px;font-weight:800;padding:18px 20px 3px;letter-spacing:-.01em}
.b4u-modal .b4u-sub{font-size:12.5px;color:#8A7D70;padding:0 20px 10px;line-height:1.5}
.b4u-fld{padding:7px 20px}
.b4u-fld label{display:block;font-size:12px;font-weight:700;color:#3F5854;margin-bottom:5px}
.b4u-fld select,.b4u-fld input,.b4u-fld textarea{width:100%;font-family:inherit;font-size:14px;
  padding:10px 12px;border:1px solid #E4D9C9;border-radius:10px;background:#FBF6EF;color:#113D39}
.b4u-fld textarea{min-height:120px;resize:vertical;line-height:1.5}
.b4u-fld select:focus,.b4u-fld input:focus,.b4u-fld textarea:focus{outline:2px solid #0F8C85;outline-offset:1px;border-color:transparent}
.b4u-err{color:#B4322A;font-size:12.5px;padding:2px 20px 0;min-height:16px}
.b4u-foot{display:flex;gap:10px;padding:14px 20px 20px;position:sticky;bottom:0;background:#fff}
.b4u-foot .b4u-btn{flex:1;justify-content:center;padding:12px}
.b4u-foot .primary{background:#0F8C85;color:#fff}
.b4u-foot .primary:hover{background:#0c756f}
.b4u-foot .primary[disabled]{opacity:.6;cursor:default}
.b4u-foot .cancel{background:#F1E7DC;color:#3F5854}
.b4u-foot .cancel:hover{background:#e8dccb}
.b4u-ok{padding:30px 22px;text-align:center}
.b4u-ok .chk{width:56px;height:56px;border-radius:50%;background:#E7F4EC;color:#2E9E63;
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.b4u-ok .chk svg{width:30px;height:30px}
.b4u-ok h3{font-size:18px;font-weight:800;margin-bottom:6px}
.b4u-ok p{font-size:13.5px;color:#3F5854;line-height:1.55;max-width:40ch;margin:0 auto 20px}
</style>
<script>
(function(){
  var CFG = window.B4U || {};
  if (CFG.__ready) return;

  var WA = '5511937173906';                        // +55 11 93717-3906
  var API_FALLBACK = 'https://script.google.com/macros/s/AKfycbyGAro0qPWpZcVX665KwKd-BK3ouSvVkAj5Vxw_phgO82EDa3gJrURcHjWIPYNQXT5d/exec';
  function api(){ try{ if(typeof API_URL==='string' && API_URL) return API_URL; }catch(e){} return API_FALLBACK; }

  var AREAS = [
    ['fiscal','Fiscal'], ['dpto_pessoal','Departamento Pessoal'], ['contabil','Contábil'],
    ['societario','Societário'], ['equiparacao','Equiparação'], ['outros','Outros / reportar erro']
  ];
  // tipo -> [rótulo, esqueleto de mensagem]
  var TIPOS = {
    livre:            ['Chamado livre', ''],
    solicitar_nf:     ['Solicitar nota fiscal', 'Solicito a emissão de uma nota fiscal.\n\nTomador (cliente):\nValor:\nDescrição do serviço:\nData desejada:'],
    duvida:           ['Tirar uma dúvida', 'Minha dúvida é:\n\n'],
    ferias:           ['Solicitar férias', 'Solicito a programação de férias.\n\nColaborador:\nInício desejado:\nDias:\nObservações:'],
    previa_admissao:  ['Prévia de admissão', 'Estou avaliando uma contratação (prévia, ainda sem formalizar).\n\nCargo cogitado:\nFaixa salarial:\nObservações:'],
    contratacao:      ['Formalizar admissão', 'Quero formalizar uma contratação.\n\nNome do colaborador:\nCargo:\nSalário:\nData de início:\nObservações:'],
    previa_rescisao:  ['Prévia de rescisão', 'Estou avaliando desligar um colaborador (prévia).\n\nColaborador:\nMotivo:\nObservações:'],
    rescisao:         ['Formalizar desligamento', 'Quero formalizar um desligamento.\n\nColaborador:\nMotivo:\nData prevista:\nAviso (trabalhado/indenizado):\nObservações:']
  };
  var ORDEM_TIPOS = ['livre','solicitar_nf','duvida','ferias','previa_admissao','contratacao','previa_rescisao','rescisao'];
  // O tipo de solicitação DEPENDE da área (não faz sentido pedir férias em Equiparação).
  var TIPOS_POR_AREA = {
    fiscal:       ['livre','solicitar_nf','duvida'],
    dpto_pessoal: ['livre','ferias','previa_admissao','contratacao','previa_rescisao','rescisao','duvida'],
    contabil:     ['livre','duvida'],
    societario:   ['livre','duvida'],
    equiparacao:  ['livre','duvida'],
    outros:       ['livre','duvida']
  };
  function tiposDaArea(area){ return TIPOS_POR_AREA[area] || TIPOS_POR_AREA.outros; }
  function opcoesTipo(area, sel){
    return tiposDaArea(area).map(function(t){
      return '<option value="'+t+'"'+(t===sel?' selected':'')+'>'+esc(TIPOS[t][0])+'</option>';
    }).join('');
  }

  // ---- id/código a partir da URL (?id=&codigo= ou #id-codigo) -------------
  function idc(){
    var qs = new URLSearchParams(location.search);
    var id = qs.get('id')||'', cod = qs.get('codigo')||'';
    if(!id){
      var h = (location.hash||'').replace('#','').trim();
      var m = h.match(/^(\d+)-(.+)$/); var s = h.match(/^(\d+)$/);
      if(m){ id=m[1]; cod=m[2]; } else if(s){ id=s[1]; }
    }
    return { id:String(id).replace(/\D/g,''), codigo:String(cod).trim() };
  }
  function jsonp(url){
    return new Promise(function(ok,fail){
      var cb='b4ucb_'+Math.random().toString(36).slice(2);
      var s=document.createElement('script');
      var t=setTimeout(function(){ limpa(); fail(new Error('A API não respondeu.')); }, 20000);
      function limpa(){ clearTimeout(t); try{delete window[cb];}catch(e){window[cb]=undefined;} s.remove(); }
      window[cb]=function(d){ limpa(); ok(d); };
      s.onerror=function(){ limpa(); fail(new Error('Não consegui alcançar a API.')); };
      s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
      document.body.appendChild(s);
    });
  }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  var IC = {
    home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 11 12 4l8 7"/><path d="M6 10v9h12v-9"/></svg>',
    wa:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1 0 12 2Zm5.3 14.1c-.2.6-1.3 1.2-1.8 1.2-.5.1-1 .2-3.3-.7-2.8-1.1-4.6-4-4.7-4.2-.1-.2-1.1-1.5-1.1-2.8 0-1.3.7-2 .9-2.2.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5.2.5.7 1.8.8 1.9.1.1.1.3 0 .5l-.3.5-.4.4c-.1.1-.3.3-.1.6.1.3.7 1.1 1.4 1.7.9.8 1.6 1 1.9 1.2.3.1.5.1.6-.1.2-.2.7-.8.9-1 .2-.3.4-.2.6-.1.2.1 1.5.7 1.7.9.3.1.4.2.5.3.1.2.1.7-.1 1.3Z"/></svg>',
    chat:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 12a8 8 0 0 1-11.5 7.2L3 21l1.8-6.5A8 8 0 1 1 21 12Z"/></svg>',
    help:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M9.2 9.3a2.8 2.8 0 0 1 5.4 1c0 1.8-2.6 2.2-2.6 3.9"/><path d="M12 17.4h.01"/></svg>',
    chk:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m5 13 4 4L19 7"/></svg>'
  };

  var C = idc();
  var linkHome = 'index.html' + (C.id ? '#'+C.id+(C.codigo?'-'+C.codigo:'') : '');
  var linkTickets = 'meustickets.html' + (C.id ? '#'+C.id+(C.codigo?'-'+C.codigo:'') : '');
  var waHref = 'https://wa.me/'+WA+'?text='+encodeURIComponent('Olá, sou cliente back4you'+(C.id?' (ID '+C.id+')':'')+'.');

  // ---- barra fixa ----------------------------------------------------------
  var bar = document.createElement('div');
  bar.className = 'b4u-bar';
  bar.innerHTML =
    '<a class="b4u-logo" href="'+esc(linkHome)+'"><span>back</span><span class="y">4you</span></a>' +
    (CFG.home ? '' :
      '<a class="b4u-btn ghost" href="'+esc(linkHome)+'">'+IC.home+'<span class="b4u-lbl">Início</span></a>') +
    '<a class="b4u-btn wa" href="'+esc(waHref)+'" target="_blank" rel="noopener">'+IC.wa+'<span class="b4u-lbl">WhatsApp</span></a>' +
    '<button type="button" class="b4u-btn call" id="b4u-open">'+IC.chat+'<span class="b4u-lbl">Abrir chamado</span></button>' +
    '<button type="button" class="b4u-icobtn" id="b4u-help" title="Reportar um erro ou pedir ajuda" aria-label="Reportar um erro ou pedir ajuda">'+IC.help+'</button>';
  document.body.insertBefore(bar, document.body.firstChild);
  // publica a altura da barra p/ os cabeçalhos internos grudarem logo abaixo dela
  function medirBarra(){ document.documentElement.style.setProperty('--b4u-bar-h', bar.offsetHeight + 'px'); }
  medirBarra();
  window.addEventListener('resize', medirBarra);
  window.addEventListener('load', medirBarra);

  // ---- modal ---------------------------------------------------------------
  var ov = document.createElement('div');
  ov.className = 'b4u-ov';
  document.body.appendChild(ov);

  function fecharModal(){ ov.classList.remove('on'); ov.innerHTML=''; }

  function abrir(opts){
    opts = opts || {};
    var areaSel = opts.area || CFG.area || 'outros';
    var tipoSel = opts.tipo || 'livre';
    if (tiposDaArea(areaSel).indexOf(tipoSel) < 0) tipoSel = tiposDaArea(areaSel)[0];   // tipo válido p/ a área
    ov.innerHTML =
      '<div class="b4u-modal" role="dialog" aria-modal="true" aria-label="Abrir chamado">' +
        '<h3>Abrir um chamado</h3>' +
        '<div class="b4u-sub">Registramos aqui e retornamos em até 48h úteis. Você pode acompanhar em “Meus chamados”.</div>' +
        '<div class="b4u-fld"><label for="b4u-area">Área</label><select id="b4u-area">' +
          AREAS.map(function(a){ return '<option value="'+a[0]+'"'+(a[0]===areaSel?' selected':'')+'>'+esc(a[1])+'</option>'; }).join('') +
        '</select></div>' +
        '<div class="b4u-fld"><label for="b4u-tipo">Tipo de solicitação</label><select id="b4u-tipo">' +
          opcoesTipo(areaSel, tipoSel) +
        '</select></div>' +
        '<div class="b4u-fld"><label for="b4u-assunto">Assunto</label><input id="b4u-assunto" maxlength="120" placeholder="Resumo em uma linha"></div>' +
        '<div class="b4u-fld"><label for="b4u-msg">Mensagem</label><textarea id="b4u-msg" placeholder="Descreva o que você precisa…"></textarea></div>' +
        '<div class="b4u-err" id="b4u-erro"></div>' +
        '<div class="b4u-foot">' +
          '<button type="button" class="b4u-btn cancel" id="b4u-cancel">Cancelar</button>' +
          '<button type="button" class="b4u-btn primary" id="b4u-send">Enviar chamado</button>' +
        '</div>' +
      '</div>';
    ov.classList.add('on');
    var selTipo = ov.querySelector('#b4u-tipo');
    var txt = ov.querySelector('#b4u-msg');
    function aplicaSkeleton(force){
      var esq = TIPOS[selTipo.value] ? TIPOS[selTipo.value][1] : '';
      if(force || !txt.value.trim()) txt.value = esq;
    }
    aplicaSkeleton(true);
    selTipo.addEventListener('change', function(){ aplicaSkeleton(true); txt.focus(); });
    // trocar a ÁREA repovoa os tipos válidos para ela
    ov.querySelector('#b4u-area').addEventListener('change', function(){
      selTipo.innerHTML = opcoesTipo(this.value, selTipo.value);
      aplicaSkeleton(true);
    });
    ov.querySelector('#b4u-cancel').addEventListener('click', fecharModal);
    ov.addEventListener('click', function(e){ if(e.target===ov) fecharModal(); });
    ov.querySelector('#b4u-send').addEventListener('click', enviar);
    ov.querySelector('#b4u-assunto').focus();
  }

  function enviar(){
    var cc = idc();
    var erroEl = ov.querySelector('#b4u-erro');
    var btn = ov.querySelector('#b4u-send');
    erroEl.textContent = '';
    if(!cc.id || !cc.codigo){ erroEl.textContent = 'Abra o painel pelo seu link (com ID e código) para enviar um chamado.'; return; }
    var area = ov.querySelector('#b4u-area').value;
    var tipo = ov.querySelector('#b4u-tipo').value;
    var assunto = ov.querySelector('#b4u-assunto').value.trim();
    var msg = ov.querySelector('#b4u-msg').value.trim();
    if(!msg){ erroEl.textContent = 'Escreva a mensagem do chamado.'; return; }
    btn.disabled = true; btn.textContent = 'Enviando…';
    var qs = new URLSearchParams({ id:cc.id, codigo:cc.codigo, acao:'ticket',
      area:area, tipo:tipo, assunto:assunto, mensagem:msg });
    jsonp(api()+'?'+qs.toString()).then(function(d){
      if(d && d.erro) throw new Error(d.erro);
      sucesso();
    }).catch(function(e){
      btn.disabled=false; btn.textContent='Enviar chamado';
      erroEl.textContent = e.message || String(e);
    });
  }

  function sucesso(){
    ov.innerHTML =
      '<div class="b4u-modal">' +
        '<div class="b4u-ok">' +
          '<div class="chk">'+IC.chk+'</div>' +
          '<h3>Chamado registrado</h3>' +
          '<p>Recebemos sua solicitação e retornamos em até 48h úteis. Em breve o acompanhamento também chegará por e-mail.</p>' +
          '<div class="b4u-foot" style="position:static;padding:0">' +
            '<button type="button" class="b4u-btn cancel" id="b4u-fecha">Fechar</button>' +
            '<a class="b4u-btn primary" href="'+esc(linkTickets)+'">Ir para meus chamados</a>' +
          '</div>' +
        '</div>' +
      '</div>';
    ov.querySelector('#b4u-fecha').addEventListener('click', fecharModal);
  }

  bar.querySelector('#b4u-open').addEventListener('click', function(){ abrir({}); });
  bar.querySelector('#b4u-help').addEventListener('click', function(){ abrir({ area:'outros', tipo:'livre' }); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape' && ov.classList.contains('on')) fecharModal(); });

  window.B4U = { __ready:true, area: CFG.area||'outros', abrirChamado: abrir, meusTickets: linkTickets };
})();
</script>

<div class="wrap" id="app">
  <div class="state">
    <div class="spin" role="status" aria-label="Carregando"></div>
    <p>Carregando seus chamados…</p>
  </div>
</div>

<footer>back4you · inteligência tributária</footer>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyGAro0qPWpZcVX665KwKd-BK3ouSvVkAj5Vxw_phgO82EDa3gJrURcHjWIPYNQXT5d/exec';

const AREA_LABEL = {
  fiscal:'Fiscal', dpto_pessoal:'Departamento Pessoal', contabil:'Contábil',
  societario:'Societário', equiparacao:'Equiparação', outros:'Outros'
};
const TIPO_LABEL = {
  livre:'Chamado livre', solicitar_nf:'Solicitar nota fiscal', duvida:'Dúvida', ferias:'Solicitar férias',
  previa_admissao:'Prévia de admissão', contratacao:'Formalizar admissão',
  previa_rescisao:'Prévia de rescisão', rescisao:'Formalizar desligamento'
};

function getIdCodigo(){
  const qs = new URLSearchParams(location.search);
  let id = qs.get('id')||'', codigo = qs.get('codigo')||'';
  if(!id){
    const h = location.hash.replace('#','').trim();
    const m = h.match(/^(\d+)-(.+)$/), s = h.match(/^(\d+)$/);
    if(m){ id=m[1]; codigo=m[2]; } else if(s){ id=s[1]; }
  }
  return { id:id.replace(/\D/g,''), codigo:codigo.trim() };
}
function jsonp(url){
  return new Promise((ok,fail)=>{
    const cb='cb_'+Math.random().toString(36).slice(2);
    const s=document.createElement('script');
    const t=setTimeout(()=>{ limpa(); fail(new Error('A API não respondeu.')); },20000);
    function limpa(){ clearTimeout(t); delete window[cb]; s.remove(); }
    window[cb]=d=>{ limpa(); ok(d); };
    s.onerror=()=>{ limpa(); fail(new Error('Não consegui alcançar a API.')); };
    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
    document.body.appendChild(s);
  });
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function classeStatus(st){
  const s = (st||'').toString().toLowerCase();
  if(s.indexOf('conclu')>=0 || s.indexOf('fechad')>=0) return 'concluido';
  if(s.indexOf('respond')>=0 || s.indexOf('andamento')>=0) return 'respondido';
  return 'aberto';
}
function dataBonita(v){
  if(!v) return '';
  const d = new Date(v);
  if(!isNaN(d)) return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
  return esc(v);
}

function render(tickets){
  const app = document.getElementById('app');
  if(!tickets.length){
    app.innerHTML = `
      <div class="cab"><h1>Meus chamados</h1><p>Aqui ficam todas as solicitações que você abriu, de qualquer área.</p></div>
      <div class="state" style="min-height:34vh">
        <h1>Nenhum chamado ainda</h1>
        <p>Quando você abrir um chamado por qualquer painel, ele aparece aqui com o andamento.</p>
        <a class="cta" href="#" onclick="window.B4U&&window.B4U.abrirChamado({});return false;">Abrir um chamado</a>
      </div>`;
    return;
  }
  app.innerHTML = `
    <div class="cab"><h1>Meus chamados</h1><p>${tickets.length} chamado(s). Retornamos em até 48h úteis; respostas aparecem abaixo de cada um.</p></div>
    <div id="lista"></div>`;
  document.getElementById('lista').innerHTML = tickets.map(t=>{
    const cls = classeStatus(t.status);
    const rotStatus = cls==='concluido'?'Concluído':cls==='respondido'?'Respondido':'Aberto';
    const area = AREA_LABEL[(t.area||'').toLowerCase()] || (t.area||'—');
    const tipo = TIPO_LABEL[(t.tipo||'').toLowerCase()] || t.tipo || '';
    return `<div class="tk">
      <div class="top">
        <span class="area">${esc(area)}</span>
        <span class="badge ${cls}">${rotStatus}</span>
        <span class="data">${dataBonita(t.timestamp)}</span>
      </div>
      <h2>${esc(t.assunto || tipo || 'Chamado')}</h2>
      ${tipo && t.assunto ? `<div class="msg" style="font-size:11.5px;color:var(--muted);margin-bottom:6px">${esc(tipo)}</div>`:''}
      <div class="msg">${esc(t.mensagem||'')}</div>
      ${t.resposta ? `<div class="resp"><div class="lbl">Resposta da back4you</div><div class="txt">${esc(t.resposta)}</div></div>`:''}
    </div>`;
  }).join('');
}

function erro(msg){
  // erro de acesso/identidade -> volta para o index; outros erros mostram mensagem
  const s = String(msg||'').toLowerCase();
  if (/inv[aá]lid|c[oó]digo|cliente|acesso/.test(s)){
    const { id, codigo } = getIdCodigo();
    return location.replace('index.html' + (id?('#'+id+(codigo?'-'+codigo:'')):(location.hash||'')));
  }
  document.getElementById('app').innerHTML = `
    <div class="state"><h1>Não deu para carregar</h1><p>${esc(msg)}</p></div>`;
}

(async function(){
  const { id, codigo } = getIdCodigo();
  if(!id || !codigo) return erro('Informe o ID e o código de acesso no final do endereço.');
  try{
    const url = API_URL + '?id='+encodeURIComponent(id)+'&codigo='+encodeURIComponent(codigo)+'&tipo=meus_tickets';
    const d = await jsonp(url);
    if(d.erro) throw new Error(d.erro);
    render(d.tickets || []);
  }catch(e){ erro(e.message || String(e)); }
})();
</script>
</body>
</html>
