<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Equiparação hospitalar — back4you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#F3EFE8; --surface:#FFFFFF; --surface-warm:#FAF6EF;
  --ink:#063033; --ink-2:#3B5551; --muted:#8A7D70; --line:#E7DFD2; --line-2:#D8CDBB;
  --brand-dark:#063033; --brand-teal:#128D84; --brand-eucalipto2:#19AFA4; --accent:#FF8100;
  --receita:#128D84; --receita-soft:#DBEFEC;
  --andamento:#A7715D; --andamento-soft:#F1E1D8;
  --neutro:#5E9C8C; --neutro-soft:#E1EEE9;
  --encerrado:#8E2B20; --encerrado-soft:#F3DEDB;
  --radius:16px; --radius-sm:12px; --sans:'Manrope',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--canvas);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.lbl{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:600}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius)}
:focus-visible{outline:2px solid var(--brand-teal);outline-offset:2px;border-radius:4px}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px 72px}

header{border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:var(--b4u-bar-h,0px);z-index:30}
.bar{max-width:1180px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.logo{font-weight:900;font-size:19px;letter-spacing:-.02em;line-height:1}
.logo .b{color:var(--brand-dark)} .logo .y{color:var(--brand-teal)}
.brand-sub{font-size:15px;color:var(--brand-teal);font-weight:700;margin-top:2px}
.voltar{display:inline-block;font-size:11px;font-weight:600;color:var(--muted);text-decoration:none;margin-bottom:4px}
.voltar:hover{color:var(--brand-teal)}
.spacer{flex:1}
.badge-topo{font-size:11px;font-weight:700;color:var(--brand-teal);background:var(--receita-soft);padding:5px 12px;border-radius:20px}

.docs-chave{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin:28px 0 0}
.doc-chave-card{display:flex;align-items:center;gap:14px;padding:18px 20px;text-decoration:none;color:inherit;transition:border-color .15s}
.doc-chave-card:hover{border-color:var(--brand-teal)}
.doc-chave-icone{flex-shrink:0;width:40px;height:40px;border-radius:10px;background:var(--receita-soft);color:var(--brand-teal);display:flex;align-items:center;justify-content:center}
.doc-chave-icone svg{width:22px;height:22px}
.doc-chave-nome{font-size:13px;font-weight:700;line-height:1.3}
.doc-chave-abrir{font-size:11.5px;font-weight:600;color:var(--brand-teal);margin-top:2px}

.hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin:28px 0 22px}
.stat{padding:18px 18px}
.stat .v{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-top:6px}
.stat .s{font-size:11.5px;color:var(--muted);margin-top:4px}
.stat{border-radius:var(--radius)}
.stat .v{font-weight:800}
.stat.destaque{background:linear-gradient(124deg,var(--brand-dark) 0%,var(--brand-teal) 100%);border:none;box-shadow:0 14px 30px -12px rgba(6,48,51,.55)}
.stat.destaque .lbl,.stat.destaque .s{color:rgba(255,255,255,.8)}
.stat.destaque .v{color:#fff}

.sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin:32px 0 14px}
.sec-head h2{font-size:16px;font-weight:700;letter-spacing:-.01em}
.sec-head p{font-size:13px;color:var(--muted)}

.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.charts{grid-template-columns:1fr}}
.chart{padding:20px 22px 16px}
.chart h3{font-size:14px;font-weight:700;margin-bottom:2px}
.chart .sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.cbox{position:relative;height:220px}
.pie-legend{margin-top:10px}
.pie-legend-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-top:1px solid var(--line);font-size:12.5px}
.pie-legend-row:first-child{border-top:none}
.pie-legend-row i{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.pie-legend-row span{flex:1;color:var(--ink-2)}

table.ped{width:100%;border-collapse:collapse;font-size:13px}
table.ped th{text-align:left;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:0 10px 9px;border-bottom:1px solid var(--line-2)}
table.ped th.r{text-align:right}
table.ped td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top}
table.ped td.r{text-align:right}
table.ped tbody tr.linha{cursor:pointer}
table.ped tbody tr.linha:hover{background:var(--surface-warm)}
table.ped tbody tr:last-child td{border-bottom:none}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.table-scroll table{min-width:640px}
@media(max-width:640px){
  .wrap{padding:0 14px 60px}
  .hero>*,.charts>*,.docs-chave>*{min-width:0}
  .table-scroll{overflow-x:visible;margin:0}
  .table-scroll table,table.ped{min-width:0}
  /* Cada pedido vira um cartão empilhado (mesma info, sem rolagem lateral). */
  table.ped thead{display:none}
  table.ped,table.ped tbody{display:block}
  table.ped tbody tr.linha{display:grid;grid-template-columns:1fr auto;gap:2px 12px;
    border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-top:10px}
  table.ped tbody tr.linha td{display:flex;align-items:baseline;justify-content:space-between;gap:10px;
    padding:3px 0;border:none;font-size:13px}
  table.ped tbody tr.linha td::before{content:attr(data-label);color:var(--muted);font-size:11px;
    font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  /* linha 1: competência (esq) + tributo (dir), destacados, sem rótulo */
  table.ped tbody tr.linha td:nth-child(1){grid-column:1;grid-row:1;font-weight:800;font-size:15px}
  table.ped tbody tr.linha td:nth-child(2){grid-column:2;grid-row:1;justify-content:flex-end;font-weight:700;font-size:12.5px;color:var(--brand-teal)}
  table.ped tbody tr.linha td:nth-child(1)::before,
  table.ped tbody tr.linha td:nth-child(2)::before{display:none}
  /* demais campos: rótulo à esq, valor à dir, largura total */
  table.ped tbody tr.linha td:nth-child(3){grid-column:1/-1;grid-row:2}
  table.ped tbody tr.linha td:nth-child(4){grid-column:1/-1;grid-row:3}
  table.ped tbody tr.linha td:nth-child(5){grid-column:1/-1;grid-row:4}
  table.ped tbody tr.linha td:nth-child(6){grid-column:1/-1;grid-row:5}
  table.ped tbody tr.linha td.num{font-variant-numeric:tabular-nums}
  /* linha de detalhe: bloco de largura total abaixo do cartão */
  table.ped tbody tr.detalhe-row{display:none}
  table.ped tbody tr.detalhe-row.aberto{display:block}
  table.ped tbody tr.detalhe-row td{display:block;padding:6px 0 2px;border:none}
  .sec-head{margin:22px 0 10px}.sec-head h2{font-size:14.5px}
  .hero{gap:12px}.stat .v{font-size:20px}
}

.status-chip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:10px;white-space:nowrap}
.status-andamento{background:var(--andamento-soft);color:var(--andamento)}
.status-concluido{background:var(--receita-soft);color:var(--receita)}
.status-neutro{background:var(--neutro-soft);color:var(--neutro)}
.status-encerrado{background:var(--encerrado-soft);color:var(--encerrado)}

.detalhe-row{display:none}
.detalhe-row.aberto{display:table-row}
.detalhe-row td{padding:0 10px 16px;border-bottom:1px solid var(--line)}
.detalhe-box{background:var(--surface-warm);border-radius:8px;padding:12px 16px;font-size:12.5px}
.detalhe-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px 20px;margin-bottom:8px}
.detalhe-grid div span{display:block;color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.detalhe-explicacao{padding-top:8px;border-top:1px dashed var(--line-2);color:var(--ink-2)}

.lista{padding:8px 24px}
.item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0;border-top:1px solid var(--line)}
.item:first-child{border-top:none}
.item .nome{font-size:13.5px;font-weight:600}
.item .cat{font-size:11px;color:var(--muted);margin-top:2px}
.item a{font-size:12.5px;font-weight:700;color:var(--brand-teal);text-decoration:none;white-space:nowrap}
.item a:hover{color:var(--brand-dark)}
.item .em-breve{font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap}

.vazio{color:var(--muted);font-size:13.5px;padding:24px 20px;text-align:center;line-height:1.7}
.vazio a{color:var(--brand-teal);font-weight:700;text-decoration:none}
.vazio a:hover{text-decoration:underline}

.state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:70vh;text-align:center;padding:0 24px}
.state h1{font-size:19px;font-weight:700}
.state p{color:var(--muted);font-size:14px;max-width:44ch}
.state code{background:var(--surface-warm);padding:2px 6px;border-radius:4px;border:1px solid var(--line);font-size:13px}
.spin{width:26px;height:26px;border:2.5px solid var(--line-2);border-top-color:var(--brand-teal);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
footer{margin-top:44px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}
/* ════════ Dropdowns (accordion nativo <details>) ════════ */
.acc{display:flex;flex-direction:column;gap:10px;margin-top:2px}
.acc-item{background:var(--surface);border:1px solid var(--line);border-left-width:4px;border-radius:14px;overflow:hidden;transition:border-color .15s,box-shadow .15s}
.acc-item.andamento{border-left-color:var(--andamento)}
.acc-item.concluido{border-left-color:var(--receita)}
.acc-item.neutro{border-left-color:var(--neutro)}
.acc-item.encerrado{border-left-color:var(--encerrado)}
.acc-item.acc-all{border-left-color:var(--brand-dark)}
.acc-item[open]{box-shadow:0 12px 30px -14px rgba(6,48,51,.35)}
.acc-item>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:13px;padding:15px 18px}
.acc-item>summary::-webkit-details-marker{display:none}
.acc-item>summary:hover{background:var(--surface-warm)}
.acc-item>summary:focus-visible{outline:2px solid var(--brand-teal);outline-offset:-2px}
.acc-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.acc-head-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.acc-head-title{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.01em}
.acc-head-sub{font-size:12px;color:var(--muted);font-weight:500}
.acc-head-sub b{color:var(--ink-2);font-weight:700}
.acc-val{flex-shrink:0;text-align:right;display:flex;flex-direction:column;gap:0}
.acc-val .v{font-size:17px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
.acc-val .k{font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700}
.acc-item.concluido .acc-val .v{color:var(--receita)}
.chev{flex-shrink:0;width:18px;height:18px;color:var(--muted);transition:transform .22s ease}
.acc-item[open] .chev{transform:rotate(180deg)}
.acc-body{padding:4px 18px 16px;border-top:1px solid var(--line)}
.acc-expl{font-size:12.5px;color:var(--ink-2);line-height:1.55;background:var(--surface-warm);border:1px solid var(--line);border-radius:10px;padding:11px 14px;margin:14px 0 6px}
.mini{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 2px;border-top:1px solid var(--line)}
.mini:first-of-type{border-top:none}
.mini-l{display:flex;align-items:baseline;gap:9px;min-width:0;flex-wrap:wrap}
.mini-l b{font-size:14px;font-weight:800;color:var(--ink)}
.mini-trib{font-size:10.5px;font-weight:700;color:var(--brand-teal);background:var(--receita-soft);padding:2px 9px;border-radius:999px}
.mini-num{display:block;width:100%;font-size:10.5px;color:var(--muted);margin-top:1px;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.mini-r{text-align:right;flex-shrink:0}
.mini-r .v{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.mini-r .k{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700}

/* ── "detalhamento completo": cada PER/DCOMP num dropdown próprio ── */
.pacc{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.pitem{border:1px solid var(--line);border-left:4px solid var(--muted);border-radius:10px;overflow:hidden;background:var(--surface)}
.pitem.andamento{border-left-color:var(--andamento)}
.pitem.concluido{border-left-color:var(--receita)}
.pitem.neutro{border-left-color:var(--neutro)}
.pitem.encerrado{border-left-color:var(--encerrado)}
.pitem>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:11px;padding:12px 14px}
.pitem>summary::-webkit-details-marker{display:none}
.pitem>summary:hover{background:var(--surface-warm)}
.pitem>summary:focus-visible{outline:2px solid var(--brand-teal);outline-offset:-2px}
.pitem-main{flex:1;min-width:0;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.pitem-title{font-size:13.5px;font-weight:800;color:var(--ink);letter-spacing:-.01em}
.pitem-val{flex-shrink:0;font-size:13.5px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.01em;color:var(--ink)}
.pitem.concluido .pitem-val{color:var(--receita)}
.pitem>summary .chev{width:16px;height:16px}
.pitem[open]>summary .chev{transform:rotate(180deg)}
.pitem-body{padding:2px 14px 14px;border-top:1px solid var(--line)}
.pitem-num{font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums;letter-spacing:-.01em;word-break:break-all;margin:10px 0 12px}
.pcard-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.pcard-grid>div{font-size:13px;font-weight:700;color:var(--ink);min-width:0}
.pcard-grid>div span{display:block;font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin-bottom:2px}
.pcard-grid .num{font-variant-numeric:tabular-nums}
.pcard-expl{margin-top:11px;padding-top:10px;border-top:1px dashed var(--line-2);font-size:12px;color:var(--ink-2);line-height:1.5}

/* hero — cores por situação */
.stat.stat-aprovado{background:linear-gradient(135deg,#EAF7EF,#F6FBF8);border-color:#CDE8D7}
.stat.stat-aprovado .lbl{color:#3C7A57}
.stat.stat-aprovado .v{color:#1F9D57}
.stat.stat-analise{background:linear-gradient(135deg,#FCF3DC,#FEFAF1);border-color:#EFDDAE}
.stat.stat-analise .lbl{color:#977519}
.stat.stat-analise .v{color:#B9791A}

/* alerta de pagamento recente (±30 dias) */
.alerta-pgto{display:flex;align-items:center;gap:14px;margin:20px 0 2px;padding:15px 18px;border-radius:16px;
  background:linear-gradient(120deg,#E7F6EF,#F4FBF7);border:1px solid #C6E6D6;box-shadow:0 14px 30px -16px rgba(31,157,87,.6)}
.alerta-pgto-ico{width:40px;height:40px;border-radius:12px;background:#1F9D57;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.alerta-pgto-ico svg{width:22px;height:22px}
.alerta-pgto-txt{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.alerta-pgto-txt b{font-size:15px;font-weight:800;color:#0E5B37;letter-spacing:-.01em}
.alerta-pgto-txt span{font-size:12.5px;color:var(--ink-2)}
.alerta-pgto-btn{flex-shrink:0;border:0;cursor:pointer;font-family:var(--sans);font-weight:800;font-size:13px;
  padding:11px 20px;border-radius:999px;background:#1F9D57;color:#fff;transition:background .15s,transform .1s;white-space:nowrap}
.alerta-pgto-btn:hover{background:#187a44;transform:translateY(-1px)}

/* mini-rows (Pedidos por situação): agora com datas e clicáveis */
.mini{cursor:pointer;border-radius:8px;padding-inline:6px;transition:background .12s}
.mini:hover{background:var(--surface-warm)}
.mini:focus-visible{outline:2px solid var(--brand-teal);outline-offset:-2px}
.mini-datas{display:block;width:100%;font-size:11px;color:var(--muted);margin-top:3px}
.mini-datas .prev{color:#B9791A;font-weight:700}
.mini-datas .pago{color:#1F9D57;font-weight:700}

/* pill "pago" nas situações concluídas recentes */
.pill-pago{font-size:10px;font-weight:800;padding:3px 9px;border-radius:999px;background:#1F9D57;color:#fff;white-space:nowrap}

/* filtros + busca do detalhamento */
.det-filtros{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-top:14px}
.det-busca{position:relative;flex:1 1 220px;min-width:170px}
.det-busca svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted);pointer-events:none}
.det-busca input{width:100%;font-family:var(--sans);font-size:13.5px;padding:10px 14px 10px 36px;border:1px solid var(--line-2);border-radius:999px;background:var(--surface);color:var(--ink)}
.det-busca input:focus{outline:2px solid var(--brand-teal);outline-offset:1px;border-color:transparent}
.det-sel{font-family:var(--sans);font-size:12.5px;font-weight:600;padding:10px 12px;border:1px solid var(--line-2);border-radius:999px;background:var(--surface);color:var(--ink);cursor:pointer}
.det-sel:focus{outline:2px solid var(--brand-teal);outline-offset:1px}
.det-limpar{font-family:var(--sans);font-size:12.5px;font-weight:700;padding:10px 14px;border:1px solid var(--line-2);border-radius:999px;background:none;color:var(--ink-2);cursor:pointer}
.det-limpar:hover{border-color:var(--brand-teal);color:var(--brand-teal)}
.det-count{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:14px 2px 2px}
.det-barra{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-top:14px}
.det-fbtn{display:inline-flex;align-items:center;gap:7px;font-family:var(--sans);font-size:12.5px;font-weight:700;padding:10px 14px;border:1px solid var(--line-2);border-radius:999px;background:var(--surface);color:var(--ink-2);cursor:pointer}
.det-fbtn svg{width:15px;height:15px}
.det-fbtn:hover{border-color:var(--brand-teal);color:var(--brand-teal)}
.det-fbtn.ativo{border-color:#1F9D57;background:#EAF7EF;color:#0E5B37}
.det-fbadge{display:none;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:#1F9D57;color:#fff;font-size:10.5px;font-weight:800;line-height:18px;text-align:center}
.det-fbtn.ativo .det-fbadge{display:inline-block}
.det-painel{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-top:10px;padding:12px;border:1px solid var(--line-2);border-radius:14px;background:var(--surface-warm)}
.det-painel[hidden]{display:none}
.det-painel .det-busca{flex:1 1 220px}
.alerta-pgto-pix{font-size:12px;color:#0E5B37}
.det-vazio{padding:24px;text-align:center;color:var(--muted);font-size:13.5px}
.pitem.flash{animation:b4uflash 1.8s ease}
@keyframes b4uflash{0%,22%{background:#DBEFEC}100%{background:var(--surface)}}

/* Panorama — barra "quanto já voltou" */
.recup{margin-bottom:16px;padding:20px 22px}
.recup-top{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:12px}
.recup-v{font-size:22px;font-weight:800;letter-spacing:-.02em;color:#1F9D57;margin-top:4px}
.recup-de{font-size:12.5px;font-weight:600;color:var(--muted)}

function jsonp(url){
  return new Promise((ok,fail)=>{
    const cb = 'cb_'+Math.random().toString(36).slice(2);
    const s = document.createElement('script');
    const t = setTimeout(()=>{ limpa(); fail(new Error('A API não respondeu.')); }, 20000);
    function limpa(){ clearTimeout(t); delete window[cb]; s.remove(); }
    window[cb] = d => { limpa(); ok(d); };
    s.onerror = () => { limpa(); fail(new Error('Não consegui alcançar a API.')); };
    s.src = url + (url.includes('?')?'&':'?') + 'callback=' + cb;
    document.body.appendChild(s);
  });
}

/* Converte 'AAAA-MM-DD' (ou algo que o Date entenda) num Date local. */
function parseData(s){
  if (!s) return null;
  const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  const d = new Date(s); return isNaN(d.getTime()) ? null : d;
}
/* Dias corridos do envio até o pagamento (se houver) ou até hoje. */
function diasCorridos(p){
  const ini = parseData(p.data_transmissao);
  const fim = p.data_pagamento ? parseData(p.data_pagamento) : new Date();
  if (!ini || !fim) return null;
  return Math.max(0, (fim - ini) / 86400000);
}
/* Humaniza uma quantidade de dias: "23 dias", "8 meses", "1 ano e 3 meses". */
function humanizarDias(d){
  if (d == null) return '—';
  d = Math.round(d);
  if (d < 1) return 'menos de 1 dia';
  if (d < 45) return d === 1 ? '1 dia' : d + ' dias';
  const m = Math.round(d / 30.44);
  if (m < 12) return m === 1 ? '1 mês' : m + ' meses';
  const a = Math.floor(m / 12), r = m % 12;
  let s = a === 1 ? '1 ano' : a + ' anos';
  if (r) s += ' e ' + (r === 1 ? '1 mês' : r + ' meses');
  return s;
}

   Só entram os status oficiais da Receita (STATUS_INFO) que realmente existem. */

  M.pedidos.forEach(p => {
    if (!STATUS_INFO[p.status] && !p._concluido) return;  // situações padronizadas + qualquer pedido já pago/creditado
    (grupos[p.status] = grupos[p.status] || []).push(p);
  });
  const chaves = Object.keys(grupos);
  if (!chaves.length){
    box.outerHTML = '<div class="card"><div class="vazio">Assim que os PER/DCOMPs receberem uma situação oficial da Receita, o resumo por situação aparece aqui.</div></div>';
    return;
  }

  // grupo visual de um status (verde só se todos daquele status já foram pagos)
  const grupoDe = st => {
    const itens = grupos[st];
    const canon = (STATUS_INFO[st] || {}).grupo || 'neutro';
    return itens.every(p => p._concluido) ? 'concluido' : canon;
  };
  chaves.sort((a,b) => {
    const d = GRUPO_ORDER.indexOf(grupoDe(a)) - GRUPO_ORDER.indexOf(grupoDe(b));
    if (d) return d;
    return grupos[b].length - grupos[a].length || a.localeCompare(b);
  });

  box.innerHTML = chaves.map(st => {
    const itens = grupos[st];
    const g = grupoDe(st);
    const concluido = g === 'concluido';
    const n = itens.length;
    const valorDe = p => concluido ? (num(p.valor_aprovado) || num(p.valor_atualizado)) : num(p.valor_atualizado);
    const valor = itens.reduce((s,p) => s + valorDe(p), 0);
    const tempos = itens.map(diasCorridos).filter(x => x != null);
    const media = tempos.length ? tempos.reduce((a,b)=>a+b,0) / tempos.length : null;
    const tempoLbl = concluido ? 'tempo médio até o pagamento' : 'tempo médio desde o envio';
    const expl = (STATUS_INFO[st] || {}).txt || '';
    const kLabel = concluido ? 'aprovado' : 'atualizado';

    const itensOrd = itens.slice().sort((a,b) => a._comp.ord - b._comp.ord || String(a.tributo).localeCompare(String(b.tributo)));
    const mini = itensOrd.map(p => {
      const ip = infoPagamento(p);
      const rec = pagamentoRecente(p);
      return `
      <div class="mini" data-key="${esc(p.numero_per_dcomp)}" role="button" tabindex="0" title="Abrir este PER/DCOMP no detalhamento">
        <div class="mini-l">
          <b>${p._comp.label}</b>
          <span class="mini-trib">${esc(p.tributo)}</span>
          ${rec ? '<span class="pill-pago">✓ pago</span>' : ''}
          <span class="mini-num">${esc(p.numero_per_dcomp)}</span>
          <span class="mini-datas">Transmissão ${dBR(p.data_transmissao)} · <span class="${ip.cls}">${ip.txt}</span></span>
        </div>
        <div class="mini-r"><div class="v">${brl(valorDe(p))}</div><div class="k">${kLabel}</div></div>
      </div>`;
    }).join('');

    return `
      <details class="acc-item ${g}">
        <summary>
          <span class="acc-dot" style="background:${GRUPO_COR[g]}"></span>
          <span class="acc-head-main">
            <span class="acc-head-title">${esc(st)}</span>
            <span class="acc-head-sub"><b>${n} PER/DCOMP</b> · ${tempoLbl}: <b>${humanizarDias(media)}</b></span>
          </span>
          <span class="acc-val"><span class="v num">${brl(valor)}</span><span class="k">${kLabel}</span></span>
          <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        </summary>
        <div class="acc-body">
          ${expl ? `<div class="acc-expl">${expl}</div>` : ''}
          ${mini}
        </div>
      </details>`;
  }).join('');

  // clicar numa linha (PER/DCOMP específico) abre o pedido correspondente no detalhamento
  box.addEventListener('click', e => {
    const row = e.target.closest('.mini[data-key]'); if (row) irParaPedido(row.dataset.key);
  });
  box.addEventListener('keydown', e => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const row = e.target.closest('.mini[data-key]'); if (row){ e.preventDefault(); irParaPedido(row.dataset.key); }
  });
}

/* ===== Detalhamento completo: filtro + busca + um dropdown por PER/DCOMP ===== */
const FILTRO = { busca:'', ano:'', situacao:'', pagamento:'' };
let DETPEDIDOS = [];
let ORDEM = 'comp';   // 'comp' | 'pgto' | 'valor-desc' | 'valor-asc'
function valorPedido(p){ return p._concluido ? (num(p.valor_aprovado) || num(p.valor_atualizado)) : num(p.valor_atualizado); }
function ordenarDet(arr){
  const a = arr.slice();
  if (ORDEM === 'valor-desc') a.sort((x,y)=> valorPedido(y) - valorPedido(x));
  else if (ORDEM === 'valor-asc') a.sort((x,y)=> valorPedido(x) - valorPedido(y));
  else if (ORDEM === 'pgto') a.sort((x,y)=>{ const dx=parseData(x.data_pagamento), dy=parseData(y.data_pagamento); if(!dx&&!dy) return 0; if(!dx) return 1; if(!dy) return -1; return dy - dx; });
  else a.sort((x,y)=> x._comp.ord - y._comp.ord || String(x.tributo).localeCompare(String(y.tributo)));
  return a;
}
function filtrosAtivos(){ return ['busca','ano','situacao','pagamento'].filter(k => FILTRO[k]).length; }
function atualizarBotaoFiltros(){
  const btn = document.getElementById('det-fbtn'); if (!btn) return;
  const n = filtrosAtivos();
  btn.classList.toggle('ativo', n > 0);
  const badge = document.getElementById('det-fbadge'); if (badge) badge.textContent = n || '';
}

/* Pagamento dentro da janela de ±30 dias de hoje (passado recente OU previsto próximo). */
function pagamentoRecente(p){
  if (!p.data_pagamento) return false;
  const d = parseData(p.data_pagamento); if (!d) return false;
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const dias = (d - hoje) / 86400000;
  return dias >= -30 && dias <= 30;
}
/* Rótulo de pagamento: "Pago em…" (passado) ou "Pagamento previsto…" (futuro). */
function infoPagamento(p){
  if (!p.data_pagamento) return { txt:'Pagamento a definir', cls:'' };
  const d = parseData(p.data_pagamento); const hoje = new Date(); hoje.setHours(0,0,0,0);
  if (d && d > hoje) return { txt:'Pagamento previsto ' + dBR(p.data_pagamento), cls:'prev', futuro:true };
  return { txt:'Pago em ' + dBR(p.data_pagamento), cls:'pago' };
}
function passaFiltro(p){
  if (FILTRO.ano && String(p._comp.ano) !== FILTRO.ano) return false;
  if (FILTRO.situacao){
    const t = FILTRO.situacao;
    if (t.slice(0,2) === 'g:' && p._grupo !== t.slice(2)) return false;
    if (t.slice(0,2) === 's:' && p.status !== t.slice(2)) return false;
  }
  if (FILTRO.pagamento === 'com' && !p.data_pagamento) return false;
  if (FILTRO.pagamento === 'sem' && p.data_pagamento) return false;
  if (FILTRO.pagamento === 'recente' && !pagamentoRecente(p)) return false;
  if (FILTRO.busca){
    const q = normTxt(FILTRO.busca);
    const hay = normTxt([p.numero_per_dcomp, p._comp.label, p.tributo, p.status].join(' '));
    if (!hay.includes(q)) return false;
  }
  return true;
}
function cardDetalhe(p){
  const vShown = p._concluido ? (num(p.valor_aprovado) || num(p.valor_atualizado)) : num(p.valor_atualizado);
  const ip = infoPagamento(p);
  const rec = pagamentoRecente(p);
  const lblPg = ip.futuro ? 'Pagamento previsto' : 'Data de pagamento';
  return `
    <details class="pitem ${p._grupo}" data-key="${esc(p.numero_per_dcomp)}">
      <summary>
        <span class="acc-dot" style="background:${GRUPO_COR[p._grupo] || PAL.muted}"></span>
        <span class="pitem-main">
          <span class="pitem-title">${p._comp.label} · ${esc(p.tributo)}</span>
          <span class="status-chip status-${p._grupo}">${esc(p.status)}</span>
          ${rec ? '<span class="pill-pago">✓ pago</span>' : ''}
        </span>
        <span class="pitem-val num">${brl(vShown)}</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
      </summary>
      <div class="pitem-body">
        <div class="pitem-num">PER/DCOMP ${esc(p.numero_per_dcomp)}</div>
        <div class="pcard-grid">
          <div><span>Competência</span>${p._comp.label}</div>
          <div><span>Tributo</span>${esc(p.tributo)}</div>
          <div><span>Transmissão</span>${dBR(p.data_transmissao)}</div>
          <div class="num"><span>Solicitado</span>${brl2(p.valor_solicitado)}</div>
          <div class="num"><span>SELIC acumulada</span>${(num(p.selic_pct)).toLocaleString('pt-BR',{minimumFractionDigits:2})}%</div>
          <div class="num"><span>Valor atualizado</span>${brl2(p.valor_atualizado)}</div>
          <div><span>${lblPg}</span>${dBR(p.data_pagamento)}</div>
          <div class="num"><span>Valor aprovado</span>${p._concluido ? brl2(p.valor_aprovado) : '—'}</div>
        </div>
        ${p._explicacao ? `<div class="pcard-expl">${p._explicacao}</div>` : ''}
      </div>
    </details>`;
}
function renderListaDetalhe(){
  const lista = document.getElementById('det-lista'); if (!lista) return;
  const arr = ordenarDet(DETPEDIDOS.filter(passaFiltro));
  const cont = document.getElementById('det-count');
  if (cont) cont.textContent = arr.length === DETPEDIDOS.length
    ? `${DETPEDIDOS.length} PER/DCOMP`
    : `${arr.length} de ${DETPEDIDOS.length} PER/DCOMP`;
  lista.innerHTML = arr.length ? arr.map(cardDetalhe).join('') : '<div class="det-vazio">Nenhum PER/DCOMP com esses filtros.</div>';
  atualizarBotaoFiltros();
}
function sincronizarControles(){
  const b = document.getElementById('pedidos-detalhe'); if (!b) return;
  const q = b.querySelector('#det-q'), fa = b.querySelector('#det-ano'), fs = b.querySelector('#det-sit'), fp = b.querySelector('#det-pag');
  if (q) q.value = FILTRO.busca; if (fa) fa.value = FILTRO.ano; if (fs) fs.value = FILTRO.situacao; if (fp) fp.value = FILTRO.pagamento;
  const fo = b.querySelector('#det-ordem'); if (fo) fo.value = ORDEM;
}
/* Aplica um conjunto de filtros do zero, abre o detalhamento e rola até ele. */
function filtrarDetalhe(patch, scroll){
  Object.assign(FILTRO, { busca:'', ano:'', situacao:'', pagamento:'' }, patch || {});
  const outer = document.getElementById('det-outer'); if (outer) outer.open = true;
  sincronizarControles();
  renderListaDetalhe();
  if (scroll !== false){ const el = document.getElementById('pedidos-detalhe'); if (el) el.scrollIntoView({ behavior:'smooth', block:'start' }); }
}
/* Deep-link para um PER/DCOMP específico: limpa filtros, abre e destaca o pedido. */
function irParaPedido(numero){
  Object.assign(FILTRO, { busca:'', ano:'', situacao:'', pagamento:'' });
  const outer = document.getElementById('det-outer'); if (outer) outer.open = true;
  sincronizarControles();
  renderListaDetalhe();
  const alvo = document.querySelector('#det-lista .pitem[data-key="' + String(numero).replace(/"/g,'\\"') + '"]');
  if (alvo){
    alvo.open = true;
    alvo.classList.remove('flash'); void alvo.offsetWidth; alvo.classList.add('flash');
    alvo.scrollIntoView({ behavior:'smooth', block:'center' });
  } else {
    const el = document.getElementById('pedidos-detalhe'); if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  }
}

function construirDetalheTodos(M){

  if (!box) return;

  const sitOpts = '<option value="">Todas as situações</option>'
    + '<optgroup label="Grupo">' + gruposPres.map(g => `<option value="g:${g}">${GRUPO_NOME[g]}</option>`).join('') + '</optgroup>'
    + '<optgroup label="Situação (Receita)">' + statusPres.map(s => `<option value="s:${esc(s)}">${esc(s)}</option>`).join('') + '</optgroup>';
  const lupa = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>';

  box.innerHTML = `
    <details class="acc-item acc-all" id="det-outer">
      <summary>
        <span class="acc-dot" style="background:${PAL.petroleo}"></span>
        <span class="acc-head-main">
          <span class="acc-head-title">Todos os PER/DCOMPs em detalhe</span>
          <span class="acc-head-sub">Filtre, busque e abra cada pedido individualmente</span>
        </span>
        <span class="acc-val"><span class="v num">${DETPEDIDOS.length}</span><span class="k">pedidos</span></span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
      </summary>
      <div class="acc-body">
        <div class="det-barra">
          <button type="button" class="det-fbtn" id="det-fbtn" aria-expanded="false" aria-controls="det-painel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5h18M6 12h12M10 19h4"/></svg>
            Filtros <span class="det-fbadge" id="det-fbadge"></span>
          </button>
          <select id="det-ordem" class="det-sel" aria-label="Ordenar">
            <option value="comp">Ordenar: competência</option>
            <option value="pgto">Ordenar: data de pagamento</option>
            <option value="valor-desc">Ordenar: maior valor</option>
            <option value="valor-asc">Ordenar: menor valor</option>
          </select>
          <button type="button" class="det-limpar" id="det-limpar">Limpar filtros</button>
        </div>
        <div class="det-painel" id="det-painel" hidden>
          <div class="det-busca">${lupa}<input id="det-q" type="search" placeholder="Buscar por nº, competência, tributo…" autocomplete="off"></div>
          <select id="det-ano" class="det-sel" aria-label="Filtrar por ano"><option value="">Todos os anos</option>${anos.map(a=>`<option value="${a}">${a}</option>`).join('')}</select>
          <select id="det-sit" class="det-sel" aria-label="Filtrar por situação">${sitOpts}</select>
          <select id="det-pag" class="det-sel" aria-label="Filtrar por pagamento">

    </details>`;

  const q = box.querySelector('#det-q'), fa = box.querySelector('#det-ano'), fs = box.querySelector('#det-sit'), fp = box.querySelector('#det-pag');

  fa.addEventListener('change', () => { FILTRO.ano = fa.value; renderListaDetalhe(); });
  fs.addEventListener('change', () => { FILTRO.situacao = fs.value; renderListaDetalhe(); });

  fbtn.addEventListener('click', () => {
    const abrir = painel.hasAttribute('hidden');

    fbtn.setAttribute('aria-expanded', abrir ? 'true' : 'false');
  });
  box.querySelector('#det-limpar').addEventListener('click', () => filtrarDetalhe({}, false));
  renderListaDetalhe();

/* Banner de pagamento: destaca créditos com data de pagamento dentro de ±30 dias. */
function construirAlertaPagamento(M){
  const box = document.getElementById('alerta-pagamento'); if (!box) return;
  const rec = (M.pedidos || []).filter(pagamentoRecente);
  if (!rec.length){ box.remove(); return; }
  const total = rec.reduce((s,p) => s + (num(p.valor_aprovado) || num(p.valor_atualizado)), 0);
  const datas = rec.map(p => parseData(p.data_pagamento)).filter(Boolean).sort((a,b)=>a-b);
  const fmt = d => d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric' });
  const periodo = datas.length ? (datas.length > 1 ? `entre ${fmt(datas[0])} e ${fmt(datas[datas.length-1])}` : `em ${fmt(datas[0])}`) : '';
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const algumFuturo = rec.some(p => { const d = parseData(p.data_pagamento); return d && d > hoje; });
  const n = rec.length;
  box.className = 'alerta-pgto';
  box.innerHTML = `
    <div class="alerta-pgto-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 10h20"/><path d="M6 15h5"/></svg></div>
    <div class="alerta-pgto-txt">
      <b>${n} pagamento${n>1?'s':''} ${algumFuturo?'a caminho':('recente'+(n>1?'s':''))} · ${brl(total)}</b>
      <span>${algumFuturo?'Crédito com pagamento':'Crédito creditado'} ${periodo}. Confira antes que passe despercebido.</span>
      <span class="alerta-pgto-pix">O valor é depositado pela Receita via PIX na conta bancária do CNPJ — verifique se a conta está ativa e funcionando para receber.</span>
    </div>
    <button type="button" class="alerta-pgto-btn" id="alerta-pgto-btn">Ver pagamentos</button>`;
  box.querySelector('#alerta-pgto-btn').addEventListener('click', () => filtrarDetalhe({ pagamento:'recente' }));
}

function desenharGraficos(M){
  const P = M.pedidos;
  const donutOpts = {responsive:true, maintainAspectRatio:false, animation:{duration:500}, cutout:'60%',
    plugins:{legend:{display:false},
      tooltip:{backgroundColor:PAL.petroleo, padding:10, cornerRadius:6,
        bodyFont:{family:'Montserrat',size:12}, callbacks:{label:c=>' '+c.label+': '+brl(c.parsed)}}}};
  const barOpts = {responsive:true, maintainAspectRatio:false, animation:{duration:500},
    plugins:{legend:{display:false}, tooltip:{backgroundColor:PAL.petroleo, padding:10, cornerRadius:6,
      bodyFont:{family:'Montserrat',size:12}, callbacks:{label:c=>' '+c.dataset.label+': '+brl(c.parsed.y)}}},
    scales:{x:{grid:{display:false}, ticks:{color:PAL.muted, font:{family:'Montserrat',size:11}}},
      y:{grid:{color:'#EDE4D6'}, border:{display:false}, ticks:{color:PAL.muted, font:{family:'Montserrat',size:11},
        callback:v=>'R$ '+(v/1000).toLocaleString('pt-BR')+'k'}}}};

  // c1: situação — soma do VALOR atualizado por grupo, não quantidade de pedidos
  const porGrupo = {};
  P.forEach(p=>{ porGrupo[p._grupo] = (porGrupo[p._grupo]||0) + num(p.valor_atualizado); });
  const gruposUsados = Object.keys(porGrupo);
  new Chart(document.getElementById('c1'), {
    type:'doughnut',
    data:{labels:gruposUsados.map(g=>GRUPO_NOME[g]), datasets:[{data:gruposUsados.map(g=>porGrupo[g]),
      backgroundColor:gruposUsados.map(g=>GRUPO_COR[g]), borderWidth:0}]},
    options:{...donutOpts,
      onHover:(e,els)=>{ if(e.native&&e.native.target) e.native.target.style.cursor = els.length?'pointer':'default'; },
      onClick:(e,els)=>{ if(els.length) filtrarDetalhe({situacao:'g:'+gruposUsados[els[0].index]}); }}
  });
  const c1lg = document.getElementById('c1-lg');
  c1lg.innerHTML = gruposUsados.map(g=>
    `<div class="pie-legend-row" data-g="${g}" style="cursor:pointer"><i style="background:${GRUPO_COR[g]}"></i><span>${GRUPO_NOME[g]}</span><b class="num">${brl(porGrupo[g])}</b></div>`
  ).join('');
  c1lg.querySelectorAll('.pie-legend-row').forEach(row => row.addEventListener('click', () => filtrarDetalhe({ situacao:'g:'+row.dataset.g })));

  // c4: VALORES POR ANO — barra marrom (total pleiteado) com a verde (aprovado) sobreposta.
  // "Aprovado" = análise concluída: tem data de pagamento OU status homologado/deferido/creditado/pago.
  const aprovadoDe = p => {
    const ok = !!p.data_pagamento || /homolog|deferid|credit|aprovad|\bpag/i.test(normTxt(p.status || ''));
    if (!ok) return 0;
    return num(p.valor_aprovado) > 0 ? num(p.valor_aprovado) : num(p.valor_atualizado);
  };
  const porAno = {};
  P.forEach(p=>{
    const ano = p._comp.ano || 0;
    porAno[ano] = porAno[ano] || {total:0, aprovado:0};
    porAno[ano].total += num(p.valor_atualizado);
    porAno[ano].aprovado += aprovadoDe(p);
  });
  const anos = Object.keys(porAno).sort();
  const totalGeral = anos.reduce((s,a)=>s+porAno[a].total,0);
  const aprovadoGeral = anos.reduce((s,a)=>s+porAno[a].aprovado,0);
  new Chart(document.getElementById('c4'), {
    type:'bar',
    data:{labels:anos, datasets:[
      // barra grande marrom (total) ao fundo; barra verde (aprovado) sobreposta e mais estreita
      {label:'Total pleiteado', data:anos.map(a=>porAno[a].total), backgroundColor:PAL.couro,
        borderRadius:4, categoryPercentage:0.7, barPercentage:0.9, grouped:false, order:2},
      {label:'Aprovado', data:anos.map(a=>porAno[a].aprovado), backgroundColor:PAL.eucalipto2,
        borderRadius:4, categoryPercentage:0.7, barPercentage:0.5, grouped:false, order:1},
    ]},
    options:{...barOpts,
      onHover:(e,els)=>{ if(e.native&&e.native.target) e.native.target.style.cursor = els.length?'pointer':'default'; },
      onClick:(e,els)=>{ if(els.length) filtrarDetalhe({ano:String(anos[els[0].index])}); },
      plugins:{...barOpts.plugins, legend:{display:false}, tooltip:{...barOpts.plugins.tooltip}}}
  });
  document.getElementById('c4-lg').innerHTML =
    `<div class="pie-legend-row"><i style="background:${PAL.couro}"></i><span>Total pleiteado</span><b class="num">${brl(totalGeral)}</b></div>` +
    `<div class="pie-legend-row"><i style="background:${PAL.eucalipto2}"></i><span>Aprovado</span><b class="num">${brl(aprovadoGeral)}</b></div>`;

  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const concl = P.filter(p => p._concluido);

  // --- "Quanto já voltou": barra de progresso aprovado ÷ pleiteado ---
  const totAtual = P.reduce((s,p)=>s+num(p.valor_atualizado),0);
  const totAprov = concl.reduce((s,p)=>s+(num(p.valor_aprovado)||num(p.valor_atualizado)),0);
  const pctRec = totAtual ? Math.round(totAprov/totAtual*100) : 0;
  const recup = document.getElementById('recup');
  if (recup) recup.innerHTML = `
    <div class="recup-top">
      <div>
        <span class="lbl">Quanto já voltou</span>
        <div class="recup-v num">${brl(totAprov)} <span class="recup-de">de ${brl(totAtual)} pleiteados</span></div>
      </div>
      <div class="recup-pct num">${pctRec}%</div>
    </div>
    <div class="recup-bar"><div class="recup-fill" style="width:${Math.max(2,pctRec)}%"></div></div>
    <div class="recup-legs">
      <span><i class="dot-ap"></i>Já aprovado · ${brl(totAprov)}</span>
      <span><i class="dot-an"></i>Falta aprovar · ${brl(totAtual-totAprov)}</span>
    </div>`;

  // --- Linha do tempo de pagamentos (recebido x previsto, por mês) ---
  const MES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const porMesPag = {};
  P.forEach(p=>{
    if (!p.data_pagamento) return;
    const d = parseData(p.data_pagamento); if (!d) return;
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    (porMesPag[key] = porMesPag[key] || {v:0, fut:false}).v += num(p.valor_aprovado)||num(p.valor_atualizado);
    if (d > hoje) porMesPag[key].fut = true;
  });
  const mesesPag = Object.keys(porMesPag).sort();
  const c5 = document.getElementById('c5');
  if (c5 && mesesPag.length){
    const labels = mesesPag.map(m=>{ const [a,mm]=m.split('-'); return MES[+mm-1]+'/'+a.slice(2); });
    new Chart(c5, {
      type:'bar',
      data:{labels, datasets:[{data:mesesPag.map(m=>porMesPag[m].v),
        backgroundColor:mesesPag.map(m=>porMesPag[m].fut?'#B9791A':'#1F9D57'), borderRadius:6, maxBarThickness:54}]},
      options:{...barOpts, plugins:{...barOpts.plugins, legend:{display:false},
        tooltip:{...barOpts.plugins.tooltip, callbacks:{label:c=>' '+brl(c.parsed.y)}}}}
    });
    const recebido = mesesPag.filter(m=>!porMesPag[m].fut).reduce((s,m)=>s+porMesPag[m].v,0);
    const previsto = mesesPag.filter(m=>porMesPag[m].fut).reduce((s,m)=>s+porMesPag[m].v,0);
    document.getElementById('c5-lg').innerHTML =
      (recebido>0 ? `<div class="pie-legend-row"><i style="background:#1F9D57"></i><span>Recebido</span><b class="num">${brl(recebido)}</b></div>` : '') +
      (previsto>0 ? `<div class="pie-legend-row"><i style="background:#B9791A"></i><span>Previsto</span><b class="num">${brl(previsto)}</b></div>` : '');
  } else {
    const card = c5 ? c5.closest('.card') : null; if (card) card.remove();
  }

  // --- Funil de etapas (valor em cada fase) ---
  const pagos = P.filter(p=>{ const d = parseData(p.data_pagamento); return d && d <= hoje; });
  const somaAtual = arr => arr.reduce((s,p)=>s+num(p.valor_atualizado),0);
  const somaAprov = arr => arr.reduce((s,p)=>s+(num(p.valor_aprovado)||num(p.valor_atualizado)),0);
  const etapas = [
    {nome:'Transmitidos',      n:P.length,     v:somaAtual(P),     cor:PAL.petroleo},
    {nome:'Análise concluída', n:concl.length, v:somaAtual(concl), cor:PAL.teal},
    {nome:'Pagos',             n:pagos.length, v:somaAprov(pagos), cor:'#1F9D57'},
  ];
  const baseV = etapas[0].v || 1;
  const funil = document.getElementById('funil');
  if (funil) funil.innerHTML = etapas.map(e=>{
    const w = Math.max(16, Math.round(e.v/baseV*100));
    return `<div class="funil-row">
        <div class="funil-bar" style="width:${w}%;background:${e.cor}"><span>${e.nome}</span></div>
        <div class="funil-meta"><b>${e.n}</b> · ${brl(e.v)}</div>
      </div>`;
  }).join('');
}

async function carregarModelos(){
  if (API_URL){
    const { id, codigo } = IDENTIDADE;
    const url = API_URL + '?id=' + encodeURIComponent(id) + '&codigo=' + encodeURIComponent(codigo) + '&tipo=modelos';
    const d = await jsonp(url);
    return (d && d.modelos) || [];
  }
  const r = await fetch('demo_modelos.json');
  if (!r.ok) return [];
  const d = await r.json();
  return d.modelos || [];
}

function normTxt(s){ return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim(); }

/** Junta os documentos específicos deste cliente (Relatório de Adequação Jurídica etc.)
    com os modelos genéricos da categoria Equiparação (Modelo de emissão de NF etc.). */
function desenharDocumentos(M, modelos){
  const box = document.getElementById('documentos-equip');
  if (!box) return;
  const doCategoria = (modelos||[]).filter(m => normTxt(m.categoria) === normTxt('Equiparação'));
  const todos = [...(M.documentos||[]), ...doCategoria].filter(d => d.link && String(d.link).trim());
  if (!todos.length){ box.innerHTML = '<div class="vazio" style="padding:16px 0;text-align:center;color:var(--muted)">Nenhum documento cadastrado ainda.</div>'; return; }
  box.innerHTML = todos.map(d=>{
    const nome = d.documento;
    const link = String(d.link).trim();
    return `<div class="item">
      <div><div class="nome">${nome}</div>${d.categoria?`<div class="cat">Modelo padrão</div>`:''}</div>
      <a href="${link}" target="_blank" rel="noopener">Abrir ↗</a>
    </div>`;
  }).join('');
}

// Em subpágina, qualquer falha de acesso volta direto para o index (que trata código expirado / áreas da pessoa).
function erro(msg){ const {id,codigo}=getIdCodigo(); location.replace('index.html'+(id?('#'+id+(codigo?'-'+codigo:'')):(location.hash||''))); }

(async function(){
  try {
    const raw = await carregar();
    const M = preparar(raw);
    render(M);
    carregarModelos().then(modelos => desenharDocumentos(M, modelos)).catch(()=>desenharDocumentos(M, []));
  } catch (e) {
    erro(e.message || String(e));
  }
})();
</script>
