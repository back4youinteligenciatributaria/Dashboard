<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Equiparação hospitalar — back4you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#F1E7DC; --surface:#FFFFFF; --surface-warm:#FBF6EF;
  --ink:#113D39; --ink-2:#3F5854; --muted:#8A7D70; --line:#E4D9C9; --line-2:#D6C3AC;
  --brand-dark:#073034; --brand-teal:#0F8C85; --brand-eucalipto2:#3FA680;
  --receita:#0F8C85; --receita-soft:#DCEFEC;
  --andamento:#A7715D; --andamento-soft:#F1E1D8;
  --neutro:#649C8A; --neutro-soft:#E1EEE9;
  --encerrado:#731007; --encerrado-soft:#F3DEDB;
  --radius:12px; --sans:'Montserrat',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--canvas);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.lbl{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:600}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius)}
:focus-visible{outline:2px solid var(--brand-teal);outline-offset:2px;border-radius:4px}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px 72px}

header{border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:var(--b4u-bar-h,0px);z-index:30}
.bar{max-width:1180px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.logo{font-weight:900;font-size:19px;letter-spacing:-.02em;line-height:1}
.logo .b{color:var(--brand-dark)} .logo .y{color:var(--brand-teal)}
.brand-sub{font-size:15px;color:var(--brand-teal);font-weight:700;margin-top:2px}
.voltar{display:inline-block;font-size:11px;font-weight:600;color:var(--muted);text-decoration:none;margin-bottom:4px}
.voltar:hover{color:var(--brand-teal)}
.spacer{flex:1}
.badge-topo{font-size:11px;font-weight:700;color:var(--brand-teal);background:var(--receita-soft);padding:5px 12px;border-radius:20px}

.docs-chave{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin:28px 0 0}
.doc-chave-card{display:flex;align-items:center;gap:14px;padding:18px 20px;text-decoration:none;color:inherit;transition:border-color .15s}
.doc-chave-card:hover{border-color:var(--brand-teal)}
.doc-chave-icone{flex-shrink:0;width:40px;height:40px;border-radius:10px;background:var(--receita-soft);color:var(--brand-teal);display:flex;align-items:center;justify-content:center}
.doc-chave-icone svg{width:22px;height:22px}
.doc-chave-nome{font-size:13px;font-weight:700;line-height:1.3}
.doc-chave-abrir{font-size:11.5px;font-weight:600;color:var(--brand-teal);margin-top:2px}

.hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin:28px 0 22px}
.stat{padding:18px 18px}
.stat .v{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-top:6px}
.stat .s{font-size:11.5px;color:var(--muted);margin-top:4px}
.stat.destaque{background:linear-gradient(135deg,var(--brand-teal),var(--brand-eucalipto2));border:none}
.stat.destaque .lbl,.stat.destaque .s{color:rgba(255,255,255,.8)}
.stat.destaque .v{color:#fff}

.sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin:32px 0 14px}
.sec-head h2{font-size:16px;font-weight:700;letter-spacing:-.01em}
.sec-head p{font-size:13px;color:var(--muted)}

.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.charts{grid-template-columns:1fr}}
.chart{padding:20px 22px 16px}
.chart h3{font-size:14px;font-weight:700;margin-bottom:2px}
.chart .sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.cbox{position:relative;height:220px}
.pie-legend{margin-top:10px}
.pie-legend-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-top:1px solid var(--line);font-size:12.5px}
.pie-legend-row:first-child{border-top:none}
.pie-legend-row i{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.pie-legend-row span{flex:1;color:var(--ink-2)}

table.ped{width:100%;border-collapse:collapse;font-size:13px}
table.ped th{text-align:left;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:0 10px 9px;border-bottom:1px solid var(--line-2)}
table.ped th.r{text-align:right}
table.ped td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top}
table.ped td.r{text-align:right}
table.ped tbody tr.linha{cursor:pointer}
table.ped tbody tr.linha:hover{background:var(--surface-warm)}
table.ped tbody tr:last-child td{border-bottom:none}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.table-scroll table{min-width:640px}
@media(max-width:640px){
  .wrap{padding:0 14px 60px}
  .hero>*,.charts>*,.docs-chave>*{min-width:0}
  .table-scroll{overflow-x:auto}
  .table-scroll table,table.ped{min-width:0}
  table.ped{font-size:12px}
  table.ped th,table.ped td{padding:8px 5px}
  table.ped th:first-child,table.ped td:first-child{padding-left:0}
  table.ped th:last-child,table.ped td:last-child{padding-right:0}
  .sec-head{margin:22px 0 10px}.sec-head h2{font-size:14.5px}
  .hero{gap:12px}.stat .v{font-size:20px}
}

.status-chip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:10px;white-space:nowrap}
.status-andamento{background:var(--andamento-soft);color:var(--andamento)}
.status-concluido{background:var(--receita-soft);color:var(--receita)}
.status-neutro{background:var(--neutro-soft);color:var(--neutro)}
.status-encerrado{background:var(--encerrado-soft);color:var(--encerrado)}

.detalhe-row{display:none}
.detalhe-row.aberto{display:table-row}
.detalhe-row td{padding:0 10px 16px;border-bottom:1px solid var(--line)}
.detalhe-box{background:var(--surface-warm);border-radius:8px;padding:12px 16px;font-size:12.5px}
.detalhe-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px 20px;margin-bottom:8px}
.detalhe-grid div span{display:block;color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.detalhe-explicacao{padding-top:8px;border-top:1px dashed var(--line-2);color:var(--ink-2)}

.lista{padding:8px 24px}
.item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0;border-top:1px solid var(--line)}
.item:first-child{border-top:none}
.item .nome{font-size:13.5px;font-weight:600}
.item .cat{font-size:11px;color:var(--muted);margin-top:2px}
.item a{font-size:12.5px;font-weight:700;color:var(--brand-teal);text-decoration:none;white-space:nowrap}
.item a:hover{color:var(--brand-dark)}
.item .em-breve{font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap}

.vazio{color:var(--muted);font-size:13.5px;padding:24px 20px;text-align:center;line-height:1.7}
.vazio a{color:var(--brand-teal);font-weight:700;text-decoration:none}
.vazio a:hover{text-decoration:underline}

.state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:70vh;text-align:center;padding:0 24px}
.state h1{font-size:19px;font-weight:700}
.state p{color:var(--muted);font-size:14px;max-width:44ch}
.state code{background:var(--surface-warm);padding:2px 6px;border-radius:4px;border:1px solid var(--line);font-size:13px}
.spin{width:26px;height:26px;border:2.5px solid var(--line-2);border-top-color:var(--brand-teal);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
footer{margin-top:44px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
</style>
</head>
<body>
<!--B4U:START-->
<script>window.B4U = { area:'equiparacao' };</script>
<!-- ═══════════ back4you · cabeçalho + chamados (compartilhado) ═══════════
     Bloco único, autocontido e com prefixo .b4u- (não conflita com o CSS da
     página). Cole logo depois de <body>, e ANTES dele defina:
        <script>window.B4U = { area:'fiscal' };</script>
     area = área padrão do chamado desta página
        (fiscal | dpto_pessoal | contabil | societario | equiparacao | outros)
     home:true  -> esconde o botão "Início" (usar só no index).
     Para reaproveitar em todas as páginas, mantenha este bloco IDÊNTICO. ─── -->
<style>
.b4u-bar{position:sticky;top:0;z-index:900;display:flex;align-items:center;gap:10px;
  padding:10px 18px;background:#073034;color:#fff;box-shadow:0 2px 12px rgba(7,48,52,.20);
  font-family:'Montserrat',system-ui,-apple-system,sans-serif}
.b4u-bar .b4u-logo{font-weight:900;font-size:17px;letter-spacing:-.02em;margin-right:auto;
  color:#fff;text-decoration:none;display:inline-flex;align-items:center;line-height:1}
.b4u-bar .b4u-logo .y{color:#3FA680}
.b4u-btn{display:inline-flex;align-items:center;gap:7px;border:0;cursor:pointer;
  font-family:inherit;font-weight:600;font-size:13px;padding:8px 13px;border-radius:10px;
  text-decoration:none;transition:background .15s,transform .08s;line-height:1;white-space:nowrap}
.b4u-btn svg{width:16px;height:16px;flex-shrink:0}
.b4u-btn .b4u-lbl{color:inherit;text-transform:none;letter-spacing:normal;font-size:13px}
.b4u-btn:active{transform:translateY(1px)}
.b4u-btn.ghost{background:rgba(255,255,255,.10);color:#fff}
.b4u-btn.ghost:hover{background:rgba(255,255,255,.18)}
.b4u-btn.wa{background:#25D366;color:#fff}
.b4u-btn.wa:hover{background:#20bd5a}
.b4u-btn.call{background:#0F8C85;color:#fff}
.b4u-btn.call:hover{background:#0c756f}
.b4u-icobtn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;
  padding:0;border:0;cursor:pointer;border-radius:9px;background:rgba(255,255,255,.10);color:#fff;
  transition:background .15s}
.b4u-icobtn:hover{background:rgba(255,255,255,.18)}
.b4u-icobtn svg{width:17px;height:17px}
@media(max-width:640px){
  .b4u-bar{gap:7px;padding:9px 12px}
  .b4u-btn .b4u-lbl{display:none}
  .b4u-btn{padding:9px 11px}
}
.b4u-ov{position:fixed;inset:0;z-index:1000;background:rgba(7,48,52,.45);
  display:none;align-items:flex-end;justify-content:center;
  font-family:'Montserrat',system-ui,-apple-system,sans-serif}
.b4u-ov.on{display:flex}
@media(min-width:640px){.b4u-ov{align-items:center;padding:24px}}
.b4u-modal{background:#fff;color:#113D39;width:100%;max-width:520px;border-radius:16px 16px 0 0;
  max-height:94vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
@media(min-width:640px){.b4u-modal{border-radius:16px}}
.b4u-modal h3{font-size:17px;font-weight:800;padding:18px 20px 3px;letter-spacing:-.01em}
.b4u-modal .b4u-sub{font-size:12.5px;color:#8A7D70;padding:0 20px 10px;line-height:1.5}
.b4u-fld{padding:7px 20px}
.b4u-fld label{display:block;font-size:12px;font-weight:700;color:#3F5854;margin-bottom:5px}
.b4u-fld select,.b4u-fld input,.b4u-fld textarea{width:100%;font-family:inherit;font-size:14px;
  padding:10px 12px;border:1px solid #E4D9C9;border-radius:10px;background:#FBF6EF;color:#113D39}
.b4u-fld textarea{min-height:120px;resize:vertical;line-height:1.5}
.b4u-fld select:focus,.b4u-fld input:focus,.b4u-fld textarea:focus{outline:2px solid #0F8C85;outline-offset:1px;border-color:transparent}
.b4u-err{color:#B4322A;font-size:12.5px;padding:2px 20px 0;min-height:16px}
.b4u-foot{display:flex;gap:10px;padding:14px 20px 20px;position:sticky;bottom:0;background:#fff}
.b4u-foot .b4u-btn{flex:1;justify-content:center;padding:12px}
.b4u-foot .primary{background:#0F8C85;color:#fff}
.b4u-foot .primary:hover{background:#0c756f}
.b4u-foot .primary[disabled]{opacity:.6;cursor:default}
.b4u-foot .cancel{background:#F1E7DC;color:#3F5854}
.b4u-foot .cancel:hover{background:#e8dccb}
.b4u-ok{padding:30px 22px;text-align:center}
.b4u-ok .chk{width:56px;height:56px;border-radius:50%;background:#E7F4EC;color:#2E9E63;
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.b4u-ok .chk svg{width:30px;height:30px}
.b4u-ok h3{font-size:18px;font-weight:800;margin-bottom:6px}
.b4u-ok p{font-size:13.5px;color:#3F5854;line-height:1.55;max-width:40ch;margin:0 auto 20px}
</style>
<script>
(function(){
  var CFG = window.B4U || {};
  if (CFG.__ready) return;

  var WA = '5511937173906';                        // +55 11 93717-3906
  var API_FALLBACK = 'https://script.google.com/macros/s/AKfycbyGAro0qPWpZcVX665KwKd-BK3ouSvVkAj5Vxw_phgO82EDa3gJrURcHjWIPYNQXT5d/exec';
  function api(){ try{ if(typeof API_URL==='string' && API_URL) return API_URL; }catch(e){} return API_FALLBACK; }

  var AREAS = [
    ['fiscal','Fiscal'], ['dpto_pessoal','Departamento Pessoal'], ['contabil','Contábil'],
    ['societario','Societário'], ['equiparacao','Equiparação'], ['outros','Outros / reportar erro']
  ];
  // tipo -> [rótulo, esqueleto de mensagem]
  var TIPOS = {
    livre:            ['Chamado livre', ''],
    solicitar_nf:     ['Solicitar nota fiscal', 'Solicito a emissão de uma nota fiscal.\n\nTomador (cliente):\nValor:\nDescrição do serviço:\nData desejada:'],
    duvida:           ['Tirar uma dúvida', 'Minha dúvida é:\n\n'],
    ferias:           ['Solicitar férias', 'Solicito a programação de férias.\n\nColaborador:\nInício desejado:\nDias:\nObservações:'],
    previa_admissao:  ['Prévia de admissão', 'Estou avaliando uma contratação (prévia, ainda sem formalizar).\n\nCargo cogitado:\nFaixa salarial:\nObservações:'],
    contratacao:      ['Formalizar admissão', 'Quero formalizar uma contratação.\n\nNome do colaborador:\nCargo:\nSalário:\nData de início:\nObservações:'],
    previa_rescisao:  ['Prévia de rescisão', 'Estou avaliando desligar um colaborador (prévia).\n\nColaborador:\nMotivo:\nObservações:'],
    rescisao:         ['Formalizar desligamento', 'Quero formalizar um desligamento.\n\nColaborador:\nMotivo:\nData prevista:\nAviso (trabalhado/indenizado):\nObservações:']
  };
  var ORDEM_TIPOS = ['livre','solicitar_nf','duvida','ferias','previa_admissao','contratacao','previa_rescisao','rescisao'];
  // O tipo de solicitação DEPENDE da área (não faz sentido pedir férias em Equiparação).
  var TIPOS_POR_AREA = {
    fiscal:       ['livre','solicitar_nf','duvida'],
    dpto_pessoal: ['livre','ferias','previa_admissao','contratacao','previa_rescisao','rescisao','duvida'],
    contabil:     ['livre','duvida'],
    societario:   ['livre','duvida'],
    equiparacao:  ['livre','duvida'],
    outros:       ['livre','duvida']
  };
  function tiposDaArea(area){ return TIPOS_POR_AREA[area] || TIPOS_POR_AREA.outros; }
  function opcoesTipo(area, sel){
    return tiposDaArea(area).map(function(t){
      return '<option value="'+t+'"'+(t===sel?' selected':'')+'>'+esc(TIPOS[t][0])+'</option>';
    }).join('');
  }

  // ---- id/código a partir da URL (?id=&codigo= ou #id-codigo) -------------
  function idc(){
    var qs = new URLSearchParams(location.search);
    var id = qs.get('id')||'', cod = qs.get('codigo')||'';
    if(!id){
      var h = (location.hash||'').replace('#','').trim();
      var m = h.match(/^(\d+)-(.+)$/); var s = h.match(/^(\d+)$/);
      if(m){ id=m[1]; cod=m[2]; } else if(s){ id=s[1]; }
    }
    return { id:String(id).replace(/\D/g,''), codigo:String(cod).trim() };
  }
  function jsonp(url){
    return new Promise(function(ok,fail){
      var cb='b4ucb_'+Math.random().toString(36).slice(2);
      var s=document.createElement('script');
      var t=setTimeout(function(){ limpa(); fail(new Error('A API não respondeu.')); }, 20000);
      function limpa(){ clearTimeout(t); try{delete window[cb];}catch(e){window[cb]=undefined;} s.remove(); }
      window[cb]=function(d){ limpa(); ok(d); };
      s.onerror=function(){ limpa(); fail(new Error('Não consegui alcançar a API.')); };
      s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
      document.body.appendChild(s);
    });
  }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  var IC = {
    home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 11 12 4l8 7"/><path d="M6 10v9h12v-9"/></svg>',
    wa:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1 0 12 2Zm5.3 14.1c-.2.6-1.3 1.2-1.8 1.2-.5.1-1 .2-3.3-.7-2.8-1.1-4.6-4-4.7-4.2-.1-.2-1.1-1.5-1.1-2.8 0-1.3.7-2 .9-2.2.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5.2.5.7 1.8.8 1.9.1.1.1.3 0 .5l-.3.5-.4.4c-.1.1-.3.3-.1.6.1.3.7 1.1 1.4 1.7.9.8 1.6 1 1.9 1.2.3.1.5.1.6-.1.2-.2.7-.8.9-1 .2-.3.4-.2.6-.1.2.1 1.5.7 1.7.9.3.1.4.2.5.3.1.2.1.7-.1 1.3Z"/></svg>',
    chat:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 12a8 8 0 0 1-11.5 7.2L3 21l1.8-6.5A8 8 0 1 1 21 12Z"/></svg>',
    help:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M9.2 9.3a2.8 2.8 0 0 1 5.4 1c0 1.8-2.6 2.2-2.6 3.9"/><path d="M12 17.4h.01"/></svg>',
    chk:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m5 13 4 4L19 7"/></svg>'
  };

  var C = idc();
  var linkHome = 'index.html' + (C.id ? '#'+C.id+(C.codigo?'-'+C.codigo:'') : '');
  var linkTickets = 'meustickets.html' + (C.id ? '#'+C.id+(C.codigo?'-'+C.codigo:'') : '');
  var waHref = 'https://wa.me/'+WA+'?text='+encodeURIComponent('Olá, sou cliente back4you'+(C.id?' (ID '+C.id+')':'')+'.');

  // ---- barra fixa ----------------------------------------------------------
  var bar = document.createElement('div');
  bar.className = 'b4u-bar';
  bar.innerHTML =
    '<a class="b4u-logo" href="'+esc(linkHome)+'"><span>back</span><span class="y">4you</span></a>' +
    (CFG.home ? '' :
      '<a class="b4u-btn ghost" href="'+esc(linkHome)+'">'+IC.home+'<span class="b4u-lbl">Início</span></a>') +
    '<a class="b4u-btn wa" href="'+esc(waHref)+'" target="_blank" rel="noopener">'+IC.wa+'<span class="b4u-lbl">WhatsApp</span></a>' +
    '<button type="button" class="b4u-btn call" id="b4u-open">'+IC.chat+'<span class="b4u-lbl">Abrir chamado</span></button>' +
    '<button type="button" class="b4u-icobtn" id="b4u-help" title="Reportar um erro ou pedir ajuda" aria-label="Reportar um erro ou pedir ajuda">'+IC.help+'</button>';
  document.body.insertBefore(bar, document.body.firstChild);
  // publica a altura da barra p/ os cabeçalhos internos grudarem logo abaixo dela
  function medirBarra(){ document.documentElement.style.setProperty('--b4u-bar-h', bar.offsetHeight + 'px'); }
  medirBarra();
  window.addEventListener('resize', medirBarra);
  window.addEventListener('load', medirBarra);

  var ov = document.createElement('div');
  ov.className = 'b4u-ov';
  document.body.appendChild(ov);

  function fecharModal(){ ov.classList.remove('on'); ov.innerHTML=''; }

  function abrir(opts){
    opts = opts || {};
    var areaSel = opts.area || CFG.area || 'outros';
    var tipoSel = opts.tipo || 'livre';
    if (tiposDaArea(areaSel).indexOf(tipoSel) < 0) tipoSel = tiposDaArea(areaSel)[0];   // tipo válido p/ a área

        '</select></div>' +
        '<div class="b4u-fld"><label for="b4u-tipo">Tipo de solicitação</label><select id="b4u-tipo">' +

          '<button type="button" class="b4u-btn cancel" id="b4u-cancel">Cancelar</button>' +
          '<button type="button" class="b4u-btn primary" id="b4u-send">Enviar chamado</button>' +
        '</div>' +
      '</div>';
    ov.classList.add('on');
    var selTipo = ov.querySelector('#b4u-tipo');
    var txt = ov.querySelector('#b4u-msg');
    function aplicaSkeleton(force){
      var esq = TIPOS[selTipo.value] ? TIPOS[selTipo.value][1] : '';
      if(force || !txt.value.trim()) txt.value = esq;
    }
    aplicaSkeleton(true);
    selTipo.addEventListener('change', function(){ aplicaSkeleton(true); txt.focus(); });
    // trocar a ÁREA repovoa os tipos válidos para ela
    ov.querySelector('#b4u-area').addEventListener('change', function(){
      selTipo.innerHTML = opcoesTipo(this.value, selTipo.value);
      aplicaSkeleton(true);
    });
    ov.querySelector('#b4u-cancel').addEventListener('click', fecharModal);
    ov.addEventListener('click', function(e){ if(e.target===ov) fecharModal(); });
    ov.querySelector('#b4u-send').addEventListener('click', enviar);
    ov.querySelector('#b4u-assunto').focus();
  }

  function enviar(){
    var cc = idc();
    var erroEl = ov.querySelector('#b4u-erro');
    var btn = ov.querySelector('#b4u-send');
    erroEl.textContent = '';
    if(!cc.id || !cc.codigo){ erroEl.textContent = 'Abra o painel pelo seu link (com ID e código) para enviar um chamado.'; return; }
    var area = ov.querySelector('#b4u-area').value;
    var tipo = ov.querySelector('#b4u-tipo').value;
    var assunto = ov.querySelector('#b4u-assunto').value.trim();
    var msg = ov.querySelector('#b4u-msg').value.trim();
    if(!msg){ erroEl.textContent = 'Escreva a mensagem do chamado.'; return; }
    btn.disabled = true; btn.textContent = 'Enviando…';
    var qs = new URLSearchParams({ id:cc.id, codigo:cc.codigo, acao:'ticket',
      area:area, tipo:tipo, assunto:assunto, mensagem:msg });
    jsonp(api()+'?'+qs.toString()).then(function(d){
      if(d && d.erro) throw new Error(d.erro);
      sucesso();
    }).catch(function(e){
      btn.disabled=false; btn.textContent='Enviar chamado';

  function sucesso(){
    ov.innerHTML =
      '<div class="b4u-modal">' +
        '<div class="b4u-ok">' +
          '<div class="chk">'+IC.chk+'</div>' +
          '<h3>Chamado registrado</h3>' +
          '<p>Recebemos sua solicitação e retornamos em até 48h úteis. Em breve o acompanhamento também chegará por e-mail.</p>' +

          '</div>' +
        '</div>' +
      '</div>';
    ov.querySelector('#b4u-fecha').addEventListener('click', fecharModal);
  }

  bar.querySelector('#b4u-open').addEventListener('click', function(){ abrir({}); });
  bar.querySelector('#b4u-help').addEventListener('click', function(){ abrir({ area:'outros', tipo:'livre' }); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape' && ov.classList.contains('on')) fecharModal(); });

  window.B4U = { __ready:true, area: CFG.area||'outros', abrirChamado: abrir, meusTickets: linkTickets };
})();
</script>

const PAL = { teal:'#0F8C85', eucalipto2:'#3FA680', couro:'#A7715D', vinho:'#731007',

/** Grupo visual de cada situação oficial do PER/DCOMP + explicação (parafraseada da Receita Federal). */

function getIdCodigo(){
  const qs = new URLSearchParams(location.search);
  let id = qs.get('id') || '';
  let codigo = qs.get('codigo') || '';
  if (!id){
    const h = location.hash.replace('#','').trim();
    const comCodigo = h.match(/^(\d+)-(.+)$/);
    const soId = h.match(/^(\d+)$/);
    if (comCodigo) { id = comCodigo[1]; codigo = comCodigo[2]; }
    else if (soId) { id = soId[1]; }
  }
  return { id: id.replace(/\D/g,''), codigo: codigo.trim() };
}

function jsonp(url){
  return new Promise((ok,fail)=>{
    const cb = 'cb_'+Math.random().toString(36).slice(2);
    const s = document.createElement('script');
    const t = setTimeout(()=>{ limpa(); fail(new Error('A API não respondeu.')); }, 20000);
    function limpa(){ clearTimeout(t); delete window[cb]; s.remove(); }
    window[cb] = d => { limpa(); ok(d); };
    s.onerror = () => { limpa(); fail(new Error('Não consegui alcançar a API.')); };
    s.src = url + (url.includes('?')?'&':'?') + 'callback=' + cb;
    document.body.appendChild(s);
  });
}

let IDENTIDADE = { id: '', codigo: '' };

async function carregar(){
  const { id, codigo } = getIdCodigo();
  IDENTIDADE = { id, codigo };
  if (API_URL){
    if (!id) throw new Error('Informe o ID do cliente no final do endereço.');
    if (!codigo) throw new Error('Informe também o código de acesso, no formato #482913-CODIGO.');
    const url = API_URL + '?id=' + encodeURIComponent(id) + '&codigo=' + encodeURIComponent(codigo) + '&tipo=equiparacao';
    const d = await jsonp(url);
    if (d.erro) throw new Error(d.erro);
    return d;
  }
  const r = await fetch('demo_equiparacao.json');
  if (!r.ok) throw new Error('Sem API configurada e sem demo_equiparacao.json ao lado deste arquivo.');
  return r.json();
}

function prepararCompetencia(c){
  // "1º TRIM/2023" -> {tri:1, ano:2023, ord: 2023*4+1}
  const m = String(c||'').match(/(\d)º?\s*TRIM\/(\d{4})/i);
  if (!m) return {tri:0, ano:0, ord:0, label:c||'—'};
  const tri = Number(m[1]), ano = Number(m[2]);
  return {tri, ano, ord: ano*4+tri, label:`${tri}º tri/${ano}`};
}

/** Algumas planilhas trazem o código de arrecadação da Receita (número) em vez do
    nome do tributo — ex.: 2089/2372 no lucro presumido, 3373/6012 no ajuste anual
    do lucro real, 5993/2484 na estimativa mensal do lucro real. Traduz pro nome;
    se já vier como texto ("IRPJ"/"CSLL"), passa direto. */
const CODIGO_TRIBUTO = {
  '2089':'IRPJ', '2372':'CSLL',
  '3373':'IRPJ', '6012':'CSLL',
  '5993':'IRPJ', '2484':'CSLL',
};
function normalizarTributo(v){
  const s = String(v==null ? '' : v).trim();
  return CODIGO_TRIBUTO[s] || s || 'Outro';
}

function preparar(raw){
  const pedidos = (raw.pedidos||[]).map(p => {
    // Critério de verdade: se tem data_pagamento, foi aprovado e será (ou já foi) pago —
    // isso vale mais que o texto de 'status', que pode dizer só "Análise concluída"
    // (ambíguo por definição da própria Receita) mesmo quando já se sabe o resultado.
    const concluido = !!p.data_pagamento;
    const info = STATUS_INFO[p.status] || {grupo:'neutro', txt:''};
    return {
      ...p,
      tributo: normalizarTributo(p.tributo),
      _comp: prepararCompetencia(p.competencia),
      _concluido: concluido,
      _grupo: concluido ? 'concluido' : info.grupo,
      _explicacao: concluido
        ? 'Crédito reconhecido pela Receita Federal — valor aprovado e em pagamento (ou já pago).'
        : info.txt,
    };
  }).sort((a,b) => a._comp.ord - b._comp.ord || String(a.tributo).localeCompare(String(b.tributo)));
  return { cfg: raw.config||{}, id: raw.id, pedidos, documentos: raw.documentos||[], atualizado_em: raw.atualizado_em };
}

function desenharGraficos(M){
  const P = M.pedidos;
  const donutOpts = {responsive:true, maintainAspectRatio:false, animation:{duration:500}, cutout:'60%',
    plugins:{legend:{display:false},
      tooltip:{backgroundColor:PAL.petroleo, padding:10, cornerRadius:6,
        bodyFont:{family:'Montserrat',size:12}, callbacks:{label:c=>' '+c.label+': '+brl(c.parsed)}}}};

    plugins:{legend:{display:false}, tooltip:{backgroundColor:PAL.petroleo, padding:10, cornerRadius:6,
      bodyFont:{family:'Montserrat',size:12}, callbacks:{label:c=>' '+c.dataset.label+': '+brl(c.parsed.y)}}},
    scales:{x:{grid:{display:false}, ticks:{color:PAL.muted, font:{family:'Montserrat',size:11}}},
      y:{grid:{color:'#EDE4D6'}, border:{display:false}, ticks:{color:PAL.muted, font:{family:'Montserrat',size:11},
        callback:v=>'R$ '+(v/1000).toLocaleString('pt-BR')+'k'}}}};

  // c1: situação — soma do VALOR atualizado por grupo, não quantidade de pedidos
  const porGrupo = {};
  P.forEach(p=>{ porGrupo[p._grupo] = (porGrupo[p._grupo]||0) + num(p.valor_atualizado); });
  const gruposUsados = Object.keys(porGrupo);
  new Chart(document.getElementById('c1'), {
    type:'doughnut',
    data:{labels:gruposUsados.map(g=>GRUPO_NOME[g]), datasets:[{data:gruposUsados.map(g=>porGrupo[g]),
      backgroundColor:gruposUsados.map(g=>GRUPO_COR[g]), borderWidth:0}]},
    options:donutOpts
  });
  document.getElementById('c1-lg').innerHTML = gruposUsados.map(g=>
    `<div class="pie-legend-row"><i style="background:${GRUPO_COR[g]}"></i><span>${GRUPO_NOME[g]}</span><b class="num">${brl(porGrupo[g])}</b></div>`
  ).join('');

  // c2: valor atualizado por tributo
  const porTributo = {};
  P.forEach(p=>{ porTributo[p.tributo] = (porTributo[p.tributo]||0) + num(p.valor_atualizado); });
  const tributos = Object.keys(porTributo);
  const coresTrib = [PAL.teal, PAL.couro, PAL.neutro];
  new Chart(document.getElementById('c2'), {
    type:'doughnut',
    data:{labels:tributos, datasets:[{data:tributos.map(t=>porTributo[t]), backgroundColor:tributos.map((_,i)=>coresTrib[i%coresTrib.length]), borderWidth:0}]},
    options:donutOpts
  });
  document.getElementById('c2-lg').innerHTML = tributos.map((t,i)=>
    `<div class="pie-legend-row"><i style="background:${coresTrib[i%coresTrib.length]}"></i><span>${t}</span><b class="num">${brl(porTributo[t])}</b></div>`
  ).join('');

  // c4: por ano de origem da competência
  const porAno = {};
  P.forEach(p=>{
    const ano = p._comp.ano || 0;
    porAno[ano] = porAno[ano] || {solicitado:0, atualizado:0, aprovado:0};
    porAno[ano].solicitado += num(p.valor_solicitado);
    porAno[ano].atualizado += num(p.valor_atualizado);
    if (p._concluido) porAno[ano].aprovado += num(p.valor_aprovado);
  });
  const anos = Object.keys(porAno).sort();
  new Chart(document.getElementById('c4'), {
    type:'bar',
    data:{labels:anos, datasets:[
      {label:'Atualizado', data:anos.map(a=>porAno[a].atualizado), backgroundColor:PAL.bege, borderRadius:4, maxBarThickness:34},
      {label:'Aprovado', data:anos.map(a=>porAno[a].aprovado), backgroundColor:PAL.teal, borderRadius:4, maxBarThickness:34},
    ]},
    options:{...barOpts, plugins:{...barOpts.plugins, legend:{display:true, position:'bottom',
      labels:{color:PAL.muted, font:{family:'Montserrat',size:11}, boxWidth:9}}}}
  });
}

async function carregarModelos(){
  if (API_URL){
    const { id, codigo } = IDENTIDADE;
    const url = API_URL + '?id=' + encodeURIComponent(id) + '&codigo=' + encodeURIComponent(codigo) + '&tipo=modelos';
    const d = await jsonp(url);
    return (d && d.modelos) || [];
  }
  const r = await fetch('demo_modelos.json');
  if (!r.ok) return [];
  const d = await r.json();
  return d.modelos || [];
}

function normTxt(s){ return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim(); }

/** Junta os documentos específicos deste cliente (Relatório de Adequação Jurídica etc.)
    com os modelos genéricos da categoria Equiparação (Modelo de emissão de NF etc.). */
function desenharDocumentos(M, modelos){
  const box = document.getElementById('documentos-equip');
  if (!box) return;
  const doCategoria = (modelos||[]).filter(m => normTxt(m.categoria) === normTxt('Equiparação'));
  const todos = [...(M.documentos||[]), ...doCategoria].filter(d => d.link && String(d.link).trim());
  if (!todos.length){ box.innerHTML = '<div class="vazio" style="padding:16px 0;text-align:center;color:var(--muted)">Nenhum documento cadastrado ainda.</div>'; return; }
  box.innerHTML = todos.map(d=>{
    const nome = d.documento;
    const link = String(d.link).trim();
    return `<div class="item">
      <div><div class="nome">${nome}</div>${d.categoria?`<div class="cat">Modelo padrão</div>`:''}</div>
      <a href="${link}" target="_blank" rel="noopener">Abrir ↗</a>
    </div>`;
  }).join('');
}

// Em subpágina, qualquer falha de acesso volta direto para o index (que trata código expirado / áreas da pessoa).
function erro(msg){ const {id,codigo}=getIdCodigo(); location.replace('index.html'+(id?('#'+id+(codigo?'-'+codigo:'')):(location.hash||''))); }

(async function(){
  try {
    const raw = await carregar();
    const M = preparar(raw);
    render(M);
    carregarModelos().then(modelos => desenharDocumentos(M, modelos)).catch(()=>desenharDocumentos(M, []));
  } catch (e) {
    erro(e.message || String(e));
  }
})();
</script>
