<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Restituição (equipe) — back4you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#F1E7DC;--surface:#FFFFFF;--surface-warm:#FBF6EF;
  --ink:#113D39;--ink-2:#3F5854;--muted:#8A7D70;--line:#E4D9C9;--line-2:#D6C3AC;
  --brand-dark:#073034;--brand-teal:#0F8C85;--brand-euc:#3FA680;
  --amber:#E8892E;--amber-soft:#FCEFE0;--amber-line:#F0D6B4;--vermelho:#8B2E22;
  --sans:'Montserrat',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--canvas);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.barra{position:sticky;top:0;z-index:50;background:var(--brand-dark);color:#fff;display:flex;align-items:center;gap:12px;padding:12px 20px;box-shadow:0 2px 12px rgba(7,48,52,.2)}
.barra .logo{font-weight:900;font-size:17px}.barra .logo .y{color:var(--brand-euc)}
.barra .tag{font-size:12px;font-weight:700;color:#cfe6e2;background:rgba(255,255,255,.10);padding:5px 11px;border-radius:20px}
.barra .spacer{flex:1}.barra .cnt{font-size:12px;color:#bcd}.barra a.volta{color:#cfe6e2;text-decoration:none;font-size:13px;font-weight:600}
.save-status{font-size:12.5px;font-weight:800;padding:6px 13px;border-radius:20px;background:rgba(255,255,255,.14);color:#e7f2f0;white-space:nowrap;transition:background .15s}
.save-status:empty{display:none}
.save-status.saving{background:#E8892E;color:#fff}.save-status.ok{background:#2E9D5F;color:#fff}.save-status.err{background:#C0392B;color:#fff}
.wrap{max-width:1000px;margin:0 auto;padding:16px 20px 80px}
.topo{position:sticky;top:52px;z-index:40;background:var(--canvas);padding:12px 0 10px}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.chip{font-size:13px;font-weight:700;border-radius:999px;padding:7px 14px;border:1px solid var(--line-2);background:var(--surface);color:var(--ink-2);cursor:pointer}
.chip.on{background:var(--brand-teal);border-color:var(--brand-teal);color:#fff}
.busca{width:100%;font-family:var(--sans);font-size:15px;padding:12px 16px;border-radius:24px;border:1px solid var(--line-2);background:var(--surface);color:var(--ink)}
.busca:focus{outline:2px solid var(--brand-teal);outline-offset:1px}
.dica{font-size:12px;color:var(--muted);margin-top:7px}
.lista{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:13px;overflow:hidden}
.card-h{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;cursor:pointer}
.card-h:hover{background:var(--surface-warm)}
.pid{font-size:11px;font-weight:800;color:#fff;background:var(--brand-teal);border-radius:6px;padding:3px 8px;white-space:nowrap;margin-top:1px}
.pmain{flex:1;min-width:0}
.pnome{font-size:14px;font-weight:700;line-height:1.3}
.pmeta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:6px}
.bdg{font-size:10.5px;font-weight:700;border-radius:7px;padding:3px 8px;background:#EEF1F0;color:#5B6B67;border:1px solid var(--line)}
.bdg.resp{background:var(--amber-soft);color:#9A5B12;border-color:var(--amber-line)}
.chev{color:var(--line-2);font-weight:900;font-size:18px;margin-top:2px}
.editor{border-top:1px solid var(--line);padding:15px;display:none;background:var(--surface-warm)}
.card.open .editor{display:block}.card.open .chev{color:var(--brand-teal);transform:rotate(90deg)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fld{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fld.full{grid-column:1/-1}
.fld label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.fld input,.fld textarea{font-family:var(--sans);font-size:14px;padding:9px 11px;border:1px solid var(--line-2);border-radius:9px;background:var(--surface);color:var(--ink);width:100%}
.fld textarea{resize:vertical;min-height:56px}
.fld input:focus,.fld textarea:focus{outline:2px solid var(--brand-teal);outline-offset:1px}
.fld .abrir{font-size:11px;font-weight:700;color:var(--brand-teal);text-decoration:none;align-self:flex-start}
.sub{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-2);margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.sub::after{content:"";flex:1;height:1px;background:var(--line)}
.rodape{font-size:12.5px;color:var(--muted);margin-top:10px}
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:46vh;text-align:center;padding:0 24px}
.state h1{font-size:19px}.state p{color:var(--muted);font-size:14px;max-width:48ch}.state code{background:var(--surface-warm);padding:2px 6px;border-radius:4px;border:1px solid var(--line)}
.spin{width:24px;height:24px;border:2.5px solid var(--line-2);border-top-color:var(--brand-teal);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:620px){.grid2{grid-template-columns:1fr}.wrap{padding:14px 12px 70px}.barra .cnt{display:none}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="barra">
  <span class="logo">back<span class="y">4you</span></span>
  <span class="tag" id="tag">Restituição</span>
  <span class="spacer"></span>
  <span class="save-status" id="saveStatus"></span>
  <span class="cnt" id="cnt"></span>
  <a class="volta" id="volta" href="colaborador.html">← Painel</a>
</div>
<div id="app"><div class="state"><div class="spin"></div><p>Carregando restituição…</p></div></div>

<datalist id="dl-status"></datalist>
<datalist id="dl-prospectivo"></datalist>
<datalist id="dl-responsavel"></datalist>
<datalist id="dl-rel_adequacao"></datalist>
<datalist id="dl-rel_prelim"></datalist>
<datalist id="dl-apuracao_nfs"></datalist>
<datalist id="dl-protocolo"></datalist>
<datalist id="dl-rel_def"></datalist>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbyGAro0qPWpZcVX665KwKd-BK3ouSvVkAj5Vxw_phgO82EDa3gJrURcHjWIPYNQXT5d/exec';
const CHAVE_PADRAO='b4u-equipe-2026';
// chave = SÓ ?chave= (o # é o RESPONSÁVEL, não a chave)
function chaveAtual(){const q=new URLSearchParams(location.search).get('chave');return q?q.trim():CHAVE_PADRAO;}
function respAtual(){return decodeURIComponent((location.hash||'').replace(/^#/,'')).trim();}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function normTxt(s){return String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim();}
function jsonp(url){return new Promise((ok,fail)=>{const cb='cb_'+Math.random().toString(36).slice(2);const s=document.createElement('script');const t=setTimeout(()=>{limpa();fail(new Error('A API não respondeu.'));},25000);function limpa(){clearTimeout(t);delete window[cb];s.remove();}window[cb]=d=>{limpa();ok(d);};s.onerror=()=>{limpa();fail(new Error('Não consegui alcançar a API.'));};s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;document.body.appendChild(s);});}
async function postAcao(obj){const body=JSON.stringify(Object.assign({chave:chaveAtual()},obj));const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body});const d=await r.json();if(d&&d.erro)throw new Error(d.erro);return d;}

const OPT={
  status:['PROTOCOLADO','Alteração de CS prévia','Perdido','PRÉ - PROTOCOLO','INTERROMPIDO','PROSPECTIVO SOMENTE','PROSPECTIVO SOMENTE PROTOCOLADO','PRÉ - ONBOARDING'],
  prospectivo:['Retrospectivo','Prospectivo'],
  responsavel:['MFBD','KAREANE','FABIANO','N/A','DEFINIR'],
  rel_adequacao:['Aprovado','Falta onboarding'],
  rel_prelim:['Aprovado','Em execução','Enviado ao cliente','Parado (não iniciar)'],
  apuracao_nfs:['Aprovada','Aprovado','Enviada ao cliente','Parado (não iniciar)'],
  protocolo:['Finalizado','Em execução','Não iniciado','Parado (não iniciar)'],
  rel_def:['Pendente','Enviado ao cliente','Parado']
};
const CAMPOS=[
  {k:'nome',label:'Nome',t:'text',full:true},
  {k:'cnpj',label:'CNPJ',t:'text'},
  {k:'status',label:'STATUS',t:'list',opt:'status'},
  {k:'responsavel',label:'Responsável',t:'list',opt:'responsavel'},
  {k:'link_drive',label:'Link do drive',t:'url',full:true},
  {k:'natureza_juridica',label:'Natureza Jurídica',t:'text'},
  {k:'natureza_empresarial',label:'Natureza Empresarial',t:'text'},
  {k:'prospectivo',label:'Prospectivo ou Retrospectivo',t:'list',opt:'prospectivo'},
  {k:'visao_geral',label:'Visão geral da equiparação',t:'area',full:true},
  {k:'estrategia',label:'Estratégia Equiparação',t:'area',full:true},
  {k:'obs_status',label:'Observações (Status Geral)',t:'area',full:true},
  {k:'_s1',sub:'Relatório de Adequação'},
  {k:'rel_adequacao',label:'Relatório de Adequação',t:'list',opt:'rel_adequacao'},
  {k:'prazo_adequacao',label:'Prazo Rel. Adequação',t:'text'},
  {k:'link_adequacao',label:'Link Rel. Adequação',t:'url',full:true},
  {k:'_s2',sub:'Relatório Executivo Preliminar'},
  {k:'rel_prelim',label:'Relatório Executivo Preliminar',t:'list',opt:'rel_prelim'},
  {k:'prazo_prelim',label:'Prazo Rel. Exec. Preliminar',t:'text'},
  {k:'link_prelim',label:'Link Rel. Exec. Preliminar',t:'url',full:true},
  {k:'_s3',sub:'Apuração / Protocolo'},
  {k:'apuracao_nfs',label:'Apuração de NFs e coleta documental',t:'list',opt:'apuracao_nfs'},
  {k:'prazo_apuracao',label:'Prazo Apuração NFs',t:'text'},
  {k:'protocolo',label:'Protocolo',t:'list',opt:'protocolo'},
  {k:'prazo_protocolo',label:'Prazo Protocolo',t:'text'},
  {k:'_s4',sub:'Relatório Executivo Definitivo'},
  {k:'rel_def',label:'Relatório Executivo Definitivo',t:'list',opt:'rel_def'},
  {k:'prazo_def',label:'Prazo Rel. Exec. Definitivo',t:'text'},
  {k:'link_def',label:'Link Rel. Exec. Definitivo',t:'url',full:true},
  {k:'_s5',sub:'Tarefas'},
  {k:'tarefas',label:'Tarefas Ativas',t:'area',full:true}
];

function preencherDatalists(){Object.keys(OPT).forEach(k=>{const dl=document.getElementById('dl-'+k);if(dl)dl.innerHTML=OPT[k].map(o=>`<option value="${esc(o)}">`).join('');});}
function setSave(cls,txt){const el=document.getElementById('saveStatus');if(el){el.className='save-status '+(cls||'');el.textContent=txt||'';}}
function horaAgora(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}

let LINHAS=[],RESP=[];
function carregar(){
  setSave('saving','Carregando…');
  return jsonp(API_URL+'?tipo=restituicao_equipe&chave='+encodeURIComponent(chaveAtual()))
    .then(d=>{if(d.erro)throw new Error(d.erro);LINHAS=d.linhas||[];RESP=d.responsaveis||[];setSave('','');render();})
    .catch(e=>{setSave('err','Erro');document.getElementById('app').innerHTML=`<div class="state"><h1>Não consegui carregar</h1><p>${esc(e.message||e)}</p><p>Confira a <code>chave</code> em <code>?chave=</code> e se o Web App foi republicado com <code>EquipeRestituicao.gs</code>.</p></div>`;});
}
function render(){
  preencherDatalists();
  const resp=respAtual();
  document.getElementById('tag').textContent='Restituição'+(resp?' · '+resp:'');
  const chips=['<span class="chip'+(!resp?' on':'')+'" data-resp="">Todos</span>']
    .concat(RESP.map(r=>`<span class="chip${normTxt(r)===normTxt(resp)?' on':''}" data-resp="${esc(r)}">${esc(r)}</span>`)).join('');
  document.getElementById('app').innerHTML=`<div class="wrap">
    <div class="topo">
      <div class="chips">${chips}</div>
      <input class="busca" id="busca" type="search" placeholder="Buscar por ID, nome ou CNPJ…">
      <div class="dica">Filtro por Responsável (o que vem depois do # no endereço). Tudo salva automaticamente — o status aparece no topo.</div>
    </div>
    <div class="lista" id="lista"></div></div>`;
  document.getElementById('busca').addEventListener('input',e=>desenhar(e.target.value));
  document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{const r=c.dataset.resp;if(r)location.hash=encodeURIComponent(r);else history.replaceState(null,'',location.pathname+location.search);render();}));
  desenhar('');
}
function filtradas(termo){
  const resp=normTxt(respAtual());const alvo=normTxt(termo);
  return LINHAS.filter(l=>(!resp||normTxt(l.responsavel)===resp)&&(!alvo||normTxt(l.id+' '+l.nome+' '+l.cnpj).includes(alvo)))
    .sort((a,b)=>String(a.id).localeCompare(String(b.id),'pt',{numeric:true}));
}
function desenhar(termo){
  const arr=filtradas(termo);
  document.getElementById('cnt').textContent=arr.length+' clientes';
  document.getElementById('lista').innerHTML=arr.map(cardHTML).join('')||'<div class="dica">Nenhum cliente para esse filtro.</div>';
}
function cardHTML(l){
  return `<div class="card" data-row="${l.row}">
    <div class="card-h" data-toggle="${l.row}">
      <span class="pid">${esc(l.id)}</span>
      <div class="pmain"><div class="pnome">${esc(l.nome||'(sem nome)')}</div>
        <div class="pmeta"><span class="bdg">${esc(l.status||'—')}</span><span class="bdg resp">${esc(l.responsavel||'—')}</span>${l.cnpj?`<span class="bdg">${esc(l.cnpj)}</span>`:''}</div>
      </div><span class="chev">›</span>
    </div>
    <div class="editor" id="ed-${l.row}"></div>
  </div>`;
}
function fieldHTML(l,f){
  if(f.sub)return `<div class="sub" style="grid-column:1/-1">${esc(f.sub)}</div>`;
  const v=l[f.k]==null?'':l[f.k];
  let inner;
  if(f.t==='area')inner=`<textarea data-k="${f.k}">${esc(v)}</textarea>`;
  else if(f.t==='list')inner=`<input data-k="${f.k}" list="dl-${f.opt}" value="${esc(v)}">`;
  else inner=`<input data-k="${f.k}" type="text" value="${esc(v)}">`;
  const abrir=(f.t==='url'&&/^https?:/i.test(v))?`<a class="abrir" href="${esc(v)}" target="_blank" rel="noopener">↗ abrir</a>`:'';
  return `<div class="fld ${f.full?'full':''}"><label>${esc(f.label)}</label>${inner}${abrir}</div>`;
}
function editorHTML(l){
  return `<div class="grid2">${CAMPOS.map(f=>fieldHTML(l,f)).join('')}</div>`;
}
function abrirEditor(row){
  const card=document.querySelector(`.card[data-row="${row}"]`);const ed=document.getElementById('ed-'+row);const l=LINHAS.find(x=>x.row==row);
  if(card.classList.contains('open')){card.classList.remove('open');ed.innerHTML='';return;}
  document.querySelectorAll('.card.open').forEach(el=>{el.classList.remove('open');el.querySelector('.editor').innerHTML='';});
  ed.innerHTML=editorHTML(l);card.classList.add('open');card.scrollIntoView({block:'nearest'});
}
function coletar(row){
  const ed=document.getElementById('ed-'+row);const campos={};
  ed.querySelectorAll('[data-k]').forEach(el=>{campos[el.dataset.k]=el.value;});
  return campos;
}
let timers={};
function agendarSalvar(row){
  const campos=coletar(row);
  setSave('saving','Alterado…');
  clearTimeout(timers[row]);
  timers[row]=setTimeout(()=>salvar(row,campos),450);
}
async function salvar(row,campos){
  const l=LINHAS.find(x=>x.row==row);if(!l)return;
  setSave('saving','Salvando…');
  try{
    await postAcao({acao:'rest_salvar',row:l.row,id:l.id,campos});
    Object.keys(campos).forEach(k=>l[k]=campos[k]);
    setSave('ok','Salvo ✓ '+horaAgora());
    const card=document.querySelector(`.card[data-row="${row}"]`);
    if(card){const nome=card.querySelector('.pnome');if(nome)nome.textContent=l.nome||'(sem nome)';
      const meta=card.querySelector('.pmeta');if(meta)meta.innerHTML=`<span class="bdg">${esc(l.status||'—')}</span><span class="bdg resp">${esc(l.responsavel||'—')}</span>`+(l.cnpj?`<span class="bdg">${esc(l.cnpj)}</span>`:'');}
  }catch(e){setSave('err','Não salvou: '+(e.message||e));}
}

document.addEventListener('click',e=>{const tg=e.target.closest('[data-toggle]');if(tg)abrirEditor(tg.dataset.toggle);});
document.addEventListener('change',e=>{const ed=e.target.closest('.editor');if(!ed)return;const f=e.target;if(!f.matches||!f.matches('input,textarea'))return;const card=e.target.closest('.card');if(card)agendarSalvar(card.dataset.row);});
window.addEventListener('hashchange',render);

document.getElementById('volta').href='colaborador.html?chave='+encodeURIComponent(chaveAtual());
carregar();
</script>
</body>
</html>
