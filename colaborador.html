<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta name="robots" content="noindex, nofollow">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel da Equipe — back4you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#F1E7DC; --surface:#FFFFFF; --surface-warm:#FBF6EF;
  --ink:#113D39; --ink-2:#3F5854; --muted:#8A7D70; --line:#E4D9C9; --line-2:#D6C3AC;
  --brand-dark:#073034; --brand-teal:#0F8C85; --brand-eucalipto2:#3FA680;
  --amber:#E8892E; --amber-soft:#FCEFE0; --amber-line:#F0D6B4;
  --vermelho:#8B2E22; --sans:'Montserrat',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--canvas);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.barra{position:sticky;top:0;z-index:50;background:var(--brand-dark);color:#fff;display:flex;align-items:center;gap:14px;padding:12px 22px;box-shadow:0 2px 12px rgba(7,48,52,.2)}
.barra .logo{font-weight:900;font-size:18px;letter-spacing:-.02em}
.barra .logo .y{color:var(--brand-eucalipto2)}
.barra .tag{font-size:12px;font-weight:700;color:#cfe6e2;background:rgba(255,255,255,.10);padding:5px 11px;border-radius:20px}
.barra .spacer{flex:1}
.barra .cnt{font-size:12px;color:#bcd;opacity:.9}
.wrap{max-width:1000px;margin:0 auto;padding:20px 22px 70px}

/* Títulos de seção */
.sec-tit{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-2);margin:2px 0 10px;display:flex;align-items:center;gap:8px}
.sec-tit::after{content:"";flex:1;height:1px;background:var(--line)}

/* Acesso rápido (planilhas centrais) */
.centrais{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:10px;margin-bottom:26px}
.central-lk{display:flex;align-items:center;gap:10px;text-decoration:none;background:var(--surface);border:1px solid var(--line);
  border-radius:12px;padding:12px 14px;color:var(--ink);font-weight:700;font-size:13.5px;transition:border-color .12s,transform .1s,box-shadow .12s}
.central-lk:hover{border-color:var(--brand-teal);transform:translateY(-1px);box-shadow:0 4px 14px rgba(7,48,52,.08)}
.central-lk .ic{font-size:18px;width:22px;text-align:center;flex:none}
.central-lk .arw{margin-left:auto;color:var(--line-2);font-weight:900}
button.central-lk{width:100%;font-family:inherit;font-size:13.5px;text-align:left;cursor:pointer}
button.central-lk[aria-expanded="true"]{border-color:var(--brand-teal)}
button.central-lk[aria-expanded="true"] .arw{color:var(--brand-teal)}
.menu{position:relative}
.menu-pop{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:35;background:var(--surface);
  border:1px solid var(--line-2);border-radius:12px;box-shadow:0 12px 30px rgba(7,48,52,.16);padding:6px;min-width:230px}
.menu-pop[hidden]{display:none}
.menu-pop a{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;text-decoration:none;color:var(--ink);font-weight:600;font-size:13.5px}
.menu-pop a:hover{background:var(--surface-warm)}
.menu-pop a .ic{font-size:16px;width:20px;text-align:center;flex:none}

/* Combobox de clientes */
.combo{position:relative}
.combo-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.busca{flex:1;min-width:220px;font-family:var(--sans);font-size:15px;padding:13px 17px;border-radius:26px;border:1px solid var(--line-2);background:var(--surface);color:var(--ink)}
.busca:focus{outline:2px solid var(--brand-teal);outline-offset:1px}
.btn-novo{background:#1F9D57;color:#fff;text-decoration:none;font-weight:700;padding:11px 17px;border-radius:999px;white-space:nowrap;font-size:14px}
.dica{font-size:12px;color:var(--muted);margin-top:8px;padding-left:4px}
.opcoes{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:30;background:var(--surface);border:1px solid var(--line-2);
  border-radius:14px;box-shadow:0 12px 30px rgba(7,48,52,.16);max-height:52vh;overflow:auto;padding:6px}
.opcoes[hidden]{display:none}
.opt{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;cursor:pointer;font-size:14px}
.opt:hover,.opt.on{background:var(--surface-warm)}
.opt-id{font-size:11px;font-weight:800;color:#fff;background:var(--brand-teal);border-radius:6px;padding:2px 7px;white-space:nowrap}
.opt-nome{flex:1;font-weight:600;line-height:1.25}
.opt-cnpj{font-size:11px;color:var(--muted);font-weight:500}
.opt-vazio{padding:14px 12px;color:var(--muted);font-size:13px}

/* Painel do cliente selecionado */
.detalhe{margin-top:16px}
.cli{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 17px;display:flex;flex-direction:column;gap:12px}
.cli-top{display:flex;align-items:flex-start;gap:10px}
.cli-id{font-size:12px;font-weight:800;color:#fff;background:var(--brand-teal);border-radius:7px;padding:3px 9px;white-space:nowrap;margin-top:1px}
.cli-nome{font-size:16px;font-weight:700;line-height:1.3;flex:1}
.cli-cnpj{font-size:12px;color:var(--muted);margin-top:2px;font-weight:500}
.linha{display:flex;flex-wrap:wrap;gap:6px}
.rot{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);width:100%;margin-top:2px}
.lk{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;text-decoration:none;
  padding:8px 12px;border-radius:9px;border:1px solid var(--line);background:var(--surface-warm);color:var(--ink);transition:border-color .12s,transform .1s}
.lk:hover{border-color:var(--brand-teal);transform:translateY(-1px)}
.lk.drive{background:#EAF4F1;border-color:#cfe6e2}
.lk.area{background:#fff}
.lk .ic{font-size:13px}
.lk.off{opacity:.4;pointer-events:none}
.alertas{display:flex;flex-wrap:wrap;gap:6px}
.al{font-size:11px;font-weight:700;border-radius:8px;padding:4px 9px;display:inline-flex;gap:5px;align-items:center}
.al.ok{background:#E7F4EC;color:#2E7D52}
.al.aten{background:var(--amber-soft);color:#9A5B12;border:1px solid var(--amber-line)}
.al.venc{background:#F8E3DF;color:var(--vermelho)}
.placeholder{margin-top:16px;background:var(--surface-warm);border:1px dashed var(--line-2);border-radius:14px;padding:22px;text-align:center;color:var(--muted);font-size:14px}
.cli-status{font-size:12.5px;color:var(--muted);margin-top:6px}

.state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:40vh;text-align:center;padding:0 24px}
.state h1{font-size:19px}.state p{color:var(--muted);font-size:14px;max-width:46ch}
.state code{background:var(--surface-warm);padding:2px 6px;border-radius:4px;border:1px solid var(--line);font-size:13px}
.spin{width:22px;height:22px;border:2.5px solid var(--line-2);border-top-color:var(--brand-teal);border-radius:50%;animation:sp .8s linear infinite;display:inline-block;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:560px){.wrap{padding:16px 14px 60px}.centrais{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="barra">
  <span class="logo">back<span class="y">4you</span></span>
  <span class="tag">Painel da equipe</span>
  <span class="spacer"></span>
  <span class="cnt" id="cnt"></span>
</div>

<div class="wrap">
  <!-- ACESSO RÁPIDO — planilhas centrais (funciona mesmo sem a API) -->
  <div class="sec-tit">Acesso rápido — planilhas centrais</div>
  <div class="centrais" id="centrais"></div>

  <!-- FERRAMENTAS DA EQUIPE -->
  <div class="sec-tit">Ferramentas da equipe</div>
  <div class="centrais" id="ferramentas">
    <a class="central-lk" id="fp-societario" href="societario-equipe.html"><span class="ic">🏛️</span><span>Societário — editar processos</span><span class="arw">›</span></a>
    <a class="central-lk" id="fp-contatos" href="contatos-equipe.html"><span class="ic">👥</span><span>Contatos — gerir &amp; permissões</span><span class="arw">›</span></a>
  </div>

  <!-- CLIENTES — busca com dropdown -->
  <div class="sec-tit">Links por cliente</div>
  <div class="combo">
    <div class="combo-row">
      <input class="busca" id="busca" type="search" autocomplete="off" placeholder="Buscar cliente por ID, nome ou CNPJ…">
      <a class="btn-novo" id="novo-cliente" href="onboarding.html">+ Novo cliente</a>
    </div>
    <div class="opcoes" id="opcoes" hidden></div>
    <div class="dica" id="dica"><span class="spin"></span> Carregando clientes…</div>
  </div>

  <div class="detalhe" id="detalhe">
    <div class="placeholder">Comece a digitar acima ou clique no campo para escolher um cliente e ver os atalhos dele.</div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyGAro0qPWpZcVX665KwKd-BK3ouSvVkAj5Vxw_phgO82EDa3gJrURcHjWIPYNQXT5d/exec';
// Chave da equipe ("por ora sem senha"): o link já vem com ela. Troque aqui e no TEAM_KEY (Equipe.gs).
const CHAVE_PADRAO = 'b4u-equipe-2026';

// Planilhas centrais — atalhos fixos (edite aqui se algum link mudar).
// Principais = botões diretos. Outros = agrupados num dropdown "Outros".
const LINKS_PRINCIPAIS = [
  {nome:'Societária Mestra',     ic:'🏛️', url:'https://docs.google.com/spreadsheets/d/1xcmKoj1hORiFQLdrUDxBicZri-tOXkwFiyqVF1NUGUg/edit?gid=1875565821#gid=1875565821'},
  {nome:'Contatos',              ic:'👥', url:'https://docs.google.com/spreadsheets/d/17Yrjylaj0b-fgaH-ujFjLkeT-G4egKzV8yEg4q4yrzE/edit?gid=1163717920#gid=1163717920'},
  {nome:'Certificados Digitais', ic:'🔐', url:'https://docs.google.com/spreadsheets/d/1fAtzWi62jRDhKa7haJ9L2p8bMxw8j2optS8b9ig3gNc/edit?gid=1519487343#gid=1519487343'},
  {nome:'Equiparação Controle',  ic:'⚖️', url:'https://docs.google.com/spreadsheets/d/18wIzGZtwIaDOxvIfWdBNBcWKcLzbNgxRB3C2-r8ymzg/edit?gid=619398478#gid=619398478'}
];
const LINKS_OUTROS = [
  {nome:'Site Links',        ic:'🗂️', url:'https://docs.google.com/spreadsheets/d/1fAtzWi62jRDhKa7haJ9L2p8bMxw8j2optS8b9ig3gNc/edit?gid=1807029121#gid=1807029121'},
  {nome:'Tickets',           ic:'🎫', url:'https://docs.google.com/spreadsheets/d/1ZQVgRsn5FwytaO7MyHLPATD88xQziUfZhOddV_I4j30/edit?gid=207987257#gid=207987257'},
  {nome:'Feriados',          ic:'📅', url:'https://docs.google.com/spreadsheets/d/1Gpn84rlS0fbd1j-gOxWZc8s3TJ6CzRYwrm-QsBZwhCI/edit?gid=59736689#gid=59736689'},
  {nome:'Modelos',           ic:'📄', url:'https://docs.google.com/spreadsheets/d/1NAzY_xSsdAYVwXZIy23dNXOkqLnt89UkFXPPeiEbHdI/edit?gid=1026418437#gid=1026418437'},
  {nome:'Config Tributário', ic:'⚙️', url:'https://docs.google.com/spreadsheets/d/1JiOjIfTXrOZPGuD_i4zmjXXVTaqPLlKD1fDCcMrDU4k/edit?gid=1736790632#gid=1736790632'}
];

function chaveAtual(){ const q=new URLSearchParams(location.search).get('chave'); const h=(location.hash||'').replace('#','').trim(); return q || h || CHAVE_PADRAO; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function normTxt(s){ return String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim(); }
function jsonp(url){
  return new Promise((ok,fail)=>{
    const cb='cb_'+Math.random().toString(36).slice(2);
    const s=document.createElement('script');
    const t=setTimeout(()=>{limpa();fail(new Error('A API não respondeu.'));},25000);
    function limpa(){clearTimeout(t);delete window[cb];s.remove();}
    window[cb]=d=>{limpa();ok(d);};
    s.onerror=()=>{limpa();fail(new Error('Não consegui alcançar a API.'));};
    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
    document.body.appendChild(s);
  });
}

const hoje=new Date(); hoje.setHours(0,0,0,0);
function alertaVenc(nome, iso){
  if(!iso) return '';
  const m=String(iso).match(/^(\d{4})-(\d{2})-(\d{2})/); if(!m) return '';
  const dias=Math.round((new Date(+m[1],+m[2]-1,+m[3])-hoje)/864e5);
  let cl='ok', txt=`${nome} ok`;
  if(dias<0){ cl='venc'; txt=`${nome} vencido`; }
  else if(dias<=60){ cl='aten'; txt=`${nome} vence em ${dias}d`; }
  else return ''; // só alerta quando importa (≤60d ou vencido)
  return `<span class="al ${cl}">⏰ ${esc(txt)}</span>`;
}
function lkArea(rot, url, ic){
  if(url && /^https?:/.test(url)) return `<a class="lk area" href="${esc(url)}" target="_blank" rel="noopener"><span class="ic">${ic}</span>${esc(rot)}</a>`;
  return `<span class="lk area off"><span class="ic">${ic}</span>${esc(rot)}</span>`;
}
function lkPasta(rot, url){
  if(url && /^https?:/.test(url)) return `<a class="lk" href="${esc(url)}" target="_blank" rel="noopener">${esc(rot)}</a>`;
  return '';
}

/* ---- Acesso rápido (independente da API) ---- */
function botaoCentral(l){
  return `<a class="central-lk" href="${esc(l.url)}" target="_blank" rel="noopener">
       <span class="ic">${l.ic}</span><span>${esc(l.nome)}</span><span class="arw">›</span>
     </a>`;
}
function pintarCentrais(){
  const principais = LINKS_PRINCIPAIS.map(botaoCentral).join('');
  const outros = LINKS_OUTROS.map(l=>
    `<a href="${esc(l.url)}" target="_blank" rel="noopener"><span class="ic">${l.ic}</span>${esc(l.nome)}</a>`).join('');
  document.getElementById('centrais').innerHTML = principais +
    `<div class="menu" id="menu-outros">
       <button type="button" class="central-lk" id="btn-outros" aria-expanded="false">
         <span class="ic">🗂️</span><span>Outros</span><span class="arw">▾</span>
       </button>
       <div class="menu-pop" id="pop-outros" hidden>${outros}</div>
     </div>`;
  const btn=document.getElementById('btn-outros'), pop=document.getElementById('pop-outros');
  btn.addEventListener('click', e=>{
    e.stopPropagation();
    const abrir = pop.hidden;
    pop.hidden = !abrir;
    btn.setAttribute('aria-expanded', abrir ? 'true' : 'false');
  });
}
function fecharOutros(){
  const pop=document.getElementById('pop-outros'), btn=document.getElementById('btn-outros');
  if(pop && !pop.hidden){ pop.hidden=true; btn.setAttribute('aria-expanded','false'); }
}

/* ---- Painel de um cliente ---- */
function painelCliente(c){
  const p=c.pastas||{}, a=c.areas||{}, cert=c.certificado||{};
  const alertas=[alertaVenc('Certificado', cert.venc_certificado), alertaVenc('e-CAC', cert.venc_ecac)].filter(Boolean).join('');
  const drive = c.drive && /^https?:/.test(c.drive)
    ? `<a class="lk drive" href="${esc(c.drive)}" target="_blank" rel="noopener"><span class="ic">📁</span>Drive do cliente</a>` : '';
  const subs=[lkPasta('Recebidos',p.principal),lkPasta('Extratos',p.extratos),lkPasta('Notas fiscais',p.notas),lkPasta('Outros',p.outros)].filter(Boolean).join('');
  return `<div class="cli">
    <div class="cli-top">
      <span class="cli-id">${esc(c.id)}</span>
      <div class="cli-nome">${esc(c.nome||'(sem nome)')}${c.cnpj?`<div class="cli-cnpj">${esc(c.cnpj)}</div>`:''}</div>
    </div>
    ${alertas?`<div class="alertas">${alertas}</div>`:''}
    ${(drive||subs)?`<div class="linha"><span class="rot">Drive</span>${drive}${subs}</div>`:''}
    <div class="linha"><span class="rot">Planilhas</span>
      ${lkArea('Fiscal',a.fiscal,'📊')}
      ${lkArea('Equiparação',a.equiparacao,'⚖️')}
      ${lkArea('Societário',a.societario,'🏛️')}
      ${lkArea('Contábil',a.contabil,'📒')}
      ${lkArea('Pessoal',a.pessoal,'👥')}
    </div>
  </div>`;
}

/* ---- Combobox de clientes ---- */
let TODOS=[], VISIVEIS=[], ativo=-1, apiOk=false;
const $busca=()=>document.getElementById('busca');
const $ops=()=>document.getElementById('opcoes');
const $det=()=>document.getElementById('detalhe');

function ordenar(lista){ return lista.slice().sort((a,b)=>String(a.id).localeCompare(String(b.id),'pt',{numeric:true})); }

function filtrar(termo){
  const alvo=normTxt(termo);
  const base=ordenar(TODOS);
  if(!alvo) return base;
  return base.filter(c=>normTxt(c.id+' '+(c.nome||'')+' '+(c.cnpj||'')).includes(alvo));
}
function abrir(){
  if(!apiOk) return;
  VISIVEIS=filtrar($busca().value);
  ativo=-1;
  pintarOpcoes();
  $ops().hidden=false;
}
function fechar(){ $ops().hidden=true; ativo=-1; }
function pintarOpcoes(){
  const ops=$ops();
  if(!VISIVEIS.length){ ops.innerHTML='<div class="opt-vazio">Nenhum cliente encontrado.</div>'; return; }
  ops.innerHTML=VISIVEIS.map((c,i)=>
    `<div class="opt${i===ativo?' on':''}" data-i="${i}">
       <span class="opt-id">${esc(c.id)}</span>
       <span class="opt-nome">${esc(c.nome||'(sem nome)')}${c.cnpj?`<span class="opt-cnpj"> · ${esc(c.cnpj)}</span>`:''}</span>
     </div>`).join('');
}
function selecionar(c){
  if(!c) return;
  $busca().value = c.id+' — '+(c.nome||'');
  fechar();
  $det().innerHTML = painelCliente(c);
}
function moverAtivo(passo){
  if($ops().hidden) { abrir(); return; }
  if(!VISIVEIS.length) return;
  ativo = (ativo+passo+VISIVEIS.length)%VISIVEIS.length;
  pintarOpcoes();
  const el=$ops().querySelector('.opt.on'); if(el) el.scrollIntoView({block:'nearest'});
}

function ligarCombo(){
  const b=$busca();
  b.addEventListener('input', ()=>{ if(apiOk) abrir(); });
  b.addEventListener('focus', ()=>{ if(apiOk) abrir(); });
  b.addEventListener('keydown', e=>{
    if(e.key==='ArrowDown'){ e.preventDefault(); moverAtivo(1); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); moverAtivo(-1); }
    else if(e.key==='Enter'){ if(!$ops().hidden && ativo>=0){ e.preventDefault(); selecionar(VISIVEIS[ativo]); } }
    else if(e.key==='Escape'){ fechar(); }
  });
  $ops().addEventListener('mousedown', e=>{
    const o=e.target.closest('.opt'); if(!o) return;
    e.preventDefault(); selecionar(VISIVEIS[+o.dataset.i]);
  });
  document.addEventListener('click', e=>{
    if(!e.target.closest('.combo')) fechar();
    if(!e.target.closest('#menu-outros')) fecharOutros();
  });
}

function boot(){
  pintarCentrais();
  ligarCombo();
  const nc=document.getElementById('novo-cliente');
  if(nc) nc.href='onboarding.html?chave='+encodeURIComponent(chaveAtual());
  ['fp-societario','fp-contatos'].forEach(id=>{const el=document.getElementById(id);if(el)el.href=el.getAttribute('href').split('?')[0]+'?chave='+encodeURIComponent(chaveAtual());});

  jsonp(API_URL+'?tipo=equipe&chave='+encodeURIComponent(chaveAtual()))
    .then(d=>{
      if(d.erro) throw new Error(d.erro);
      TODOS=d.clientes||[]; apiOk=true;
      document.getElementById('cnt').textContent = TODOS.length+' clientes';
      document.getElementById('dica').innerHTML = 'Digite para filtrar ou clique no campo para ver todos os '+TODOS.length+' clientes.';
    })
    .catch(e=>{
      document.getElementById('dica').innerHTML =
        '<span style="color:var(--vermelho)">Não consegui carregar os clientes: '+esc(e.message||String(e))+'.</span> '+
        'Confira a <code>chave</code> da equipe no endereço e se o Web App foi republicado. Os atalhos das planilhas centrais acima seguem funcionando.';
    });
}
boot();
</script>
</body>
</html>
