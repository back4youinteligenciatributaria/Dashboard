<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Societário — back4you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#F1E7DC; --surface:#FFFFFF; --surface-warm:#FBF6EF;
  --ink:#113D39; --ink-2:#3F5854; --muted:#8A7D70; --line:#E4D9C9; --line-2:#D6C3AC;
  --brand-dark:#073034; --brand-teal:#0F8C85; --brand-eucalipto2:#3FA680;
  --receita:#0F8C85; --receita-soft:#DCEFEC;
  --andamento:#A7715D; --andamento-soft:#F1E1D8;
  --aguardando:#8A7D70; --aguardando-soft:#EDE7DD;
  --radius:12px; --sans:'Montserrat',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--canvas);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius)}
:focus-visible{outline:2px solid var(--brand-teal);outline-offset:2px;border-radius:4px}
.wrap{max-width:900px;margin:0 auto;padding:0 24px 72px}

header{border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:var(--b4u-bar-h,0px);z-index:30}
.bar{max-width:900px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.logo{font-weight:900;font-size:19px;letter-spacing:-.02em;line-height:1}
.logo .b{color:var(--brand-dark)} .logo .y{color:var(--brand-teal)}
.brand-sub{font-size:15px;color:var(--brand-teal);font-weight:700;margin-top:2px}
.voltar{display:inline-block;font-size:11px;font-weight:600;color:var(--muted);text-decoration:none;margin-bottom:4px}
.voltar:hover{color:var(--brand-teal)}
.spacer{flex:1}
.badge-topo{font-size:11px;font-weight:700;color:var(--brand-teal);background:var(--receita-soft);padding:5px 12px;border-radius:20px}

.busca{margin:28px 0 24px}
.busca input{
  width:100%;font-family:var(--sans);font-size:14px;padding:12px 16px;border-radius:24px;
  border:1px solid var(--line-2);background:var(--surface);color:var(--ink);
}
.busca input::placeholder{color:var(--muted)}
.busca input:focus{outline:2px solid var(--brand-teal);outline-offset:1px}

.sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin:30px 0 14px}
.sec-head h2{font-size:16px;font-weight:700;letter-spacing:-.01em}
.sec-head p{font-size:13px;color:var(--muted)}

.processo-card{padding:20px 22px;margin-bottom:14px}
.processo-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.processo-head h3{font-size:14.5px;font-weight:700}
.status-chip{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:10px;white-space:nowrap}
.status-concluido{background:var(--receita-soft);color:var(--receita)}
.status-andamento{background:var(--andamento-soft);color:var(--andamento)}

.timeline{position:relative;padding-left:22px}
.timeline::before{content:'';position:absolute;left:5px;top:6px;bottom:6px;width:2px;background:var(--line-2)}
.etapa{position:relative;padding-bottom:16px}
.etapa:last-child{padding-bottom:0}
.etapa::before{content:'';position:absolute;left:-22px;top:3px;width:11px;height:11px;border-radius:50%;background:var(--aguardando);border:2px solid var(--surface)}
.etapa.concluido::before{background:var(--receita)}
.etapa.andamento::before{background:var(--andamento);box-shadow:0 0 0 3px var(--andamento-soft)}
.etapa-nome{font-size:13.5px;font-weight:600}
.etapa-meta{font-size:11.5px;color:var(--muted);margin-top:2px;display:flex;gap:8px;align-items:center}
.etapa-status{font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px}
.etapa-status.concluido{background:var(--receita-soft);color:var(--receita)}
.etapa-status.andamento{background:var(--andamento-soft);color:var(--andamento)}
.etapa-status.aguardando{background:var(--aguardando-soft);color:var(--aguardando)}
.processo-card.recolhido{padding:0}
.processo-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:18px 22px;background:none;border:none;cursor:pointer;font-family:var(--sans);color:var(--ink);text-align:left}
.processo-toggle .lado{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.processo-toggle h3{font-size:14.5px;font-weight:700}
.processo-toggle .conta{font-size:11px;color:var(--muted)}
.processo-toggle .seta{color:var(--muted);font-size:13px;transition:transform .2s}
.processo-toggle[aria-expanded="true"] .seta{transform:rotate(90deg)}
.processo-corpo{padding:0 22px 20px}
.etapa.tem-obs{cursor:pointer}
.etapa-datas{display:inline-flex;gap:5px;align-items:center;white-space:nowrap}
.etapa .obs-hint{font-size:10.5px;font-weight:700;color:var(--brand-teal);margin-top:4px;display:inline-flex;align-items:center;gap:4px}
.etapa.tem-obs.aberto .obs-hint .mais{transform:rotate(45deg)}
.obs-hint .mais{display:inline-block;transition:transform .15s}
.etapa-obs{display:none;margin-top:8px;padding:10px 12px;background:var(--surface-warm);
  border:1px solid var(--line);border-radius:8px;font-size:12px;color:var(--ink-2);line-height:1.55;white-space:pre-wrap}
.etapa-obs.aberto{display:block}

.lista{padding:8px 24px}
.item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0;border-top:1px solid var(--line)}
.item:first-child{border-top:none}
.item .nome{font-size:13.5px;font-weight:600}
.item .cat{font-size:11px;color:var(--muted);margin-top:2px}
.item a{font-size:12.5px;font-weight:700;color:var(--brand-teal);text-decoration:none;white-space:nowrap}
.item a:hover{color:var(--brand-dark)}
.item .em-breve{font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap}

.grupo-cat{border-top:1px solid var(--line)}
.grupo-cat:first-child{border-top:none}
.grupo-cat-btn{
  width:100%;display:flex;align-items:center;gap:10px;padding:14px 0;
  background:none;border:none;cursor:pointer;font-family:var(--sans);color:var(--ink);text-align:left;
}
.grupo-cat-nome{font-size:14px;font-weight:700;flex:1}
.grupo-cat-conta{font-size:11px;font-weight:700;color:var(--muted);background:var(--surface-warm);border-radius:10px;padding:2px 9px}
.grupo-cat-btn .seta{color:var(--muted);font-size:13px;transition:transform .2s}
.grupo-cat-body{padding:0 0 10px 4px}
.grupo-cat-body .item{padding:10px 0 10px 10px;border-top:1px solid var(--line)}
.grupo-cat-body .item:first-child{border-top:none}
.venc{display:inline-block;font-size:11px;font-weight:600;margin-top:3px}
.venc.venc-ok{color:var(--muted)}
.venc.venc-atencao{color:var(--andamento)}
.venc.venc-vencido{color:#8B2E22;font-weight:700}

.vazio{color:var(--muted);font-size:13.5px;padding:16px 0;text-align:center}

.state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:70vh;text-align:center;padding:0 24px}
.state h1{font-size:19px;font-weight:700}
.state p{color:var(--muted);font-size:14px;max-width:44ch}
.state code{background:var(--surface-warm);padding:2px 6px;border-radius:4px;border:1px solid var(--line);font-size:13px}
.spin{width:26px;height:26px;border:2.5px solid var(--line-2);border-top-color:var(--brand-teal);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
footer{margin-top:36px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
</style>
</head>
<body>
<!--B4U:START-->
<script>window.B4U = { area:'societario' };</script>
<!-- ═══════════ back4you · cabeçalho + chamados (compartilhado) ═══════════
     Bloco único, autocontido e com prefixo .b4u- (não conflita com o CSS da
     página). Cole logo depois de <body>, e ANTES dele defina:
        <script>window.B4U = { area:'fiscal' };</script>
     area = área padrão do chamado desta página
        (fiscal | dpto_pessoal | contabil | societario | equiparacao | outros)
     home:true  -> esconde o botão "Início" (usar só no index).
     Para reaproveitar em todas as páginas, mantenha este bloco IDÊNTICO. ─── -->
<style>
.b4u-bar{position:sticky;top:0;z-index:900;display:flex;align-items:center;gap:10px;
  padding:10px 18px;background:#073034;color:#fff;box-shadow:0 2px 12px rgba(7,48,52,.20);
  font-family:'Montserrat',system-ui,-apple-system,sans-serif}
.b4u-bar .b4u-logo{font-weight:900;font-size:17px;letter-spacing:-.02em;margin-right:auto;
  color:#fff;text-decoration:none;display:inline-flex;align-items:center;line-height:1}
.b4u-bar .b4u-logo .y{color:#3FA680}
.b4u-btn{display:inline-flex;align-items:center;gap:7px;border:0;cursor:pointer;
  font-family:inherit;font-weight:600;font-size:13px;padding:8px 13px;border-radius:10px;
  text-decoration:none;transition:background .15s,transform .08s;line-height:1;white-space:nowrap}
.b4u-btn svg{width:16px;height:16px;flex-shrink:0}
.b4u-btn .b4u-lbl{color:inherit;text-transform:none;letter-spacing:normal;font-size:13px}
.b4u-btn:active{transform:translateY(1px)}
.b4u-btn.ghost{background:rgba(255,255,255,.10);color:#fff}
.b4u-btn.ghost:hover{background:rgba(255,255,255,.18)}
.b4u-btn.wa{background:#25D366;color:#fff}
.b4u-btn.wa:hover{background:#20bd5a}
.b4u-btn.call{background:#0F8C85;color:#fff}
.b4u-btn.call:hover{background:#0c756f}
.b4u-icobtn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;
  padding:0;border:0;cursor:pointer;border-radius:9px;background:rgba(255,255,255,.10);color:#fff;
  transition:background .15s}
.b4u-icobtn:hover{background:rgba(255,255,255,.18)}
.b4u-icobtn svg{width:17px;height:17px}
@media(max-width:640px){
  .b4u-bar{gap:7px;padding:9px 12px}
  .b4u-btn .b4u-lbl{display:none}
  .b4u-btn{padding:9px 11px}
}
.b4u-ov{position:fixed;inset:0;z-index:1000;background:rgba(7,48,52,.45);
  display:none;align-items:flex-end;justify-content:center;
  font-family:'Montserrat',system-ui,-apple-system,sans-serif}
.b4u-ov.on{display:flex}
@media(min-width:640px){.b4u-ov{align-items:center;padding:24px}}
.b4u-modal{background:#fff;color:#113D39;width:100%;max-width:520px;border-radius:16px 16px 0 0;
  max-height:94vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
@media(min-width:640px){.b4u-modal{border-radius:16px}}
.b4u-modal h3{font-size:17px;font-weight:800;padding:18px 20px 3px;letter-spacing:-.01em}
.b4u-modal .b4u-sub{font-size:12.5px;color:#8A7D70;padding:0 20px 10px;line-height:1.5}
.b4u-fld{padding:7px 20px}
.b4u-fld label{display:block;font-size:12px;font-weight:700;color:#3F5854;margin-bottom:5px}
.b4u-fld select,.b4u-fld input,.b4u-fld textarea{width:100%;font-family:inherit;font-size:14px;
  padding:10px 12px;border:1px solid #E4D9C9;border-radius:10px;background:#FBF6EF;color:#113D39}
.b4u-fld textarea{min-height:120px;resize:vertical;line-height:1.5}
.b4u-fld select:focus,.b4u-fld input:focus,.b4u-fld textarea:focus{outline:2px solid #0F8C85;outline-offset:1px;border-color:transparent}
.b4u-err{color:#B4322A;font-size:12.5px;padding:2px 20px 0;min-height:16px}
.b4u-foot{display:flex;gap:10px;padding:14px 20px 20px;position:sticky;bottom:0;background:#fff}
.b4u-foot .b4u-btn{flex:1;justify-content:center;padding:12px}
.b4u-foot .primary{background:#0F8C85;color:#fff}
.b4u-foot .primary:hover{background:#0c756f}
.b4u-foot .primary[disabled]{opacity:.6;cursor:default}
.b4u-foot .cancel{background:#F1E7DC;color:#3F5854}
.b4u-foot .cancel:hover{background:#e8dccb}
.b4u-ok{padding:30px 22px;text-align:center}
.b4u-ok .chk{width:56px;height:56px;border-radius:50%;background:#E7F4EC;color:#2E9E63;
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.b4u-ok .chk svg{width:30px;height:30px}
.b4u-ok h3{font-size:18px;font-weight:800;margin-bottom:6px}
.b4u-ok p{font-size:13.5px;color:#3F5854;line-height:1.55;max-width:40ch;margin:0 auto 20px}
</style>
<script>
(function(){
  var CFG = window.B4U || {};
  if (CFG.__ready) return;

  var WA = '5511937173906';                        // +55 11 93717-3906
  var API_FALLBACK = 'https://script.google.com/macros/s/AKfycbyGAro0qPWpZcVX665KwKd-BK3ouSvVkAj5Vxw_phgO82EDa3gJrURcHjWIPYNQXT5d/exec';
  function api(){ try{ if(typeof API_URL==='string' && API_URL) return API_URL; }catch(e){} return API_FALLBACK; }

  var AREAS = [
    ['fiscal','Fiscal'], ['dpto_pessoal','Departamento Pessoal'], ['contabil','Contábil'],
    ['societario','Societário'], ['equiparacao','Equiparação'], ['outros','Outros / reportar erro']
  ];
  // tipo -> [rótulo, esqueleto de mensagem]
  var TIPOS = {
    livre:            ['Chamado livre', ''],
    solicitar_nf:     ['Solicitar nota fiscal', 'Solicito a emissão de uma nota fiscal.\n\nTomador (cliente):\nValor:\nDescrição do serviço:\nData desejada:'],
    duvida:           ['Tirar uma dúvida', 'Minha dúvida é:\n\n'],
    ferias:           ['Solicitar férias', 'Solicito a programação de férias.\n\nColaborador:\nInício desejado:\nDias:\nObservações:'],
    previa_admissao:  ['Prévia de admissão', 'Estou avaliando uma contratação (prévia, ainda sem formalizar).\n\nCargo cogitado:\nFaixa salarial:\nObservações:'],
    contratacao:      ['Formalizar admissão', 'Quero formalizar uma contratação.\n\nNome do colaborador:\nCargo:\nSalário:\nData de início:\nObservações:'],
    previa_rescisao:  ['Prévia de rescisão', 'Estou avaliando desligar um colaborador (prévia).\n\nColaborador:\nMotivo:\nObservações:'],
    rescisao:         ['Formalizar desligamento', 'Quero formalizar um desligamento.\n\nColaborador:\nMotivo:\nData prevista:\nAviso (trabalhado/indenizado):\nObservações:']
  };
  var ORDEM_TIPOS = ['livre','solicitar_nf','duvida','ferias','previa_admissao','contratacao','previa_rescisao','rescisao'];
  // O tipo de solicitação DEPENDE da área (não faz sentido pedir férias em Equiparação).
  var TIPOS_POR_AREA = {
    fiscal:       ['livre','solicitar_nf','duvida'],
    dpto_pessoal: ['livre','ferias','previa_admissao','contratacao','previa_rescisao','rescisao','duvida'],
    contabil:     ['livre','duvida'],
    societario:   ['livre','duvida'],
    equiparacao:  ['livre','duvida'],
    outros:       ['livre','duvida']
  };
  function tiposDaArea(area){ return TIPOS_POR_AREA[area] || TIPOS_POR_AREA.outros; }
  function opcoesTipo(area, sel){
    return tiposDaArea(area).map(function(t){
      return '<option value="'+t+'"'+(t===sel?' selected':'')+'>'+esc(TIPOS[t][0])+'</option>';
    }).join('');
  }

  // ---- id/código a partir da URL (?id=&codigo= ou #id-codigo) -------------
  function idc(){
    var qs = new URLSearchParams(location.search);
    var id = qs.get('id')||'', cod = qs.get('codigo')||'';
    if(!id){
      var h = (location.hash||'').replace('#','').trim();
      var m = h.match(/^(\d+)-(.+)$/); var s = h.match(/^(\d+)$/);
      if(m){ id=m[1]; cod=m[2]; } else if(s){ id=s[1]; }
    }
    return { id:String(id).replace(/\D/g,''), codigo:String(cod).trim() };
  }
  function jsonp(url){
    return new Promise(function(ok,fail){
      var cb='b4ucb_'+Math.random().toString(36).slice(2);
      var s=document.createElement('script');
      var t=setTimeout(function(){ limpa(); fail(new Error('A API não respondeu.')); }, 20000);
      function limpa(){ clearTimeout(t); try{delete window[cb];}catch(e){window[cb]=undefined;} s.remove(); }
      window[cb]=function(d){ limpa(); ok(d); };
      s.onerror=function(){ limpa(); fail(new Error('Não consegui alcançar a API.')); };
      s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
      document.body.appendChild(s);
    });
  }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  var IC = {
    home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 11 12 4l8 7"/><path d="M6 10v9h12v-9"/></svg>',
    wa:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1 0 12 2Zm5.3 14.1c-.2.6-1.3 1.2-1.8 1.2-.5.1-1 .2-3.3-.7-2.8-1.1-4.6-4-4.7-4.2-.1-.2-1.1-1.5-1.1-2.8 0-1.3.7-2 .9-2.2.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5.2.5.7 1.8.8 1.9.1.1.1.3 0 .5l-.3.5-.4.4c-.1.1-.3.3-.1.6.1.3.7 1.1 1.4 1.7.9.8 1.6 1 1.9 1.2.3.1.5.1.6-.1.2-.2.7-.8.9-1 .2-.3.4-.2.6-.1.2.1 1.5.7 1.7.9.3.1.4.2.5.3.1.2.1.7-.1 1.3Z"/></svg>',
    chat:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 12a8 8 0 0 1-11.5 7.2L3 21l1.8-6.5A8 8 0 1 1 21 12Z"/></svg>',
    help:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M9.2 9.3a2.8 2.8 0 0 1 5.4 1c0 1.8-2.6 2.2-2.6 3.9"/><path d="M12 17.4h.01"/></svg>',
    chk:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m5 13 4 4L19 7"/></svg>'
  };

  var C = idc();
  var linkHome = 'index.html' + (C.id ? '#'+C.id+(C.codigo?'-'+C.codigo:'') : '');
  var linkTickets = 'meustickets.html' + (C.id ? '#'+C.id+(C.codigo?'-'+C.codigo:'') : '');
  var waHref = 'https://wa.me/'+WA+'?text='+encodeURIComponent('Olá, sou cliente back4you'+(C.id?' (ID '+C.id+')':'')+'.');

  // ---- barra fixa ----------------------------------------------------------
  var bar = document.createElement('div');
  bar.className = 'b4u-bar';
  bar.innerHTML =
    '<a class="b4u-logo" href="'+esc(linkHome)+'"><span>back</span><span class="y">4you</span></a>' +
    (CFG.home ? '' :
      '<a class="b4u-btn ghost" href="'+esc(linkHome)+'">'+IC.home+'<span class="b4u-lbl">Início</span></a>') +
    '<a class="b4u-btn wa" href="'+esc(waHref)+'" target="_blank" rel="noopener">'+IC.wa+'<span class="b4u-lbl">WhatsApp</span></a>' +
    '<button type="button" class="b4u-btn call" id="b4u-open">'+IC.chat+'<span class="b4u-lbl">Abrir chamado</span></button>' +
    '<button type="button" class="b4u-icobtn" id="b4u-help" title="Reportar um erro ou pedir ajuda" aria-label="Reportar um erro ou pedir ajuda">'+IC.help+'</button>';
  document.body.insertBefore(bar, document.body.firstChild);
  // publica a altura da barra p/ os cabeçalhos internos grudarem logo abaixo dela
  function medirBarra(){ document.documentElement.style.setProperty('--b4u-bar-h', bar.offsetHeight + 'px'); }
  medirBarra();
  window.addEventListener('resize', medirBarra);
  window.addEventListener('load', medirBarra);

  // ---- modal ---------------------------------------------------------------
  var ov = document.createElement('div');
  ov.className = 'b4u-ov';
  document.body.appendChild(ov);

  function fecharModal(){ ov.classList.remove('on'); ov.innerHTML=''; }

  function abrir(opts){
    opts = opts || {};
    var areaSel = opts.area || CFG.area || 'outros';
    var tipoSel = opts.tipo || 'livre';
    if (tiposDaArea(areaSel).indexOf(tipoSel) < 0) tipoSel = tiposDaArea(areaSel)[0];   // tipo válido p/ a área
    ov.innerHTML =
      '<div class="b4u-modal" role="dialog" aria-modal="true" aria-label="Abrir chamado">' +
        '<h3>Abrir um chamado</h3>' +
        '<div class="b4u-sub">Registramos aqui e retornamos em até 48h úteis. Você pode acompanhar em “Meus chamados”.</div>' +
        '<div class="b4u-fld"><label for="b4u-area">Área</label><select id="b4u-area">' +
          AREAS.map(function(a){ return '<option value="'+a[0]+'"'+(a[0]===areaSel?' selected':'')+'>'+esc(a[1])+'</option>'; }).join('') +
        '</select></div>' +
        '<div class="b4u-fld"><label for="b4u-tipo">Tipo de solicitação</label><select id="b4u-tipo">' +
          opcoesTipo(areaSel, tipoSel) +
        '</select></div>' +
        '<div class="b4u-fld"><label for="b4u-assunto">Assunto</label><input id="b4u-assunto" maxlength="120" placeholder="Resumo em uma linha"></div>' +
        '<div class="b4u-fld"><label for="b4u-msg">Mensagem</label><textarea id="b4u-msg" placeholder="Descreva o que você precisa…"></textarea></div>' +
        '<div class="b4u-err" id="b4u-erro"></div>' +
        '<div class="b4u-foot">' +
          '<button type="button" class="b4u-btn cancel" id="b4u-cancel">Cancelar</button>' +
          '<button type="button" class="b4u-btn primary" id="b4u-send">Enviar chamado</button>' +
        '</div>' +
      '</div>';
    ov.classList.add('on');
    var selTipo = ov.querySelector('#b4u-tipo');
    var txt = ov.querySelector('#b4u-msg');
    function aplicaSkeleton(force){
      var esq = TIPOS[selTipo.value] ? TIPOS[selTipo.value][1] : '';
      if(force || !txt.value.trim()) txt.value = esq;
    }
    aplicaSkeleton(true);
    selTipo.addEventListener('change', function(){ aplicaSkeleton(true); txt.focus(); });
    // trocar a ÁREA repovoa os tipos válidos para ela
    ov.querySelector('#b4u-area').addEventListener('change', function(){
      selTipo.innerHTML = opcoesTipo(this.value, selTipo.value);
      aplicaSkeleton(true);
    });
    ov.querySelector('#b4u-cancel').addEventListener('click', fecharModal);
    ov.addEventListener('click', function(e){ if(e.target===ov) fecharModal(); });
    ov.querySelector('#b4u-send').addEventListener('click', enviar);
    ov.querySelector('#b4u-assunto').focus();
  }

  function enviar(){
    var cc = idc();
    var erroEl = ov.querySelector('#b4u-erro');
    var btn = ov.querySelector('#b4u-send');
    erroEl.textContent = '';
    if(!cc.id || !cc.codigo){ erroEl.textContent = 'Abra o painel pelo seu link (com ID e código) para enviar um chamado.'; return; }
    var area = ov.querySelector('#b4u-area').value;
    var tipo = ov.querySelector('#b4u-tipo').value;
    var assunto = ov.querySelector('#b4u-assunto').value.trim();
    var msg = ov.querySelector('#b4u-msg').value.trim();
    if(!msg){ erroEl.textContent = 'Escreva a mensagem do chamado.'; return; }
    btn.disabled = true; btn.textContent = 'Enviando…';
    var qs = new URLSearchParams({ id:cc.id, codigo:cc.codigo, acao:'ticket',
      area:area, tipo:tipo, assunto:assunto, mensagem:msg });
    jsonp(api()+'?'+qs.toString()).then(function(d){
      if(d && d.erro) throw new Error(d.erro);
      sucesso();
    }).catch(function(e){
      btn.disabled=false; btn.textContent='Enviar chamado';
      erroEl.textContent = e.message || String(e);
    });
  }

  function sucesso(){
    ov.innerHTML =
      '<div class="b4u-modal">' +
        '<div class="b4u-ok">' +
          '<div class="chk">'+IC.chk+'</div>' +
          '<h3>Chamado registrado</h3>' +
          '<p>Recebemos sua solicitação e retornamos em até 48h úteis. Em breve o acompanhamento também chegará por e-mail.</p>' +
          '<div class="b4u-foot" style="position:static;padding:0">' +
            '<button type="button" class="b4u-btn cancel" id="b4u-fecha">Fechar</button>' +
            '<a class="b4u-btn primary" href="'+esc(linkTickets)+'">Ir para meus chamados</a>' +
          '</div>' +
        '</div>' +
      '</div>';
    ov.querySelector('#b4u-fecha').addEventListener('click', fecharModal);
  }

  bar.querySelector('#b4u-open').addEventListener('click', function(){ abrir({}); });
  bar.querySelector('#b4u-help').addEventListener('click', function(){ abrir({ area:'outros', tipo:'livre' }); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape' && ov.classList.contains('on')) fecharModal(); });

  window.B4U = { __ready:true, area: CFG.area||'outros', abrirChamado: abrir, meusTickets: linkTickets };
})();
</script>

<div id="app">
  <div class="state">
    <div class="spin" role="status" aria-label="Carregando"></div>
    <p>Carregando o painel…</p>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyGAro0qPWpZcVX665KwKd-BK3ouSvVkAj5Vxw_phgO82EDa3gJrURcHjWIPYNQXT5d/exec';
const TIPO = 'societario';
const TITULO_PAGINA = 'Societário';
// Equiparação é a única categoria reservada — aparece só no equiparacao.html.
// Qualquer outra categoria (Paciente, Alvarás, Contratos, o que o time escrever)
// é livre e aparece aqui, agrupada.
const CATEGORIA_EXCLUIDA = 'Equiparação';

function normTxt(s){ return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim(); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function getIdCodigo(){
  const qs = new URLSearchParams(location.search);
  let id = qs.get('id') || '';
  let codigo = qs.get('codigo') || '';
  if (!id){
    const h = location.hash.replace('#','').trim();
    const comCodigo = h.match(/^(\d+)-(.+)$/);
    const soId = h.match(/^(\d+)$/);
    if (comCodigo) { id = comCodigo[1]; codigo = comCodigo[2]; }
    else if (soId) { id = soId[1]; }
  }
  return { id: id.replace(/\D/g,''), codigo: codigo.trim() };
}

function jsonp(url){
  return new Promise((ok,fail)=>{
    const cb = 'cb_'+Math.random().toString(36).slice(2);
    const s = document.createElement('script');
    const t = setTimeout(()=>{ limpa(); fail(new Error('A API não respondeu.')); }, 20000);
    function limpa(){ clearTimeout(t); delete window[cb]; s.remove(); }
    window[cb] = d => { limpa(); ok(d); };
    s.onerror = () => { limpa(); fail(new Error('Não consegui alcançar a API.')); };
    s.src = url + (url.includes('?')?'&':'?') + 'callback=' + cb;
    document.body.appendChild(s);
  });
}

let IDENTIDADE = { id: '', codigo: '' };

async function carregarTipo(tipo){
  const { id, codigo } = IDENTIDADE;
  if (API_URL){
    const url = API_URL + '?id=' + encodeURIComponent(id) + '&codigo=' + encodeURIComponent(codigo) + '&tipo=' + tipo;
    const d = await jsonp(url);
    if (d.erro) throw new Error(d.erro);
    return d;
  }
  const arq = tipo === 'modelos' ? 'demo_modelos.json' : `demo_${TIPO}.json`;
  const r = await fetch(arq);
  if (!r.ok) throw new Error(`Sem API configurada e sem ${arq} ao lado deste arquivo.`);
  return r.json();
}

function dBR(iso){
  if (!iso) return '';
  const s = String(iso).trim();
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return s; // texto livre (ex.: "set/2025") — mostra exatamente como o colaborador escreveu
  return `${m[3]}/${m[2]}/${m[1]}`;
}

function classeStatus(status){
  const n = normTxt(status);
  if (n.includes('conclu')) return 'concluido';
  if (n.includes('andament')) return 'andamento';
  return 'aguardando';
}

function render(M, modelos){
  const app = document.getElementById('app');
  app.innerHTML = '';

  app.appendChild(el(`
    <header><div class="bar">
      <div>
        <div class="logo"><span class="b">back</span><span class="y">4you</span></div>
        <div class="brand-sub">${(M.config && M.config.razao_social) || TITULO_PAGINA} · ${(M.config && M.config.cnpj) ? 'CNPJ ' + M.config.cnpj : 'cliente ' + M.id}</div>
      </div>
      <div class="spacer"></div>
      <span class="badge-topo">${TITULO_PAGINA}</span>
    </div></header>`));

  const wrap = el('<div class="wrap"></div>');
  app.appendChild(wrap);

  appendAll(wrap, `
    <div class="busca">
      <input type="search" id="busca" placeholder="Buscar documento, modelo ou processo…">
    </div>`);

  appendAll(wrap, `
    <div class="sec-head"><div><h2>Alterações societárias</h2></div></div>
    <div id="alteracoes"></div>`);

  appendAll(wrap, `
    <div class="sec-head"><div><h2>Documentos</h2></div></div>
    <div class="card lista" id="documentos"></div>`);

  appendAll(wrap, `
    <div class="sec-head"><div><h2>Modelos</h2></div></div>
    <div class="card lista" id="modelos"></div>`);

  wrap.appendChild(el(`<footer>
      <span>Atualizado em ${new Date(M.atualizado_em||Date.now()).toLocaleString('pt-BR',{dateStyle:'short',timeStyle:'short'})}</span>
    </footer>`));

  desenharAlteracoes(M.alteracoes || []);
  desenharDocumentos(M.documentos || []);
  desenharModelos(modelos);

  document.getElementById('busca').addEventListener('input', e => filtrar(e.target.value));
}

function periodoEtapa(e){
  const i = e.inicio ? dBR(e.inicio) : '';
  const f = e.fim ? dBR(e.fim) : '';
  if (i && f) return i === f ? i : `${i} → ${f}`;
  if (i) return `Início ${i}`;
  if (f) return `Até ${f}`;
  return '';
}

function timelineHTML(p){
  return `<div class="timeline">
    ${p.etapas.map((e,idx)=>{
      const cl = classeStatus(e.status);
      const per = periodoEtapa(e);
      const temObs = !!(e.observacoes && e.observacoes.trim());
      return `<div class="etapa ${cl}${temObs?' tem-obs':''}" ${temObs?`data-etapa="${idx}"`:''}>
        <div class="etapa-nome">${e.nome}</div>
        <div class="etapa-meta">
          ${per ? `<span class="etapa-datas">${per}</span>` : ''}
          <span class="etapa-status ${cl}">${e.status || '—'}</span>
        </div>
        ${temObs ? `<div class="obs-hint"><span class="mais">＋</span> observação</div>
          <div class="etapa-obs">${esc(e.observacoes)}</div>` : ''}
      </div>`;
    }).join('')}
  </div>`;
}

function desenharAlteracoes(alteracoes){
  const box = document.getElementById('alteracoes');
  if (!alteracoes.length){
    box.innerHTML = '<div class="card"><div class="vazio">Nenhuma alteração societária em aberto no momento.</div></div>';
    return;
  }
  // Em andamento primeiro; concluídos vão para o fim (e entram recolhidos).
  const ordenadas = alteracoes.slice().sort((a,b)=>
    (a.concluido === b.concluido) ? 0 : (a.concluido ? 1 : -1));

  box.innerHTML = ordenadas.map(p=>{
    const nEt = p.etapas.length;
    if (p.concluido){
      // processo inteiro concluído -> recolhido, com opção de expandir
      return `<div class="card processo-card recolhido" data-busca="${normTxt(p.processo)}">
        <button class="processo-toggle" data-proc aria-expanded="false">
          <span class="lado">
            <span class="status-chip status-concluido">Concluído</span>
            <h3>${p.processo}</h3>
            <span class="conta">${nEt} etapa${nEt>1?'s':''}</span>
          </span>
          <span class="seta">▸</span>
        </button>
        <div class="processo-corpo" style="display:none">${timelineHTML(p)}</div>
      </div>`;
    }
    return `<div class="card processo-card" data-busca="${normTxt(p.processo)}">
      <div class="processo-head">
        <h3>${p.processo}</h3>
        <span class="status-chip status-andamento">Em andamento</span>
      </div>
      ${timelineHTML(p)}
    </div>`;
  }).join('');

  box.onclick = (ev)=>{
    const proc = ev.target.closest('[data-proc]');
    if (proc){
      const corpo = proc.parentElement.querySelector('.processo-corpo');
      const abrir = corpo.style.display === 'none';
      corpo.style.display = abrir ? 'block' : 'none';
      proc.setAttribute('aria-expanded', abrir);
      return;
    }
    const et = ev.target.closest('.etapa.tem-obs');
    if (et){
      et.classList.toggle('aberto');
      const obs = et.querySelector('.etapa-obs');
      if (obs) obs.classList.toggle('aberto');
    }
  };
}

const hoje = new Date(); hoje.setHours(0,0,0,0);

function vencimentoInfo(iso){
  if (!iso) return '';
  const [a,m,d] = String(iso).split('-').map(Number);
  const venc = new Date(a, m-1, d);
  const dias = Math.round((venc - hoje) / 864e5);
  let classe = 'venc-ok', texto;
  if (dias < 0){ classe = 'venc-vencido'; texto = `Venceu há ${-dias}d`; }
  else if (dias <= 60){ classe = 'venc-atencao'; texto = `Vence em ${dias}d`; }
  else { texto = `Vence ${dBR(iso)}`; }
  return `<span class="venc ${classe}">${texto}</span>`;
}

function desenharDocumentos(documentos){
  const box = document.getElementById('documentos');
  const comLink = (documentos||[]).filter(d => d.link && String(d.link).trim());
  if (!comLink.length){ box.innerHTML = '<div class="vazio">Nenhum documento cadastrado ainda.</div>'; return; }
  box.innerHTML = comLink.map(d=>{
    return `<div class="item" data-busca="${normTxt(d.documento)}">
      <div><div class="nome">${d.documento}</div>${vencimentoInfo(d.vencimento)}</div>
      <a href="${d.link}" target="_blank" rel="noopener">Abrir ↗</a>
    </div>`;
  }).join('');
}

function desenharModelos(modelos){
  const box = document.getElementById('modelos');
  const visiveis = modelos.filter(m => normTxt(m.categoria) !== normTxt(CATEGORIA_EXCLUIDA));
  if (!visiveis.length){ box.innerHTML = '<div class="vazio">Nenhum modelo cadastrado ainda.</div>'; return; }

  // Agrupa preservando a ordem de primeira aparição de cada categoria.
  const grupos = new Map();
  visiveis.forEach(m=>{
    const cat = String(m.categoria||'Outros').trim();
    if (!grupos.has(cat)) grupos.set(cat, []);
    grupos.get(cat).push(m);
  });

  box.innerHTML = Array.from(grupos.entries()).map(([cat, itens], i)=>{
    const catId = 'cat-' + i;
    return `<div class="grupo-cat" data-busca="${normTxt(cat)} ${itens.map(m=>normTxt(m.documento)).join(' ')}">
      <button class="grupo-cat-btn" aria-expanded="false" onclick="
        const body=document.getElementById('${catId}'); const abrir=body.style.display!=='block';
        body.style.display = abrir?'block':'none'; this.setAttribute('aria-expanded', abrir);
        this.querySelector('.seta').style.transform = abrir?'rotate(180deg)':'';
      ">
        <span class="grupo-cat-nome">${cat}</span>
        <span class="grupo-cat-conta">${itens.length}</span>
        <span class="seta">▾</span>
      </button>
      <div class="grupo-cat-body" id="${catId}" style="display:none">
        ${itens.map(m=>{
          const link = m.link && String(m.link).trim();
          return `<div class="item" data-busca="${normTxt(m.documento)}">
            <div class="nome">${m.documento}</div>
            ${link ? `<a href="${link}" target="_blank" rel="noopener">Abrir ↗</a>` : `<span class="em-breve">Em breve</span>`}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function filtrar(termo){
  const alvo = normTxt(termo);

  // Documentos e processos societários — comportamento simples de mostrar/esconder.
  document.querySelectorAll('#documentos [data-busca], #alteracoes [data-busca]').forEach(el=>{
    el.style.display = !alvo || el.dataset.busca.includes(alvo) ? '' : 'none';
  });

  // Modelos — agrupados: some o grupo inteiro se nada bater, e abre sozinho
  // o grupo que tiver resultado (fecha de novo se a busca for limpa).
  document.querySelectorAll('#modelos .grupo-cat').forEach(grupo=>{
    const bate = !alvo || grupo.dataset.busca.includes(alvo);
    grupo.style.display = bate ? '' : 'none';
    const body = grupo.querySelector('.grupo-cat-body');
    const btn = grupo.querySelector('.grupo-cat-btn');
    if (bate && alvo){
      body.style.display = 'block';
      btn.setAttribute('aria-expanded', 'true');
      btn.querySelector('.seta').style.transform = 'rotate(180deg)';
    } else if (!alvo){
      body.style.display = 'none';
      btn.setAttribute('aria-expanded', 'false');
      btn.querySelector('.seta').style.transform = '';
    }
  });
}

function el(h){ const t=document.createElement('template'); t.innerHTML=h.trim(); return t.content.firstElementChild; }
function appendAll(parent, h){
  const t = document.createElement('template'); t.innerHTML = h.trim();
  Array.from(t.content.children).forEach(n => parent.appendChild(n));
}

function erro(msg){
  document.getElementById('app').innerHTML = `
    <div class="state">
      <h1>Não deu para abrir o painel</h1>
      <p>${msg}</p>
      <p>Confira se o endereço termina com o ID e o código de acesso do cliente, assim: <code>#482913-AbC123</code></p>
    </div>`;
}

(async function(){
  const { id, codigo } = getIdCodigo();
  IDENTIDADE = { id, codigo };
  if (!id || !codigo) return erro('Informe o ID e o código de acesso no final do endereço.');
  try {
    const [dados, modelosResp] = await Promise.all([
      carregarTipo(TIPO),
      carregarTipo('modelos').catch(()=>({modelos:[]})),
    ]);
    render(dados, modelosResp.modelos || []);
  } catch (e) {
    erro(e.message || String(e));
  }
})();
</script>
