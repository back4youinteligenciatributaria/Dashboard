<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel fiscal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#EDF0EF; --surface:#FFFFFF; --surface-2:#F6F8F7;
  --ink:#0F1C1A; --ink-2:#3D4E4B; --muted:#6C7B78; --line:#DBE3E1; --line-2:#C4D0CD;
  --receita:#0E6B54; --receita-soft:#E2F0EB;
  --imposto:#A03B2C; --imposto-soft:#F7E9E6;
  --provisao:#2F4E7A; --provisao-soft:#E5EBF3;
  --sinal:#9A6B08; --sinal-soft:#FBF0DC;
  --radius:10px;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--canvas); color:var(--ink); font-family:var(--sans);
  font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px 72px}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.lbl{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:500}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius)}
:focus-visible{outline:2px solid var(--provisao);outline-offset:2px;border-radius:4px}

/* ---------- topo ---------- */
header{border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:0;z-index:20}
.bar{max-width:1180px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.brand{display:flex;flex-direction:column;gap:1px;min-width:0}
.brand b{font-size:15px;font-weight:600;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand span{font-size:12px;color:var(--muted)}
.spacer{flex:1}
.picker{display:flex;align-items:center;gap:8px}
select{
  font-family:var(--mono);font-size:14px;font-weight:500;color:var(--ink);
  background:var(--surface-2);border:1px solid var(--line-2);border-radius:8px;
  padding:8px 12px;cursor:pointer;
}
.pill{
  font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  padding:4px 9px;border-radius:20px;background:var(--surface-2);color:var(--muted);border:1px solid var(--line)
}

/* ---------- hero ---------- */
.hero{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(0,1fr);gap:20px;margin:28px 0 20px}
@media(max-width:900px){.hero{grid-template-columns:1fr}}
.hero-main{padding:26px 28px;display:flex;flex-direction:column;justify-content:center}
.hero-main .lbl{margin-bottom:10px}
.big{font-family:var(--mono);font-size:clamp(38px,5.2vw,58px);font-weight:500;line-height:1;letter-spacing:-.035em}
.delta{margin-top:12px;font-size:13px;color:var(--ink-2);display:flex;align-items:center;gap:7px}
.chip{font-family:var(--mono);font-size:12px;font-weight:600;padding:2px 7px;border-radius:5px}
.chip.up{background:var(--receita-soft);color:var(--receita)}
.chip.down{background:var(--imposto-soft);color:var(--imposto)}
.grid4{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.stat{padding:16px 18px}
.stat .v{font-family:var(--mono);font-size:23px;font-weight:500;letter-spacing:-.025em;margin-top:7px}
.stat .s{font-size:12px;color:var(--muted);margin-top:3px}
.stat.imposto .v{color:var(--imposto)}
.stat.receita .v{color:var(--receita)}

/* ---------- alerta ---------- */
.alert{
  display:flex;gap:12px;align-items:flex-start;padding:13px 16px;border-radius:var(--radius);
  background:var(--sinal-soft);border:1px solid #EEDCB4;color:#6E4C05;font-size:13.5px;margin-bottom:20px
}
.alert b{font-weight:600}
.alert svg{flex-shrink:0;margin-top:2px}

/* ---------- provisionamento (assinatura) ---------- */
.prov{padding:24px 28px;margin-bottom:20px}
.prov-head{display:flex;justify-content:space-between;align-items:baseline;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.prov-head h2{font-size:17px;font-weight:600;letter-spacing:-.01em}
.prov-head p{font-size:13px;color:var(--muted);margin-top:3px;max-width:52ch}
.prov-due{text-align:right}
.prov-due .lbl{display:block;margin-bottom:5px}
.prov-due .d{font-family:var(--mono);font-size:19px;font-weight:600;color:var(--provisao)}
.prov-due .n{font-size:12px;color:var(--muted);margin-top:2px}

.ladder{display:flex;align-items:flex-end;gap:3px;height:132px;margin-bottom:8px}
.rung{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:100%;position:relative}
.rung .fill{
  border-radius:5px 5px 0 0;background:var(--provisao);
  transition:height .55s cubic-bezier(.2,.7,.3,1);min-height:3px;
}
.rung.futuro .fill{background:repeating-linear-gradient(135deg,var(--provisao-soft),var(--provisao-soft) 5px,#D2DCE9 5px,#D2DCE9 10px);border:1px dashed var(--line-2);border-bottom:none}
.rung .amt{font-family:var(--mono);font-size:12px;font-weight:600;text-align:center;margin-bottom:6px;color:var(--provisao)}
.rung.futuro .amt{color:var(--muted);font-weight:400}
.rung-axis{display:flex;gap:3px;border-top:1px solid var(--line-2);padding-top:8px}
.rung-axis div{flex:1;text-align:center}
.rung-axis .m{font-family:var(--mono);font-size:12px;font-weight:500}
.rung-axis .st{font-size:11px;color:var(--muted)}
.prov-foot{display:flex;gap:28px;flex-wrap:wrap;margin-top:20px;padding-top:18px;border-top:1px solid var(--line)}
.prov-foot div .lbl{display:block;margin-bottom:4px}
.prov-foot div .v{font-family:var(--mono);font-size:17px;font-weight:600}

/* ---------- vencimentos ---------- */
.sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin:32px 0 14px}
.sec-head h2{font-size:17px;font-weight:600;letter-spacing:-.01em}
.sec-head p{font-size:13px;color:var(--muted)}
.months{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}
.month{padding:14px 16px 16px}
.month h3{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.02em;text-transform:capitalize}
.month .tot{font-family:var(--mono);font-size:19px;font-weight:600;margin:4px 0 12px;letter-spacing:-.02em}
.due{display:flex;gap:9px;padding:7px 0;border-top:1px solid var(--line);font-size:12.5px}
.due:first-of-type{border-top:none}
.due .day{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--muted);width:30px;flex-shrink:0;padding-top:1px}
.due .body{min-width:0;flex:1}
.due .nm{display:block;line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.due .vl{font-family:var(--mono);font-size:12px;color:var(--ink-2)}
.due .vl.est::after{content:' est.';font-family:var(--sans);font-size:10px;color:var(--muted)}
.due .vl.zero{color:var(--muted)}
.due .adj{font-size:10.5px;color:var(--sinal)}
.dot{width:6px;height:6px;border-radius:50%;margin-top:6px;flex-shrink:0}
.dot.trib{background:var(--imposto)}
.dot.acess{background:var(--line-2)}
.dot.outro{background:var(--sinal)}

/* ---------- gráficos ---------- */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.charts{grid-template-columns:1fr}}
.chart{padding:20px 22px 16px}
.chart h3{font-size:14px;font-weight:600;margin-bottom:2px}
.chart .sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px;font-size:11.5px;color:var(--ink-2)}
.legend i{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:5px;vertical-align:-1px}
.cbox{position:relative;height:230px}

/* ---------- rateio ---------- */
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:500;padding:0 10px 9px;border-bottom:1px solid var(--line-2)}
th.r,td.r{text-align:right}
td{padding:10px;border-bottom:1px solid var(--line)}
tbody tr:last-child td{border-bottom:none}
tbody tr.nid td{background:var(--imposto-soft)}
td.num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.share{position:relative;height:5px;border-radius:3px;background:var(--surface-2);margin-top:5px;overflow:hidden}
.share i{position:absolute;inset:0 auto 0 0;background:var(--receita);border-radius:3px;display:block}
tr.nid .share i{background:var(--imposto)}

/* ---------- estados ---------- */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:70vh;text-align:center;padding:0 24px}
.state h1{font-size:20px;font-weight:600}
.state p{color:var(--muted);font-size:14px;max-width:44ch}
.state code{font-family:var(--mono);background:var(--surface);padding:2px 6px;border-radius:4px;border:1px solid var(--line);font-size:13px}
.spin{width:26px;height:26px;border:2.5px solid var(--line-2);border-top-color:var(--ink);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
footer{margin-top:44px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<div id="app">
  <div class="state">
    <div class="spin" role="status" aria-label="Carregando"></div>
    <p>Carregando o painel…</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
/* ============================================================
   CONFIGURAÇÃO — cole aqui a URL /exec do Apps Script publicado
   ============================================================ */
const API_URL = 'https://script.google.com/macros/s/AKfycbyGAro0qPWpZcVX665KwKd-BK3ouSvVkAj5Vxw_phgO82EDa3gJrURcHjWIPYNQXT5d/exec';

/* Acesso:  index.html#482913   ou   index.html?id=482913
   Sem API_URL configurada, a página carrega demo.json (dados de exemplo). */

const C = {receita:'#0E6B54', imposto:'#A03B2C', provisao:'#2F4E7A', sinal:'#9A6B08',
           ink:'#0F1C1A', muted:'#6C7B78', line:'#DBE3E1'};
const TRIB = [
  {k:'ISS a Pagar (R$)',    n:'ISS',    c:'#2F4E7A'},
  {k:'PIS a pagar (R$)',    n:'PIS',    c:'#4A7FA8'},
  {k:'COFINS a pagar (R$)', n:'COFINS', c:'#0E6B54'},
  {k:'CSLL a pagar (R$)',   n:'CSLL',   c:'#9A6B08'},
  {k:'IR a pagar (R$)',     n:'IRPJ',   c:'#A03B2C'},
];
const MESES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

const brl = v => (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
const brl2 = v => (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:2});
const pct = v => (v*100).toFixed(1).replace('.',',')+'%';
const num = v => Number(v)||0;
const mesLabel = c => { const [a,m]=c.split('-'); return MESES[+m-1]+'/'+a.slice(2); };
const mesLongo = c => { const [a,m]=c.split('-'); return MESES[+m-1]+' '+a; };
const hoje = new Date(); hoje.setHours(0,0,0,0);
const dParse = s => { const [a,m,d]=String(s).split('-').map(Number); return new Date(a,m-1,d); };
const addM = (d,n) => new Date(d.getFullYear(), d.getMonth()+n, d.getDate());
const compDe = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
const el = h => { const t=document.createElement('template'); t.innerHTML=h.trim(); return t.content.firstElementChild; };

/* ---------------- carga ---------------- */
function getId(){
  const q = new URLSearchParams(location.search).get('id');
  const h = location.hash.replace('#','').trim();
  return (q || h || '').replace(/\D/g,'');
}

function jsonp(url){
  return new Promise((ok,fail)=>{
    const cb = 'cb_'+Math.random().toString(36).slice(2);
    const s = document.createElement('script');
    const t = setTimeout(()=>{ limpa(); fail(new Error('A API não respondeu.')); }, 20000);
    function limpa(){ clearTimeout(t); delete window[cb]; s.remove(); }
    window[cb] = d => { limpa(); ok(d); };
    s.onerror = () => { limpa(); fail(new Error('Não consegui alcançar a API.')); };
    s.src = url + (url.includes('?')?'&':'?') + 'callback=' + cb;
    document.body.appendChild(s);
  });
}

async function carregar(){
  const id = getId();
  if (API_URL){
    if (!id) throw new Error('Informe o ID do cliente no final do endereço.');
    const d = await jsonp(API_URL + '?id=' + encodeURIComponent(id));
    if (d.erro) throw new Error(d.erro);
    return d;
  }
  const r = await fetch('demo.json');
  if (!r.ok) throw new Error('Sem API configurada e sem demo.json ao lado do index.html.');
  return r.json();
}

/* ---------------- modelo ---------------- */
function preparar(raw){
  const eComp = r => /^\d{4}-\d{2}$/.test(String(r.competencia||''));
  const empresa = (raw.empresa||[]).filter(eComp).sort((a,b)=>a.competencia.localeCompare(b.competencia));
  const rateio  = (raw.rateio||[]).filter(eComp);
  const regras  = (raw.regras||[]).filter(r=>/^R\d+$/.test(String(r.id||'')));
  const cal     = (raw.calendario||[]).filter(c=>/^R\d+$/.test(String(c.id_regra||'')) && c.vencimento)
                    .sort((a,b)=>String(a.vencimento).localeCompare(String(b.vencimento)));
  const regraDe = Object.fromEntries(regras.map(r=>[r.id,r]));

  const impostos = r => TRIB.reduce((s,t)=>s+num(r[t.k]),0);
  const retido = r => num(r['ISS Retido (R$)'])+num(r['PIS Retido (R$)'])+num(r['COFINS Retido (R$)'])
                    + num(r['CSLL Retida (R$)'])+num(r['IR Retido (R$)']);

  const porComp = Object.fromEntries(empresa.map(r=>[r.competencia,r]));

  // média dos 3 últimos meses apurados, por métrica — base das projeções
  const ult3 = empresa.slice(-3);
  const media = k => ult3.length ? ult3.reduce((s,r)=>s+num(r[k]),0)/ult3.length : 0;

  function somaMetricas(comp, chaves){
    const r = porComp[comp];
    return chaves.reduce((s,k)=> s + (r ? num(r[k]) : media(k)), 0);
  }

  // valor previsto de um item do calendário
  function valorDe(item){
    const reg = regraDe[item.id_regra] || {};
    if (num(reg.valor_previsto) > 0) return {v:num(reg.valor_previsto), est:false};
    const fonte = String(reg.metrica_fonte||'').trim();
    if (!fonte) return {v:0, est:false};
    const chaves = fonte.split('|').map(s=>s.trim()).filter(Boolean);
    const n = Math.max(1, num(reg.acumula_meses)||1);
    const ref = String(item.competencia_ref||'');
    if (!/^\d{4}-\d{2}$/.test(ref)) return {v:0, est:true};
    let total = 0, estimado = false;
    const [a,m] = ref.split('-').map(Number);
    for (let i=0;i<n;i++){
      const d = new Date(a, m-1-i, 1);
      const c = compDe(d);
      if (!porComp[c]) estimado = true;
      total += somaMetricas(c, chaves);
    }
    return {v:total, est:estimado};
  }

  return {cfg:raw.config||{}, id:raw.id, empresa, rateio, regras, cal, regraDe,
          porComp, impostos, retido, valorDe, media};
}

/* ---------------- provisionamento ---------------- */
function provisao(M){
  const ult = M.empresa[M.empresa.length-1];
  if (!ult) return null;
  const [a,m] = ult.competencia.split('-').map(Number);
  const tri = Math.ceil(m/3);
  const inicio = (tri-1)*3 + 1;

  const meses = [];
  for (let i=0;i<3;i++){
    const c = a+'-'+String(inicio+i).padStart(2,'0');
    const r = M.porComp[c];
    meses.push({comp:c, apurado:!!r, v: r ? num(r['IR a pagar (R$)'])+num(r['CSLL a pagar (R$)']) : 0});
  }
  const apurados = meses.filter(x=>x.apurado);
  const medio = apurados.length ? apurados.reduce((s,x)=>s+x.v,0)/apurados.length : 0;
  meses.forEach(x=>{ if(!x.apurado) x.v = medio; });

  const acumulado = apurados.reduce((s,x)=>s+x.v,0);
  const total = meses.reduce((s,x)=>s+x.v,0);
  const fimTri = a+'-'+String(inicio+2).padStart(2,'0');
  const guia = M.cal.find(c => c.id_regra==='R07' && c.competencia_ref===fimTri);

  return {tri, ano:a, meses, apurados:apurados.length, acumulado, total, medio,
          venc: guia ? guia.vencimento : null, ajuste: guia ? guia.ajuste_aplicado : null};
}

/* ---------------- render ---------------- */
function render(M){
  const comps = M.empresa.map(r=>r.competencia);
  let sel = comps[comps.length-1];

  const app = document.getElementById('app');
  app.innerHTML = '';

  const head = el(`
    <header><div class="bar">
      <div class="brand">
        <b>${M.cfg.razao_social || 'Painel fiscal'}</b>
        <span>${M.cfg.municipio||''} · ${M.cfg.regime||''} · cliente ${M.id}</span>
      </div>
      <div class="spacer"></div>
      <div class="picker">
        <label class="lbl" for="comp">Competência</label>
        <select id="comp">${comps.slice().reverse().map(c=>`<option value="${c}">${mesLongo(c)}</option>`).join('')}</select>
      </div>
    </div></header>`);
  app.appendChild(head);

  const wrap = el('<div class="wrap"></div>');
  app.appendChild(wrap);

  const heroBox = el('<div id="hero"></div>'); wrap.appendChild(heroBox);
  const alertBox = el('<div id="alerta"></div>'); wrap.appendChild(alertBox);
  wrap.appendChild(el('<div id="prov"></div>'));
  wrap.appendChild(el(`
    <div class="sec-head">
      <div><h2>Próximos 6 meses</h2>
      <p>Datas já ajustadas por fim de semana e feriado. Valores variáveis são estimados pela média dos 3 últimos meses.</p></div>
    </div>
    <div class="months" id="venc"></div>`));
  wrap.appendChild(el(`
    <div class="sec-head">
      <div><h2>Obrigações anuais</h2>
      <p>Só o último vencimento cumprido e o próximo — nunca mais que isso por obrigação.</p></div>
    </div>
    <div class="months" id="anuais"></div>`));
  wrap.appendChild(el(`
    <div class="sec-head"><div><h2>Histórico</h2><p>Últimos 12 meses.</p></div></div>
    <div class="charts">
      <div class="card chart">
        <h3>Faturamento e imposto</h3>
        <div class="sub">Barras: faturamento. Linha: total de impostos a pagar.</div>
        <div class="cbox"><canvas id="c1" role="img" aria-label="Faturamento mensal e impostos dos últimos 12 meses"></canvas></div>
      </div>
      <div class="card chart">
        <h3>Composição dos impostos</h3>
        <div class="legend" id="lg2"></div>
        <div class="cbox"><canvas id="c2" role="img" aria-label="Impostos por tributo nos últimos 12 meses"></canvas></div>
      </div>
    </div>`));
  wrap.appendChild(el(`
    <div class="sec-head" id="rat-head"><div><h2>Rateio por centro de custo</h2><p id="rat-sub"></p></div></div>
    <div class="card" style="padding:18px 20px"><table id="rat">
      <thead><tr>
        <th>Centro</th><th class="r">NFs</th><th class="r">Faturamento</th>
        <th class="r">Impostos</th><th class="r">Retido</th><th class="r">Líquido</th>
      </tr></thead><tbody></tbody>
    </table></div>`));
  wrap.appendChild(el(`<footer>
      <span>Fonte: planilha fiscal do cliente ${M.id}. Números conferidos contra o consolidado da empresa.</span>
      <span>Atualizado em ${new Date(M.atualizado_em||Date.now()).toLocaleString('pt-BR',{dateStyle:'short',timeStyle:'short'})}</span>
    </footer>`));

  desenharProvisao(M);
  desenharVencimentos(M);
  desenharAnuais(M);
  desenharGraficos(M, () => sel);

  const pick = document.getElementById('comp');
  pick.value = sel;
  pick.addEventListener('change', e => { sel = e.target.value; pintarMes(M, sel); });
  pintarMes(M, sel);
}

function pintarMes(M, comp){
  const r = M.porComp[comp];
  const i = M.empresa.findIndex(x=>x.competencia===comp);
  const ant = i > 0 ? M.empresa[i-1] : null;

  const tot = num(r['Total (R$)']);
  const imp = M.impostos(r);
  const ret = M.retido(r);
  const liq = num(r['Resultado Líquido (R$)']);
  const carga = tot ? imp/tot : 0;
  const dif = ant && num(ant['Total (R$)']) ? (tot/num(ant['Total (R$)']) - 1) : null;

  document.getElementById('hero').innerHTML = `
    <div class="hero">
      <div class="card hero-main">
        <span class="lbl">Faturamento · ${mesLongo(comp)}</span>
        <div class="big">${brl2(tot)}</div>
        <div class="delta">
          ${dif===null ? '' : `<span class="chip ${dif>=0?'up':'down'}">${dif>=0?'+':''}${(dif*100).toFixed(1).replace('.',',')}%</span>`}
          <span>${num(r['Nº NFs'])} notas emitidas${ant?` · contra ${brl(num(ant['Total (R$)']))} no mês anterior`:''}</span>
        </div>
      </div>
      <div class="grid4">
        <div class="card stat imposto">
          <span class="lbl">Impostos a pagar</span>
          <div class="v">${brl(imp)}</div><div class="s">ISS, PIS, COFINS, CSLL e IRPJ</div>
        </div>
        <div class="card stat">
          <span class="lbl">Retido na fonte</span>
          <div class="v">${brl(ret)}</div><div class="s">${ret ? 'já pago pelos tomadores' : 'nenhuma retenção no mês'}</div>
        </div>
        <div class="card stat">
          <span class="lbl">Carga efetiva</span>
          <div class="v">${pct(carga)}</div><div class="s">sobre o faturamento bruto</div>
        </div>
        <div class="card stat receita">
          <span class="lbl">Resultado líquido</span>
          <div class="v">${brl(liq)}</div><div class="s">depois dos impostos</div>
        </div>
      </div>
    </div>`;

  // rateio
  const linhas = M.rateio.filter(x=>x.competencia===comp)
                   .filter(x=>num(x['Total (R$)'])>0 || num(x['Nº NFs'])>0)
                   .sort((a,b)=>num(b['Total (R$)'])-num(a['Total (R$)']));
  const tb = document.querySelector('#rat tbody');
  tb.innerHTML = linhas.map(x=>{
    const nid = x.centro === 'Não identificado';
    const t = num(x['Total (R$)']), sh = tot ? t/tot : 0;
    return `<tr class="${nid?'nid':''}">
      <td><b style="font-weight:${nid?600:500}">${x.centro}</b>
        <div class="share"><i style="width:${(sh*100).toFixed(1)}%"></i></div></td>
      <td class="r num">${num(x['Nº NFs'])}</td>
      <td class="r num">${brl(t)}<div class="s" style="font-size:11px;color:var(--muted)">${pct(sh)}</div></td>
      <td class="r num">${brl(M.impostos(x))}</td>
      <td class="r num">${brl(M.retido(x))}</td>
      <td class="r num">${brl(num(x['Resultado Líquido (R$)']))}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="6" style="color:var(--muted)">Sem rateio informado neste mês.</td></tr>';

  const nid = linhas.find(x=>x.centro==='Não identificado');
  const shareNid = nid && tot ? num(nid['Total (R$)'])/tot : 0;
  document.getElementById('rat-sub').textContent =
    `${linhas.length} centros com movimento em ${mesLongo(comp)}.`;

  document.getElementById('alerta').innerHTML = shareNid > 0.001 ? `
    <div class="alert" role="status">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M8 1.5 15 14H1L8 1.5Z" stroke="#9A6B08" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M8 6v3.5M8 11.5v.5" stroke="#9A6B08" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <div><b>${pct(shareNid)} do faturamento de ${mesLongo(comp)} está sem centro de custo.</b>
      São ${brl(num(nid['Total (R$)']))} que ninguém reconhece como seus — e os impostos correspondentes vão junto.</div>
    </div>` : '';

  if (window._c1) { window._c1.data.datasets[0].backgroundColor =
      M.empresa.map(r=>r.competencia===comp ? C.receita : '#B9CFC8');
    window._c1.update('none'); }
}

function desenharProvisao(M){
  const p = provisao(M);
  if (!p) return;
  const max = Math.max(...p.meses.map(x=>x.v), 1);
  const dias = p.venc ? Math.round((dParse(p.venc)-hoje)/864e5) : null;

  document.getElementById('prov').innerHTML = `
    <div class="card prov">
      <div class="prov-head">
        <div>
          <h2>Provisão do ${p.tri}º trimestre de ${p.ano}</h2>
          <p>IRPJ e CSLL nascem todo mês, mas só saem do caixa uma vez por trimestre. Isto é o que precisa estar guardado.</p>
        </div>
        <div class="prov-due">
          <span class="lbl">Vencimento</span>
          <div class="d">${p.venc ? dParse(p.venc).toLocaleDateString('pt-BR') : '—'}</div>
          <div class="n">${dias===null ? '' : dias>=0 ? `em ${dias} dias` : `há ${-dias} dias`}${
            p.ajuste && p.ajuste!=='—' ? ' · '+p.ajuste : ''}</div>
        </div>
      </div>

      <div class="ladder">
        ${p.meses.map(x=>{
          const h = Math.max(4, (x.v/max)*100);
          return `<div class="rung ${x.apurado?'':'futuro'}">
            <div class="amt">${brl(x.v)}</div>
            <div class="fill" style="height:${h}%"></div>
          </div>`;
        }).join('')}
      </div>
      <div class="rung-axis">
        ${p.meses.map(x=>`<div><div class="m">${mesLabel(x.comp)}</div>
          <div class="st">${x.apurado?'apurado':'projetado'}</div></div>`).join('')}
      </div>

      <div class="prov-foot">
        <div><span class="lbl">Já apurado (${p.apurados} de 3 meses)</span><div class="v">${brl2(p.acumulado)}</div></div>
        <div><span class="lbl">Total previsto no trimestre</span><div class="v" style="color:var(--provisao)">${brl2(p.total)}</div></div>
        <div><span class="lbl">Reserve por mês</span><div class="v">${brl2(p.medio)}</div></div>
      </div>
    </div>`;
}

function desenharVencimentos(M){
  const fim = addM(hoje, 6);
  const itens = M.cal
    .filter(c => { const d = dParse(c.vencimento); return d >= hoje && d < fim; })
    .map(c => {
      const {v, est} = M.valorDe(c);
      const reg = M.regraDe[c.id_regra] || {};
      return {...c, valor:v, est, obs:reg.observacao||''};
    });

  const grupos = {};
  itens.forEach(i => {
    const k = String(i.vencimento).slice(0,7);
    (grupos[k] = grupos[k] || []).push(i);
  });

  const classe = cat => /Tributo/.test(cat) ? 'trib' : /acessória/i.test(cat) ? 'acess' : 'outro';

  document.getElementById('venc').innerHTML = Object.keys(grupos).sort().map(k=>{
    const g = grupos[k];
    const tot = g.reduce((s,i)=>s+i.valor,0);
    return `<div class="card month">
      <h3>${mesLongo(k)}</h3>
      <div class="tot" ${tot?'':'style="color:var(--muted)"'}>${tot ? brl(tot) : 'sem desembolso'}</div>
      ${g.map(i=>`
        <div class="due">
          <span class="dot ${classe(i.categoria)}" aria-hidden="true"></span>
          <span class="day">${String(i.vencimento).slice(8)}/${String(i.vencimento).slice(5,7)}</span>
          <span class="body">
            <span class="nm" title="${i.descricao}${i.obs?' — '+i.obs:''}">${i.descricao}</span>
            <span class="vl ${i.valor?(i.est?'est':''):'zero'}">${i.valor ? brl(i.valor) : 'entrega, sem guia'}</span>
            ${i.ajuste_aplicado && i.ajuste_aplicado!=='—' ? `<span class="adj"> · ${i.ajuste_aplicado}</span>` : ''}
          </span>
        </div>`).join('')}
    </div>`;
  }).join('') || '<p style="color:var(--muted)">Nenhum vencimento nos próximos 6 meses.</p>';
}

/** Para cada obrigação anual: só o último vencimento (<= hoje) e o próximo (> hoje). Nunca mais que 2. */
function desenharAnuais(M){
  const anuais = M.regras.filter(r => r.periodicidade === 'Anual' && String(r.ativo) !== 'FALSE');

  const cartoes = anuais.map(reg => {
    const ocorrencias = M.cal
      .filter(c => c.id_regra === reg.id)
      .map(c => ({...c, data: dParse(c.vencimento)}))
      .sort((a,b) => a.data - b.data);

    const passadas = ocorrencias.filter(o => o.data <= hoje);
    const futuras  = ocorrencias.filter(o => o.data >  hoje);
    const ultimo = passadas.length ? passadas[passadas.length-1] : null;
    const proximo = futuras.length ? futuras[0] : null;
    const linhas = [ultimo, proximo].filter(Boolean); // no máximo 2

    if (!linhas.length) return '';

    return `<div class="card month">
      <h3>${reg.descricao}</h3>
      <div class="tot" style="font-size:12px;font-weight:500;color:var(--muted)">${reg.categoria||''}</div>
      ${linhas.map(o => {
        const {v, est} = M.valorDe(o);
        const passado = o.data <= hoje;
        return `<div class="due">
          <span class="dot ${passado?'acess':'outro'}" aria-hidden="true"></span>
          <span class="day">${String(o.vencimento).slice(8)}/${String(o.vencimento).slice(5,7)}</span>
          <span class="body">
            <span class="nm">${passado ? 'Último' : 'Próximo'} · ${o.vencimento.slice(0,4)}</span>
            <span class="vl ${v?(est?'est':''):'zero'}">${v ? brl(v) : (passado?'cumprida':'sem valor fixo')}</span>
            ${o.ajuste_aplicado && o.ajuste_aplicado!=='—' ? `<span class="adj"> · ${o.ajuste_aplicado}</span>` : ''}
          </span>
        </div>`;
      }).join('')}
    </div>`;
  }).filter(Boolean);

  document.getElementById('anuais').innerHTML = cartoes.join('') ||
    '<p style="color:var(--muted)">Nenhuma obrigação anual cadastrada.</p>';
}

function desenharGraficos(M, getSel){
  const labels = M.empresa.map(r=>mesLabel(r.competencia));
  const base = {responsive:true, maintainAspectRatio:false, animation:{duration:600},
    plugins:{legend:{display:false}, tooltip:{
      backgroundColor:'#0F1C1A', padding:10, cornerRadius:6, titleFont:{family:'Inter',size:12},
      bodyFont:{family:'IBM Plex Mono',size:12}, displayColors:true, boxWidth:8, boxHeight:8,
      callbacks:{label:c=>` ${c.dataset.label}: ${brl(c.parsed.y)}`}}},
    scales:{
      x:{grid:{display:false}, border:{color:C.line},
         ticks:{color:C.muted, font:{family:'IBM Plex Mono',size:11}}},
      y:{grid:{color:'#EBF0EE'}, border:{display:false},
         ticks:{color:C.muted, font:{family:'IBM Plex Mono',size:11},
                callback:v=>'R$ '+(v/1000).toLocaleString('pt-BR')+'k'}}}};

  window._c1 = new Chart(document.getElementById('c1'), {
    data:{labels, datasets:[
      {type:'bar', label:'Faturamento', data:M.empresa.map(r=>num(r['Total (R$)'])),
       backgroundColor:'#B9CFC8', borderRadius:{topLeft:4,topRight:4}, maxBarThickness:26, order:2},
      {type:'line', label:'Impostos', data:M.empresa.map(r=>M.impostos(r)),
       borderColor:C.imposto, backgroundColor:C.imposto, borderWidth:2, tension:.3,
       pointRadius:2.5, pointHoverRadius:5, order:1},
    ]},
    options:base
  });

  document.getElementById('lg2').innerHTML = TRIB.map(t=>
    `<span><i style="background:${t.c}"></i>${t.n}</span>`).join('');

  new Chart(document.getElementById('c2'), {
    type:'bar',
    data:{labels, datasets:TRIB.map(t=>({
      label:t.n, data:M.empresa.map(r=>num(r[t.k])), backgroundColor:t.c,
      borderRadius:2, maxBarThickness:26, borderWidth:0}))},
    options:{...base, scales:{
      x:{...base.scales.x, stacked:true},
      y:{...base.scales.y, stacked:true}}}
  });
}

function erro(msg){
  document.getElementById('app').innerHTML = `
    <div class="state">
      <h1>Não deu para abrir o painel</h1>
      <p>${msg}</p>
      <p>Confira se o endereço termina com o código do cliente, assim: <code>#482913</code></p>
    </div>`;
}

(async function(){
  try {
    const raw = await carregar();
    const M = preparar(raw);
    M.atualizado_em = raw.atualizado_em;
    if (!M.empresa.length) return erro('A planilha deste cliente não tem nenhum mês na aba Empresa.');
    render(M);
  } catch (e) {
    erro(e.message || String(e));
  }
})();
</script>
