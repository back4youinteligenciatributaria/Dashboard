<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel do cliente — back4you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#F3EFE8; --surface:#FFFFFF; --surface-warm:#FAF6EF;
  --ink:#063033; --ink-2:#3B5551; --muted:#8A7D70; --line:#E7DFD2; --line-2:#D8CDBB;
  --brand-dark:#063033; --brand-teal:#128D84; --brand-eucalipto2:#19AFA4; --accent:#FF8100;
  --receita-soft:#DBEFEC;
  --radius:18px; --sans:'Manrope',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--canvas);color:var(--ink);font-family:var(--sans);
  min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;
}
:focus-visible{outline:2px solid var(--brand-teal);outline-offset:2px;border-radius:4px}

.topo{padding:28px 24px 0;text-align:center}
.logo{font-weight:900;font-size:24px;letter-spacing:-.02em}
.logo .b{color:var(--brand-dark)} .logo .y{color:var(--brand-teal)}

.miolo{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px 56px}
.saudacao{text-align:center;margin-bottom:36px;max-width:520px}
.saudacao h1{font-size:23px;font-weight:800;letter-spacing:-.01em}
.saudacao p{font-size:13.5px;color:var(--muted);margin-top:8px;line-height:1.6}
.saudacao .cliente{font-size:12.5px;color:var(--ink-2);font-weight:600;margin-top:10px}
.saudacao .cta{font-size:13px;color:var(--brand-teal);font-weight:700;margin-top:18px}
.acoes-chamado{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:26px}
.ac-btn{font-family:var(--sans);font-size:13px;font-weight:700;text-decoration:none;cursor:pointer;
  padding:11px 20px;border-radius:999px;border:1px solid var(--line-2);background:var(--surface);color:var(--ink);transition:border-color .12s,transform .12s,box-shadow .12s}
.ac-btn:hover{border-color:var(--brand-teal);transform:translateY(-1px)}
.ac-btn.ac-primary{background:var(--brand-teal);color:#fff;border-color:var(--brand-teal);box-shadow:0 8px 18px -8px rgba(18,141,132,.6)}
.ac-btn.ac-primary:hover{background:var(--brand-dark);border-color:var(--brand-dark)}
.quem{margin-top:14px;font-size:12.5px;color:var(--ink-2)}
.quem-trocar{background:none;border:0;color:var(--brand-teal);font-weight:700;cursor:pointer;font-size:12.5px;text-decoration:underline;padding:0 2px}
.confiar-row{margin-top:18px;font-size:12px;color:var(--muted);text-align:center;line-height:1.6}
.conf-ok{color:var(--brand-eucalipto2);font-weight:600}
.alertas-home{width:100%;max-width:680px;display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.alerta-card{display:flex;align-items:center;gap:12px;background:#FCEFE0;border:1px solid #F0D6B4;border-radius:12px;
  padding:12px 15px;text-decoration:none;color:var(--ink);transition:border-color .12s,transform .12s}
.alerta-card:hover{border-color:#E0A96A;transform:translateY(-1px)}
.alerta-ico{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:#E8892E;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px}
.alerta-txt{flex:1;font-size:13px;display:flex;flex-direction:column;gap:2px}
.alerta-txt span{font-size:11.5px;color:var(--muted)}
.alerta-seta{color:#B4772A;font-weight:700}
.id-form{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px;width:100%;max-width:380px}
.id-form input{flex:1;min-width:190px;font-family:var(--sans);font-size:14px;padding:11px 13px;border:1px solid var(--line-2);border-radius:10px;background:var(--surface);color:var(--ink)}
.id-form input:focus{outline:2px solid var(--brand-teal);outline-offset:1px}
.reenvio{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px;margin:6px auto 0}
.reenvio-op{width:100%}
/* código de verificação — 6 caixinhas numéricas */
.otp{display:flex;gap:9px;justify-content:center;margin:14px 0 6px}
.otp-box{width:46px;height:56px;text-align:center;font-size:24px;font-weight:700;font-family:var(--sans);
  color:var(--ink);border:1.5px solid var(--line-2);border-radius:13px;background:var(--surface);caret-color:var(--brand-teal)}
.otp-box:focus{outline:none;border-color:var(--brand-teal);box-shadow:0 0 0 3px rgba(15,140,133,.16)}
.otp-box.ok{border-color:var(--brand-teal)}
@media(max-width:400px){.otp{gap:6px}.otp-box{width:42px;height:52px;font-size:21px;border-radius:11px}}
@media(max-width:340px){.otp-box{width:38px;height:48px;font-size:19px}}
.linklike{background:none;border:0;color:var(--brand-teal);font-weight:700;cursor:pointer;font:inherit;padding:0}
.linklike:hover{text-decoration:underline}
/* overlay de contatos (bottom sheet no mobile, modal no desktop) */
.ov{position:fixed;inset:0;z-index:1200;background:rgba(7,48,52,.45);display:flex;align-items:flex-end;justify-content:center}
@media(min-width:640px){.ov{align-items:center;padding:24px}}
.sheet{background:var(--surface);width:100%;max-width:560px;max-height:92vh;overflow:auto;border-radius:18px 18px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,.25)}
@media(min-width:640px){.sheet{border-radius:16px}}
.sheet-head{position:sticky;top:0;background:var(--surface);display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
.sheet-head b{font-size:16px;font-weight:800}
.sheet-x{background:none;border:0;font-size:16px;cursor:pointer;color:var(--muted)}
.sheet-body{padding:16px 20px 20px}
.sheet-note{font-size:12.5px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.ct-fld{margin-bottom:12px}
.ct-fld label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-2);margin-bottom:5px}
.ct-fld .ct-sub{font-weight:500;color:var(--muted)}
.ct-fld textarea{width:100%;font-family:var(--sans);font-size:13.5px;padding:10px 12px;border:1px solid var(--line-2);border-radius:10px;background:var(--surface-warm);color:var(--ink);resize:vertical;min-height:44px}
.ct-fld textarea:focus{outline:2px solid var(--brand-teal);outline-offset:1px}
.ct-err{color:#8B2E22;font-size:12.5px;min-height:16px}
.sheet-foot{display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surface);padding-top:12px}
.sheet-foot .ac-btn{flex:1}
@media(min-width:640px){.sheet-foot .ac-btn{flex:0 0 auto}}
.ct-card{border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:10px;background:var(--surface)}
.ct-card-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ct-card-top b{font-size:13.5px;flex:1}
.ct-papel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;border-radius:999px}
.ct-papel.p{background:var(--brand-teal);color:#fff}
.ct-papel.s{background:var(--surface-warm);color:var(--ink-2);border:1px solid var(--line)}
.ct-mail{font-size:12.5px;color:var(--ink-2);margin-bottom:8px;word-break:break-all}
.ct-areas{display:flex;flex-wrap:wrap;gap:6px}
.ct-area-chip{font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;background:var(--surface-warm);color:var(--muted);border:1px solid var(--line)}
.ct-area-chip.on{background:var(--receita-soft,#DCEFEC);color:var(--brand-dark);border-color:transparent}
.ct-in{width:100%;font-family:var(--sans);font-size:13.5px;padding:8px 10px;border:1px solid var(--line-2);border-radius:9px;background:var(--surface-warm);color:var(--ink);margin-bottom:7px}
.ct-in:focus{outline:2px solid var(--brand-teal);outline-offset:1px}
.ct-card-top .ct-nome{margin-bottom:0}
.ct-rm{background:none;border:0;cursor:pointer;color:var(--muted);font-size:14px;padding:4px 6px}
.ct-rm:hover{color:#8B2E22}
.ct-voce{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--brand-teal);background:var(--surface-warm);border:1px solid var(--line);padding:3px 9px;border-radius:999px;white-space:nowrap}
.ct-in[disabled],.ct-in[readonly]{opacity:.7}
.ct-area-chk{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--ink-2);background:var(--surface-warm);border:1px solid var(--line);border-radius:999px;padding:5px 10px;cursor:pointer}
.ct-area-chk input{accent-color:var(--brand-teal)}
.ct-areas.oculto{display:none}

.grade{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:18px;max-width:680px;width:100%}
@media(max-width:560px){.grade{grid-template-columns:1fr}}
.opcao.opcao-destaque{grid-column:1/-1;border-color:var(--brand-teal);background:linear-gradient(135deg,rgba(18,141,132,.08),rgba(25,175,164,.05))}
.opcao.opcao-destaque .icone{background:var(--brand-teal);color:#fff}

.opcao{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:26px 24px;text-decoration:none;color:var(--ink);display:flex;flex-direction:column;gap:10px;
  transition:transform .15s, box-shadow .15s; position:relative; overflow:hidden;
}
.opcao:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(17,61,57,.10)}
.opcao .icone{
  width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:var(--surface-warm);color:var(--brand-teal);flex-shrink:0;
}
.opcao .icone svg{width:22px;height:22px}
.opcao h2{font-size:15.5px;font-weight:700;letter-spacing:-.01em}
.opcao p{font-size:12.5px;color:var(--muted);line-height:1.5}
.opcao .seta{position:absolute;top:24px;right:22px;color:var(--line-2);font-size:16px;transition:transform .15s, color .15s}
.opcao:hover .seta{transform:translateX(3px);color:var(--brand-teal)}

footer{padding:18px 24px;text-align:center;font-size:11.5px;color:var(--muted)}

.state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:70vh;text-align:center;padding:0 24px;margin:0 auto}
.state h1{font-size:19px;font-weight:700}
.state p{color:var(--muted);font-size:14px;max-width:44ch}
.state code{background:var(--surface-warm);padding:2px 6px;border-radius:4px;border:1px solid var(--line);font-size:13px}
.spin{width:26px;height:26px;border:2.5px solid var(--line-2);border-top-color:var(--brand-teal);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

<!-- ═══════════ back4you · cabeçalho + chamados (compartilhado) ═══════════
     Bloco único, autocontido e com prefixo .b4u- (não conflita com o CSS da
     página). Cole logo depois de <body>, e ANTES dele defina:
        <script>window.B4U = { area:'fiscal' };</script>
     area = área padrão do chamado desta página
        (fiscal | dpto_pessoal | contabil | societario | equiparacao | outros)

     Para reaproveitar em todas as páginas, mantenha este bloco IDÊNTICO. ─── -->
<style>
.b4u-bar{position:sticky;top:0;z-index:900;display:flex;align-items:center;gap:10px;
  padding:10px 18px;background:#073034;color:#fff;box-shadow:0 2px 12px rgba(7,48,52,.20);
  font-family:'Montserrat',system-ui,-apple-system,sans-serif}
.b4u-bar .b4u-logo{font-weight:900;font-size:17px;letter-spacing:-.02em;margin-right:auto;
  color:#fff;text-decoration:none;display:inline-flex;align-items:center;line-height:1}
.b4u-bar .b4u-logo .y{color:#3FA680}
.b4u-btn{display:inline-flex;align-items:center;gap:7px;border:0;cursor:pointer;
  font-family:inherit;font-weight:600;font-size:13px;padding:8px 13px;border-radius:10px;
  text-decoration:none;transition:background .15s,transform .08s;line-height:1;white-space:nowrap}
.b4u-btn svg{width:16px;height:16px;flex-shrink:0}
.b4u-btn .b4u-lbl{color:inherit;text-transform:none;letter-spacing:normal;font-size:13px}
.b4u-btn:active{transform:translateY(1px)}
.b4u-btn.ghost{background:rgba(255,255,255,.10);color:#fff}
.b4u-btn.ghost:hover{background:rgba(255,255,255,.18)}
.b4u-btn.wa{background:#25D366;color:#fff}
.b4u-btn.wa:hover{background:#20bd5a}
.b4u-btn.call{background:#0F8C85;color:#fff}
.b4u-btn.call:hover{background:#0c756f}
.b4u-icobtn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;
  padding:0;border:0;cursor:pointer;border-radius:9px;background:rgba(255,255,255,.10);color:#fff;
  transition:background .15s}
.b4u-icobtn:hover{background:rgba(255,255,255,.18)}
.b4u-icobtn svg{width:17px;height:17px}
@media(max-width:640px){
  .b4u-bar{gap:7px;padding:9px 12px}
  .b4u-btn .b4u-lbl{display:none}
  .b4u-btn{padding:9px 11px}
}
.b4u-ov{position:fixed;inset:0;z-index:1000;background:rgba(7,48,52,.45);
  display:none;align-items:flex-end;justify-content:center;
  font-family:'Montserrat',system-ui,-apple-system,sans-serif}
.b4u-ov.on{display:flex}
@media(min-width:640px){.b4u-ov{align-items:center;padding:24px}}
.b4u-modal{background:#fff;color:#113D39;width:100%;max-width:520px;border-radius:16px 16px 0 0;
  max-height:94vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
@media(min-width:640px){.b4u-modal{border-radius:16px}}
.b4u-modal h3{font-size:17px;font-weight:800;padding:18px 20px 3px;letter-spacing:-.01em}
.b4u-modal .b4u-sub{font-size:12.5px;color:#8A7D70;padding:0 20px 10px;line-height:1.5}
.b4u-fld{padding:7px 20px}
.b4u-fld label{display:block;font-size:12px;font-weight:700;color:#3F5854;margin-bottom:5px}
.b4u-fld select,.b4u-fld input,.b4u-fld textarea{width:100%;font-family:inherit;font-size:14px;
  padding:10px 12px;border:1px solid #E4D9C9;border-radius:10px;background:#FBF6EF;color:#113D39}
.b4u-fld textarea{min-height:120px;resize:vertical;line-height:1.5}
.b4u-fld select:focus,.b4u-fld input:focus,.b4u-fld textarea:focus{outline:2px solid #0F8C85;outline-offset:1px;border-color:transparent}
.b4u-err{color:#B4322A;font-size:12.5px;padding:2px 20px 0;min-height:16px}
.b4u-foot{display:flex;gap:10px;padding:14px 20px 20px;position:sticky;bottom:0;background:#fff}
.b4u-foot .b4u-btn{flex:1;justify-content:center;padding:12px}
.b4u-foot .primary{background:#0F8C85;color:#fff}
.b4u-foot .primary:hover{background:#0c756f}
.b4u-foot .primary[disabled]{opacity:.6;cursor:default}
.b4u-foot .cancel{background:#F1E7DC;color:#3F5854}
.b4u-foot .cancel:hover{background:#e8dccb}
.b4u-ok{padding:30px 22px;text-align:center}
.b4u-ok .chk{width:56px;height:56px;border-radius:50%;background:#E7F4EC;color:#2E9E63;
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.b4u-ok .chk svg{width:30px;height:30px}
.b4u-ok h3{font-size:18px;font-weight:800;margin-bottom:6px}
.b4u-ok p{font-size:13.5px;color:#3F5854;line-height:1.55;max-width:40ch;margin:0 auto 20px}
/* Skeleton (carregando) — barras cinza com brilho passando */
.b4u-skel{display:block;border-radius:8px;background:#Eadfce;
  background-image:linear-gradient(90deg,rgba(255,255,255,0) 0,rgba(255,255,255,.65) 50%,rgba(255,255,255,0) 100%);
  background-size:180px 100%;background-repeat:no-repeat;animation:b4ushine 1.15s ease-in-out infinite}
@keyframes b4ushine{0%{background-position:-120px 0}100%{background-position:calc(100% + 120px) 0}}
@media(prefers-reduced-motion:reduce){.b4u-skel{animation:none}}
/* Puxar para atualizar (mobile) */
.b4u-ptr{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:center;
  height:0;overflow:hidden;color:#0F8C85;z-index:1500;pointer-events:none;
  font-family:'Montserrat',system-ui,sans-serif;font-size:12px;font-weight:700;gap:8px}
.b4u-ptr .ring{width:18px;height:18px;border:2.5px solid #cfe6e2;border-top-color:#0F8C85;border-radius:50%}
.b4u-ptr.spin .ring{animation:b4uspin .7s linear infinite}
@keyframes b4uspin{to{transform:rotate(360deg)}}
</style>
<script>
(function(){
  var CFG = window.B4U || {};
  if (CFG.__ready) return;

  var WA = '5511937173906';                        // +55 11 93717-3906
  var API_FALLBACK = 'https://script.google.com/macros/s/AKfycbyGAro0qPWpZcVX665KwKd-BK3ouSvVkAj5Vxw_phgO82EDa3gJrURcHjWIPYNQXT5d/exec';
  function api(){ try{ if(typeof API_URL==='string' && API_URL) return API_URL; }catch(e){} return API_FALLBACK; }

  var AREAS = [
    ['fiscal','Fiscal'], ['dpto_pessoal','Departamento Pessoal'], ['contabil','Contábil'],
    ['societario','Societário'], ['equiparacao','Equiparação'], ['outros','Outros / reportar erro']
  ];
  // tipo -> [rótulo, esqueleto de mensagem]
  var TIPOS = {
    livre:            ['Chamado livre', ''],
    solicitar_nf:     ['Solicitar nota fiscal', 'Solicito a emissão de uma nota fiscal.\n\nTomador (cliente):\nValor:\nDescrição do serviço:\nData desejada:'],
    duvida:           ['Tirar uma dúvida', 'Minha dúvida é:\n\n'],
    ferias:           ['Solicitar férias', 'Solicito a programação de férias.\n\nColaborador:\nInício desejado:\nDias:\nObservações:'],
    previa_admissao:  ['Prévia de admissão', 'Estou avaliando uma contratação (prévia, ainda sem formalizar).\n\nCargo cogitado:\nFaixa salarial:\nObservações:'],
    contratacao:      ['Formalizar admissão', 'Quero formalizar uma contratação.\n\nNome do colaborador:\nCargo:\nSalário:\nData de início:\nObservações:'],
    previa_rescisao:  ['Prévia de rescisão', 'Estou avaliando desligar um colaborador (prévia).\n\nColaborador:\nMotivo:\nObservações:'],
    rescisao:         ['Formalizar desligamento', 'Quero formalizar um desligamento.\n\nColaborador:\nMotivo:\nData prevista:\nAviso (trabalhado/indenizado):\nObservações:']
  };
  var ORDEM_TIPOS = ['livre','solicitar_nf','duvida','ferias','previa_admissao','contratacao','previa_rescisao','rescisao'];
  // Tipo do DOCUMENTO anexado -> define para qual PASTA (programa) o arquivo vai.
  // As chaves batem com o backend (COLUNA_POR_TIPO_DOC); a pasta vem do Site Links.
  var DOCTIPOS = [
    ['principal','Documentos recebidos (geral)'],
    ['extratos','Extratos bancários'],
    ['notas','Notas fiscais e comprovantes'],
    ['outros','Outros']
  ];
  // O tipo de solicitação DEPENDE da área (não faz sentido pedir férias em Equiparação).
  var TIPOS_POR_AREA = {
    fiscal:       ['livre','solicitar_nf','duvida'],
    dpto_pessoal: ['livre','ferias','previa_admissao','contratacao','previa_rescisao','rescisao','duvida'],
    contabil:     ['livre','duvida'],
    societario:   ['livre','duvida'],
    equiparacao:  ['livre','duvida'],
    outros:       ['livre','duvida']
  };
  function tiposDaArea(area){ return TIPOS_POR_AREA[area] || TIPOS_POR_AREA.outros; }
  function opcoesTipo(area, sel){
    return tiposDaArea(area).map(function(t){
      return '<option value="'+t+'"'+(t===sel?' selected':'')+'>'+esc(TIPOS[t][0])+'</option>';
    }).join('');
  }

  // ---- id/código a partir da URL (?id=&codigo= ou #id-codigo) -------------
  function idc(){
    var qs = new URLSearchParams(location.search);
    var id = qs.get('id')||'', cod = qs.get('codigo')||'';
    if(!id){
      var h = (location.hash||'').replace('#','').trim();
      var m = h.match(/^(\d+)-(.+)$/); var s = h.match(/^(\d+)$/);

  // alertas de pendência na home (resumo que o painel fiscal grava no aparelho)
  carregarAlertasHome(id, codigo);
}

/* ---------- Alertas de pendência na home ----------
 * O painel fiscal grava um resumo em localStorage (b4u_pend_<id>) sempre que
 * abre; a home lê e mostra os cartões (cada um leva ao ponto de ajuste). */
function carregarAlertasHome(id, codigo){
  const box = document.getElementById('alertas-home'); if(!box) return;
  let dados=null;
  try{ dados = JSON.parse(localStorage.getItem('b4u_pend_'+id)||'null'); }catch(e){}
  if(!dados || !Array.isArray(dados.itens) || !dados.itens.length){ box.innerHTML=''; return; }
  box.innerHTML = dados.itens.map(p=>{
    const alvo = (p.area||'fiscal')+'.html#'+id+'-'+codigo+(p.pend?'?pend=1':'');
    return `<a class="alerta-card" href="${esc(alvo)}">
      <span class="alerta-ico">!</span>
      <span class="alerta-txt"><b>${esc(p.titulo)}</b>${p.detalhe?`<span>${esc(p.detalhe)}</span>`:''}</span>
      <span class="alerta-seta">→</span></a>`; }).join('');
}

const AREAS_LABEL = { fiscal:'Fiscal', contabil:'Contábil', pessoal:'Pessoal', societario:'Societário', equiparacao:'Equiparação', financeiro:'Financeiro' };
let CT = null;

function fecharOverlay(){ const o=document.getElementById('ov-contatos'); if(o) o.remove(); CT=null; }

async function abrirContatos(id, codigo){
  fecharOverlay();
  const ov = document.createElement('div');
  ov.id = 'ov-contatos'; ov.className = 'ov';
  ov.innerHTML = `<div class="sheet"><div class="sheet-head"><b>Contatos e acessos</b><button class="sheet-x" aria-label="Fechar">✕</button></div>
    <div class="sheet-body" id="ct-body"><div class="state" style="min-height:120px"><div class="spin"></div><p>Carregando…</p></div></div></div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e=>{ if(e.target===ov) fecharOverlay(); });
  ov.querySelector('.sheet-x').addEventListener('click', fecharOverlay);
  try{
    const d = await jsonp(API_URL+'?id='+encodeURIComponent(id)+'&codigo='+encodeURIComponent(codigo)+'&tipo=contatos');
    if(d.erro) throw new Error(d.erro);
    CT = { id, codigo,
      contatos:(d.contatos||[]).map(c=>({nome:c.nome,email:c.email,papel:c.papel,areas:Object.keys(c.areas||{}).filter(a=>c.areas[a])})),
      areas:(d.areas&&d.areas.length)?d.areas:Object.keys(AREAS_LABEL), editando:!!d.podeEditar, euEmail:(d.euEmail||'').toLowerCase() };
    renderContatos();
  }catch(e){ document.getElementById('ct-body').innerHTML = `<p class="sheet-note" style="color:#8B2E22">${esc(e.message||e)}</p>`; }
}

function renderContatos(){
  const body=document.getElementById('ct-body'); if(!body||!CT) return;
  const podeEditar = CT.editando;
  const aviso = podeEditar ? '' : `<p class="sheet-note" style="color:#9A6B10">Você está vendo em modo leitura. Só um <b>responsável principal</b> (entrando com o próprio código) pode editar.</p>`;
  body.innerHTML = `
    <p class="sheet-note"><b>Principal</b> acessa tudo e edita os contatos. <b>Secundário</b> acessa e recebe só as áreas marcadas.</p>
    ${aviso}
    <div id="ct-lista">${CT.contatos.map((c,i)=>cardContato(c,i,podeEditar)).join('') || '<p class="sheet-note">Nenhum contato cadastrado ainda.</p>'}</div>
    ${podeEditar?`<button class="ac-btn" id="ct-add" style="margin-top:8px;width:100%">+ Adicionar contato</button>`:''}
    <div class="ct-err" id="ct-err"></div>
    <div class="sheet-foot"><button class="ac-btn" id="ct-cancel">Fechar</button>${podeEditar?`<button class="ac-btn ac-primary" id="ct-save">Salvar</button>`:''}</div>`;
  document.getElementById('ct-cancel').addEventListener('click', fecharOverlay);
  const add=document.getElementById('ct-add'); if(add) add.addEventListener('click',()=>{ CT.contatos.push({nome:'',email:'',papel:'Secundário',areas:[]}); renderContatos(); });
  const save=document.getElementById('ct-save'); if(save) save.addEventListener('click', salvarContatos);
  if(podeEditar) wireCards();
}

function cardContato(c,i,editar){
  const principal=/principal/i.test(c.papel);
  if(!editar){
    return `<div class="ct-card"><div class="ct-card-top"><b>${esc(c.nome||'—')}</b><span class="ct-papel ${principal?'p':'s'}">${principal?'Principal':'Secundário'}</span></div>
      <div class="ct-mail">${esc(c.email)}</div>
      <div class="ct-areas">${principal?'<span class="ct-area-chip on">Acesso total</span>':CT.areas.map(a=>`<span class="ct-area-chip${c.areas.indexOf(a)>=0?' on':''}">${AREAS_LABEL[a]||a}</span>`).join('')}</div></div>`;
  }
  const euMesmo = !!CT.euEmail && (c.email||'').toLowerCase()===CT.euEmail;
  return `<div class="ct-card" data-i="${i}">
    <div class="ct-card-top"><input class="ct-in ct-nome" data-i="${i}" placeholder="Nome" value="${esc(c.nome)}">
      ${euMesmo?`<span class="ct-voce">você</span>`:`<button class="ct-rm" data-i="${i}" aria-label="Remover">✕</button>`}</div>
    <input class="ct-in ct-email" data-i="${i}" placeholder="e-mail@empresa.com" value="${esc(c.email)}"${euMesmo?' readonly':''}>
    <select class="ct-in ct-papel" data-i="${i}"${euMesmo?' disabled title="Você não pode remover o seu próprio acesso principal"':''}>
      <option value="Principal"${principal?' selected':''}>Principal · acesso total</option>
      ${euMesmo?'':`<option value="Secundário"${!principal?' selected':''}>Secundário · áreas escolhidas</option>`}</select>
    <div class="ct-areas ${principal?'oculto':''}">${CT.areas.map(a=>`<label class="ct-area-chk"><input type="checkbox" data-i="${i}" data-area="${a}"${c.areas.indexOf(a)>=0?' checked':''}> ${AREAS_LABEL[a]||a}</label>`).join('')}</div>
  </div>`;
}

function wireCards(){
  document.querySelectorAll('.ct-nome').forEach(el=>el.addEventListener('input',e=>{ CT.contatos[+e.target.dataset.i].nome=e.target.value; }));
  document.querySelectorAll('.ct-email').forEach(el=>el.addEventListener('input',e=>{ CT.contatos[+e.target.dataset.i].email=e.target.value; }));
  document.querySelectorAll('.ct-papel').forEach(el=>el.addEventListener('change',e=>{ CT.contatos[+e.target.dataset.i].papel=e.target.value; renderContatos(); }));
  document.querySelectorAll('.ct-rm').forEach(el=>el.addEventListener('click',e=>{ CT.contatos.splice(+e.target.dataset.i,1); renderContatos(); }));
  document.querySelectorAll('.ct-area-chk input').forEach(el=>el.addEventListener('change',e=>{
    const i=+e.target.dataset.i, a=e.target.dataset.area, arr=CT.contatos[i].areas;
    if(e.target.checked){ if(arr.indexOf(a)<0) arr.push(a); } else { const k=arr.indexOf(a); if(k>=0) arr.splice(k,1); }
  }));
}

async function salvarContatos(){
  const err=document.getElementById('ct-err'), btn=document.getElementById('ct-save'); err.textContent='';
  const payload=CT.contatos.map(c=>({nome:c.nome,email:c.email,papel:c.papel,areas:/principal/i.test(c.papel)?[]:c.areas}));
  const params=new URLSearchParams({ id:CT.id, codigo:CT.codigo, acao:'salvar_contatos', contatos:JSON.stringify(payload) });
  btn.disabled=true; btn.textContent='Salvando…';
  try{
    const d=await jsonp(API_URL+'?'+params.toString());
    if(d.erro) throw new Error(d.erro);
    document.getElementById('ct-body').innerHTML=`<div class="state" style="min-height:160px"><h1 style="font-size:17px">Contatos salvos ✓</h1><p>${esc(d.mensagem||'Tudo certo.')}</p><button class="ac-btn ac-primary" id="ct-ok">Fechar</button></div>`;
    document.getElementById('ct-ok').addEventListener('click', fecharOverlay);
  }catch(e){ btn.disabled=false; btn.textContent='Salvar'; err.textContent=e.message||String(e); }
}

/* ---------- código de verificação: 6 caixinhas, só números ---------- */
function boxesOTP(){
  return `<div class="otp" id="otp">${Array.from({length:6}).map(()=>
    `<input class="otp-box" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code" aria-label="dígito do código">`).join('')}</div>`;
}
function wireOTP(onComplete){
  const inputs = Array.from(document.querySelectorAll('#otp .otp-box'));
  const val = () => inputs.map(i=>i.value).join('');
  const marcar = ()=> inputs.forEach(i=> i.classList.toggle('ok', !!i.value));
  inputs.forEach((inp,i)=>{
    inp.addEventListener('input', ()=>{
      inp.value = inp.value.replace(/\D/g,'').slice(0,1);
      if(inp.value && i<inputs.length-1) inputs[i+1].focus();
      marcar();
      if(val().length===inputs.length && onComplete) onComplete(val());
    });
    inp.addEventListener('keydown', e=>{
      if(e.key==='Backspace' && !inp.value && i>0){ inputs[i-1].focus(); e.preventDefault(); }
    });
    inp.addEventListener('paste', e=>{
      e.preventDefault();
      const d=(e.clipboardData.getData('text')||'').replace(/\D/g,'').slice(0,inputs.length);
      if(!d) return; inputs.forEach((x,k)=> x.value=d[k]||''); marcar();
      (inputs[Math.min(d.length,inputs.length-1)]||inp).focus();
      if(d.length>=inputs.length && onComplete) onComplete(val());
    });
  });
  if(inputs[0]) inputs[0].focus();
  return { val, clear:()=>{inputs.forEach(i=>{i.value='';i.classList.remove('ok');}); inputs[0]&&inputs[0].focus();} };
}

/* ---------- entrar com o código pessoal (já tem ID+empresa no link) ---------- */
function entrarComCodigo(entrada){
  const { id, codigo } = getIdCodigo();
  const empresa = (codigo||'').split('-')[0].trim();
  const contato = String(entrada||'').replace(/\D/g,'');   // código é numérico
  if (!contato) return 'Digite o seu código de acesso.';
  if (!empresa) return 'Faltou o código da empresa no endereço — entre pelo seu e-mail.';
  location.hash = id + '-' + empresa + '-' + contato;      // corrige a URL
  if(!lerToken()){ telaConfiarAparelho(); return ''; }     // oferece confiar (tela própria) — só se ainda não confia
  boot();                                                  // re-tenta o acesso
  return '';
}

const WA_ACESSO = m => 'https://wa.me/5511937173906?text='+encodeURIComponent(m);

/* ---------- E-MAIL PRIMEIRO: pede o e-mail, envia o código, monta o link ---------- */
async function telaLoginEmail(){
  const wa = WA_ACESSO('Olá, preciso de ajuda com o acesso ao painel back4you.');
  document.getElementById('miolo').innerHTML = `
    <div class="state">
      <h1>Acesse o seu painel</h1>
      <p>Digite o seu e-mail cadastrado. Enviamos um código de 6 dígitos para você entrar.</p>
      <form id="mail-form" class="id-form">
        <input id="mail-input" type="email" inputmode="email" autocomplete="email" placeholder="seu@email.com" required>
        <button type="submit" class="ac-btn ac-primary">Enviar código</button>
      </form>
      <div class="ct-err" id="mail-err" style="min-height:18px"></div>
      <p style="margin-top:2px">Não sabe qual e-mail? <a href="${wa}" target="_blank" rel="noopener" style="color:var(--brand-teal);font-weight:700">Falar com o atendimento</a></p>
    </div>`;
  const form = document.getElementById('mail-form');
  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const email = document.getElementById('mail-input').value.trim();
    const errEl = document.getElementById('mail-err');
    if(!email){ errEl.textContent='Digite o seu e-mail.'; return; }
    const btn = form.querySelector('button'); btn.disabled=true; btn.textContent='Enviando…';
    try{
      const d = await jsonp(API_URL+'?tipo=login_email_iniciar&email='+encodeURIComponent(email));
      if(d.erro) throw new Error(d.erro);
      if(!d.encontrado){ btn.disabled=false; btn.textContent='Enviar código';
        errEl.innerHTML = 'Não encontramos esse e-mail no cadastro. Confira ou <a href="'+wa+'" target="_blank" rel="noopener" style="color:var(--brand-teal);font-weight:700">fale com o atendimento</a>.'; return; }
      if(d.enviado===false){ btn.disabled=false; btn.textContent='Enviar código';
        errEl.innerHTML = (d.mensagem||'Encontramos seu cadastro, mas não consegui enviar o e-mail agora.')+' <a href="'+wa+'" target="_blank" rel="noopener" style="color:var(--brand-teal);font-weight:700">atendimento</a>'; return; }
      telaCodigoEmail(email, d.mascarado||'');
    }catch(err){ btn.disabled=false; btn.textContent='Enviar código'; errEl.textContent = err.message||String(err); }
  });
  document.getElementById('mail-input').focus();
}

function telaCodigoEmail(email, mascarado){
  const wa = WA_ACESSO('Olá, não recebi o código de acesso ao painel back4you.');
  document.getElementById('miolo').innerHTML = `
    <div class="state">
      <h1>Código de verificação</h1>
      <p>Enviamos um código de 6 dígitos para ${mascarado?('<b>'+esc(mascarado)+'</b>'):'o seu e-mail'}. Digite abaixo para entrar.</p>
      ${boxesOTP()}
      <div class="ct-err" id="cod-err" style="min-height:18px"></div>
      <button type="button" class="ac-btn ac-primary" id="cod-continuar" style="min-width:220px">Continuar</button>
      <p style="margin-top:12px;color:var(--muted)">Não recebeu? <button type="button" class="linklike" id="reenviar-mail">Reenviar código</button> · <a href="${wa}" target="_blank" rel="noopener" style="color:var(--brand-teal);font-weight:700">atendimento</a></p>
    </div>`;
  const otp = wireOTP(()=>submeter());
  const btn = document.getElementById('cod-continuar');
  async function submeter(){
    const code = otp.val();
    const errEl = document.getElementById('cod-err');
    if(code.length<6){ errEl.textContent='Digite os 6 dígitos.'; return; }
    errEl.textContent=''; btn.disabled=true; btn.textContent='Entrando…';
    try{
      const d = await jsonp(API_URL+'?tipo=login_email_verificar&email='+encodeURIComponent(email)+'&codigo='+encodeURIComponent(code));
      if(d.erro) throw new Error(d.erro);
      if(!d.ok){ btn.disabled=false; btn.textContent='Continuar'; errEl.textContent = d.mensagem||'Código incorreto.'; otp.clear(); return; }
      location.hash = d.hash;
      if(!lerToken()) return telaConfiarAparelho();   // logo após o código: oferece confiar (tela própria)
      boot();
    }catch(err){ btn.disabled=false; btn.textContent='Continuar'; errEl.textContent = err.message||String(err); }
  }
  btn.addEventListener('click', submeter);
  document.getElementById('reenviar-mail').addEventListener('click', async ()=>{
    const errEl = document.getElementById('cod-err'); errEl.textContent='Reenviando…';
    try{ const d=await jsonp(API_URL+'?tipo=login_email_iniciar&email='+encodeURIComponent(email));
      errEl.textContent = d.encontrado ? 'Código reenviado. Confira o seu e-mail.' : 'E-mail não encontrado.'; otp.clear(); }
    catch(e){ errEl.textContent = 'Não consegui reenviar agora.'; }
  });
}

/* ---------- ID+empresa no link, mas falta/expirou o código pessoal ---------- */
async function telaAcessoExpirado(id, msg){
  const { codigo } = getIdCodigo();
  if(!(codigo||'').split('-')[0].trim()) return telaLoginEmail();  // sem código da empresa → e-mail primeiro
  let opcoes = [];
  try{ const d = await jsonp(API_URL+'?id='+encodeURIComponent(id)+'&tipo=reenvio_opcoes'); opcoes = (d && d.opcoes) || []; }catch(e){}
  const wa = WA_ACESSO('Olá, preciso de ajuda com o acesso ao painel (ID '+id+').');
  document.getElementById('miolo').innerHTML = `
    <div class="state">
      <h1>Código de verificação</h1>
      <p>Digite o seu código de acesso pessoal de 6 dígitos — o que você recebeu por e-mail.</p>
      ${boxesOTP()}
      <div class="ct-err" id="cod-err" style="min-height:18px"></div>
      <button type="button" class="ac-btn ac-primary" id="cod-continuar" style="min-width:220px">Continuar</button>
      <p style="margin-top:14px;color:var(--muted)">Não tem o código? Enviamos um novo para o seu e-mail:</p>
      <div class="reenvio" id="reenvio">
        ${opcoes.length
          ? opcoes.map(o=>`<button type="button" class="ac-btn reenvio-op" data-idx="${o.idx}">Enviar para ${o.mascarado}</button>`).join('')
          : `<p style="color:var(--muted)">Nenhum e-mail cadastrado para este acesso.</p>`}
      </div>
      <p style="margin-top:8px">Prefere entrar pelo e-mail? <button type="button" class="linklike" id="ir-email">Usar meu e-mail</button> · <a href="${wa}" target="_blank" rel="noopener" style="color:var(--brand-teal);font-weight:700">atendimento</a></p>
    </div>`;
  const otp = wireOTP(()=>submeter());
  function submeter(){ const err = entrarComCodigo(otp.val()); if(err) document.getElementById('cod-err').textContent = err; }
  document.getElementById('cod-continuar').addEventListener('click', submeter);
  document.getElementById('ir-email').addEventListener('click', telaLoginEmail);
  document.querySelectorAll('.reenvio-op').forEach(b=>b.addEventListener('click', async ()=>{
    const box=document.getElementById('reenvio'); box.innerHTML='<div class="spin"></div>';
    try{
      const d = await jsonp(API_URL+'?id='+encodeURIComponent(id)+'&acao=reenviar_codigo&idx='+encodeURIComponent(b.dataset.idx));
      if(d.erro) throw new Error(d.erro);
      box.innerHTML = `<p style="color:var(--brand-teal);font-weight:700">${d.mensagem||'Pedido enviado.'}</p>`;
    }catch(e){ box.innerHTML = `<p style="color:#8B2E22">${e.message||e}</p>`; }
  }));
}

function erro(){ return telaLoginEmail(); }   // sem id → entra pelo e-mail

/* ---------- Confiar neste aparelho (token no localStorage) ---------- */
function lerToken(){ try{ return localStorage.getItem('b4u_token'); }catch(e){ return null; } }
function salvarToken(t){ try{ localStorage.setItem('b4u_token', t); }catch(e){} }
function limparToken(){ try{ localStorage.removeItem('b4u_token'); }catch(e){} }
async function tentarToken(){
  const tok = lerToken(); if(!tok) return false;
  try{ const d = await jsonp(API_URL+'?tipo=entrar_token&token='+encodeURIComponent(tok));
    if(d && d.ok && d.hash){ location.hash = d.hash; return true; }
    limparToken(); }catch(e){}
  return false;
}
async function confiarNesteAparelho(id, codigo){
  const nav = (navigator.userAgent||'').slice(0,60);
  try{ const d = await jsonp(API_URL+'?id='+encodeURIComponent(id)+'&codigo='+encodeURIComponent(codigo)+'&acao=confiar_aparelho&aparelho='+encodeURIComponent(nav));
    if(d && d.ok && d.token){ salvarToken(d.token); return true; } }catch(e){}
  return false;
}
async function sairDesteAparelho(id, codigo){
  try{ await jsonp(API_URL+'?id='+encodeURIComponent(id)+'&codigo='+encodeURIComponent(codigo)+'&acao=revogar_aparelhos'); }catch(e){}
  limparToken();
}
/* Oferta "confiar neste aparelho" — tela PRÓPRIA, mostrada UMA vez, logo após o
 * cliente inserir o código (e só se o aparelho ainda não for confiável). Depois
 * não reaparece na home. */
function telaConfiarAparelho(){
  const { id, codigo } = getIdCodigo();
  if(!(id && codigo)) return boot();
  document.getElementById('miolo').innerHTML = `
    <div class="state">
      <div style="font-size:42px;line-height:1;margin-bottom:4px">🔒</div>
      <h1>Confiar neste aparelho?</h1>
      <p>Se este aparelho é só seu, mantemos você conectado por <b>30 dias</b> sem pedir o código de novo.</p>
      <div class="id-form" style="gap:10px;align-items:center">
        <button type="button" class="ac-btn ac-primary" id="cf-sim" style="min-width:250px">Confiar neste aparelho — 30 dias</button>
        <button type="button" class="linklike" id="cf-nao">Agora não</button>
      </div>
      <p style="margin-top:12px;color:var(--muted);font-size:12px">Não ative em computadores públicos ou compartilhados.</p>
    </div>`;
  document.getElementById('cf-sim').addEventListener('click', async (e)=>{
    e.target.disabled=true; e.target.textContent='Ativando…';
    await confiarNesteAparelho(id, codigo);
    boot();
  });
  document.getElementById('cf-nao').addEventListener('click', ()=> boot());
}

async function boot(){
  const { id, codigo } = getIdCodigo();
  if (!(id && codigo)) { if(await tentarToken()) return boot(); }   // aparelho confiável entra sem código
  if (!id) return telaLoginEmail();                          // URL sem código → e-mail primeiro
  if (!codigo) return telaAcessoExpirado(id, 'incompleto');
  document.getElementById('miolo').innerHTML = `<div class="saudacao">${window.B4U&&window.B4U.skeleton?window.B4U.skeleton(1,26):''}</div><div class="grade">${window.B4U&&window.B4U.skeleton?window.B4U.skeleton(4,90):'<div class="spin"></div>'}</div>`;
  try {
    const url = API_URL + '?id=' + encodeURIComponent(id) + '&codigo=' + encodeURIComponent(codigo) + '&tipo=links';
    const d = await jsonp(url);
    if (d.erro) throw new Error(d.erro);
    render(id, codigo, d.disponiveis || {}, d.pessoa || null);
  } catch (e) {
    if(await tentarToken()) return boot();                   // código expirou mas o aparelho é confiável
    telaAcessoExpirado(id, e.message || String(e));   // sem chave pessoal / expirado -> tela de acesso
  }
}
boot();
