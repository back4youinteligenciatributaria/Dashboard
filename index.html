<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel do cliente — back4you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#F1E7DC; --surface:#FFFFFF; --surface-warm:#FBF6EF;
  --ink:#113D39; --ink-2:#3F5854; --muted:#8A7D70; --line:#E4D9C9; --line-2:#D6C3AC;
  --brand-dark:#073034; --brand-teal:#0F8C85; --brand-eucalipto2:#3FA680;
  --radius:16px; --sans:'Montserrat',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--canvas);color:var(--ink);font-family:var(--sans);
  min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;
}
:focus-visible{outline:2px solid var(--brand-teal);outline-offset:2px;border-radius:4px}

.topo{padding:28px 24px 0;text-align:center}
.logo{font-weight:900;font-size:24px;letter-spacing:-.02em}
.logo .b{color:var(--brand-dark)} .logo .y{color:var(--brand-teal)}

.miolo{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px 56px}
.saudacao{text-align:center;margin-bottom:36px;max-width:520px}
.saudacao h1{font-size:23px;font-weight:800;letter-spacing:-.01em}
.saudacao p{font-size:13.5px;color:var(--muted);margin-top:8px;line-height:1.6}
.saudacao .cliente{font-size:12.5px;color:var(--ink-2);font-weight:600;margin-top:10px}
.saudacao .cta{font-size:13px;color:var(--brand-teal);font-weight:700;margin-top:18px}

.grade{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:18px;max-width:680px;width:100%}
@media(max-width:560px){.grade{grid-template-columns:1fr}}

.opcao{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:26px 24px;text-decoration:none;color:var(--ink);display:flex;flex-direction:column;gap:10px;
  transition:transform .15s, box-shadow .15s; position:relative; overflow:hidden;
}
.opcao:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(17,61,57,.10)}
.opcao .icone{
  width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:var(--surface-warm);color:var(--brand-teal);flex-shrink:0;
}
.opcao .icone svg{width:22px;height:22px}
.opcao h2{font-size:15.5px;font-weight:700;letter-spacing:-.01em}
.opcao p{font-size:12.5px;color:var(--muted);line-height:1.5}
.opcao .seta{position:absolute;top:24px;right:22px;color:var(--line-2);font-size:16px;transition:transform .15s, color .15s}
.opcao:hover .seta{transform:translateX(3px);color:var(--brand-teal)}

footer{padding:18px 24px;text-align:center;font-size:11.5px;color:var(--muted)}

.state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:70vh;text-align:center;padding:0 24px;margin:0 auto}
.state h1{font-size:19px;font-weight:700}
.state p{color:var(--muted);font-size:14px;max-width:44ch}
.state code{background:var(--surface-warm);padding:2px 6px;border-radius:4px;border:1px solid var(--line);font-size:13px}
.spin{width:26px;height:26px;border:2.5px solid var(--line-2);border-top-color:var(--brand-teal);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<div class="topo">
  <div class="logo"><span class="b">back</span><span class="y">4you</span></div>
</div>

<div class="miolo" id="miolo">
  <div class="state">
    <div class="spin" role="status" aria-label="Carregando"></div>
    <p>Carregando…</p>
  </div>
</div>

<footer>Precisando de ajuda? Fale com o seu contador de referência.</footer>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyGAro0qPWpZcVX665KwKd-BK3ouSvVkAj5Vxw_phgO82EDa3gJrURcHjWIPYNQXT5d/exec';

function getIdCodigo(){
  const qs = new URLSearchParams(location.search);
  let id = qs.get('id') || '';
  let codigo = qs.get('codigo') || '';
  if (!id){
    const h = location.hash.replace('#','').trim();
    const comCodigo = h.match(/^(\d+)-(.+)$/);
    const soId = h.match(/^(\d+)$/);
    if (comCodigo) { id = comCodigo[1]; codigo = comCodigo[2]; }
    else if (soId) { id = soId[1]; }
  }
  return { id: id.replace(/\D/g,''), codigo: codigo.trim() };
}

function jsonp(url){
  return new Promise((ok,fail)=>{
    const cb = 'cb_'+Math.random().toString(36).slice(2);
    const s = document.createElement('script');
    const t = setTimeout(()=>{ limpa(); fail(new Error('A API não respondeu.')); }, 20000);
    function limpa(){ clearTimeout(t); delete window[cb]; s.remove(); }
    window[cb] = d => { limpa(); ok(d); };
    s.onerror = () => { limpa(); fail(new Error('Não consegui alcançar a API.')); };
    s.src = url + (url.includes('?')?'&':'?') + 'callback=' + cb;
    document.body.appendChild(s);
  });
}

const ICONES = {
  societario:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 21V8l8-5 8 5v13"/><path d="M9 21v-7h6v7"/><path d="M9 12h.01M15 12h.01M9 16h.01M15 16h.01"/></svg>',
  fiscal:      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 9h10M7 13h10M7 17h6"/></svg>',
  pessoal:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6"/><path d="M16 4.2c1.7.4 3 2 3 3.8s-1.3 3.4-3 3.8M23 20c0-2.8-2.3-5.1-5.4-5.8"/></svg>',
  equiparacao: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2 3 7v6c0 5 4 8.5 9 9 5-.5 9-4 9-9V7l-9-5Z"/><path d="m9 12 2 2 4-4"/></svg>',
  juridico:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3v18M5 8h14M7 8l-4 8a4 4 0 0 0 8 0l-4-8Zm10 0l-4 8a4 4 0 0 0 8 0l-4-8Z"/></svg>',
  contabil:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 7h8M8 11h3M13 11h3M8 15h3M13 15h3"/></svg>',
};

const DEFINICOES = [
  { chave:'fiscal',      arquivo:'fiscal.html',       titulo:'Dashboard Fiscal',        desc:'Faturamento, impostos a pagar, rateio por centro de custo e calendário de vencimentos.' },
  { chave:'equiparacao', arquivo:'equiparacao.html',  titulo:'Equiparação hospitalar',  desc:'Pedidos de restituição, valores atualizados e situação de cada processo.' },
  { chave:'societario',  arquivo:'societario.html',   titulo:'Societário e Jurídico',  desc:'Contrato social, alterações, alvarás, processos e modelos de documentos da empresa.' },
  { chave:'contabil',    arquivo:'contabil.html',     titulo:'Dashboard Contábil',      desc:'Balanço, DRE e indicadores contábeis.' },
  { chave:'pessoal',     arquivo:'dptopessoal.html',  titulo:'Departamento Pessoal',    desc:'Folha, encargos e obrigações trabalhistas.' },
];

function render(id, codigo, disponiveis){
  const destino = pagina => `${pagina}#${id}-${codigo}`;
  const visiveis = DEFINICOES.filter(d => disponiveis[d.chave]);

  document.getElementById('miolo').innerHTML = `
    <div class="saudacao">
      <h1>Bem-vindo à back4you</h1>
      <p>Aqui fica tudo o que você precisa acompanhar sobre a sua empresa — de impostos a processos em andamento.</p>
      <div class="cta">Clique abaixo para verificar documentos, andamento e muito mais.</div>
    </div>
    <div class="grade" id="grade"></div>`;

  document.getElementById('grade').innerHTML = visiveis.length
    ? visiveis.map(d => `<a class="opcao" href="${destino(d.arquivo)}">
        <div class="icone">${ICONES[d.chave]}</div>
        <h2>${d.titulo}</h2>
        <p>${d.desc}</p>
        <span class="seta">→</span>
      </a>`).join('')
    : `<p style="color:var(--muted);grid-column:1/-1;text-align:center">Nenhum painel disponível para este cliente ainda.</p>`;
}

function erro(msg){
  document.getElementById('miolo').innerHTML = `
    <div class="state">
      <h1>Não deu para identificar o cliente</h1>
      <p>${msg}</p>
      <p>Confira se o endereço termina com o ID e o código de acesso, assim: <code>#482913-AbC123</code></p>
    </div>`;
}

(async function(){
  const { id, codigo } = getIdCodigo();
  if (!id || !codigo) return erro('Informe o ID e o código de acesso no final do endereço.');
  try {
    const url = API_URL + '?id=' + encodeURIComponent(id) + '&codigo=' + encodeURIComponent(codigo) + '&tipo=links';
    const d = await jsonp(url);
    if (d.erro) throw new Error(d.erro);
    render(id, codigo, d.disponiveis || {});
  } catch (e) {
    erro(e.message || String(e));
  }
})();
</script>
</body>
</html>
